<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A Good Day for Goodbyes</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated;touch-action:none}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const FG="#f2f2f0",BG="#000000";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let W=960,H=540,k=1,S=1,dpr=1;

const FONT={
"A":[".X.","X.X","XXX","X.X","X.X"],"B":["XX.","X.X","XX.","X.X","XX."],
"C":[".XX","X..","X..","X..",".XX"],"D":["XX.","X.X","X.X","X.X","XX."],
"E":["XXX","X..","XX.","X..","XXX"],"F":["XXX","X..","XX.","X..","X.."],
"G":[".XX","X..","X.X","X.X",".XX"],"H":["X.X","X.X","XXX","X.X","X.X"],
"I":["XXX",".X.",".X.",".X.","XXX"],"J":["..X","..X","..X","X.X",".X."],
"K":["X.X","X.X","XX.","X.X","X.X"],"L":["X..","X..","X..","X..","XXX"],
"M":["X.X","XXX","X.X","X.X","X.X"],"N":["XX.","X.X","X.X","X.X","X.X"],
"O":[".X.","X.X","X.X","X.X",".X."],"P":["XX.","X.X","XX.","X..","X.."],
"Q":[".X.","X.X","X.X","XX.","..X"],"R":["XX.","X.X","XX.","X.X","X.X"],
"S":[".XX","X..",".X.","..X","XX."],"T":["XXX",".X.",".X.",".X.",".X."],
"U":["X.X","X.X","X.X","X.X","XXX"],"V":["X.X","X.X","X.X","X.X",".X."],
"W":["X.X","X.X","X.X","XXX","X.X"],"X":["X.X","X.X",".X.","X.X","X.X"],
"Y":["X.X","X.X",".X.",".X.",".X."],"Z":["XXX","..X",".X.","X..","XXX"],
"0":["XXX","X.X","X.X","X.X","XXX"],"1":[".X.","XX.",".X.",".X.","XXX"],
"2":["XXX","..X","XXX","X..","XXX"],"3":["XXX","..X","XXX","..X","XXX"],
"4":["X.X","X.X","XXX","..X","..X"],"5":["XXX","X..","XXX","..X","XXX"],
"6":["XXX","X..","XXX","X.X","XXX"],"7":["XXX","..X","..X","..X","..X"],
"8":["XXX","X.X","XXX","X.X","XXX"],"9":["XXX","X.X","XXX","..X","XXX"],
" ":["...","...","...","...","..."]
};

const DISCORD=[
"..............",
"..XX......XX..",
".XXXXXXXXXXXX.",
".XXXXXXXXXXXX.",
"XXXXXXXXXXXXXX",
"XXX..XXXX..XXX",
"XXX..XXXX..XXX",
"XXX..XXXX..XXX",
"XXXXXXXXXXXXXX",
"XXXXXXXXXXXXXX",
".XXXXXXXXXXXX.",
"..XXX....XXX..",
"...X......X...",
".............."
];
function sheetRows(rows){const c=document.createElement("canvas");c.width=rows[0].length;c.height=rows.length;const g=c.getContext("2d");g.fillStyle=FG;for(let y=0;y<rows.length;y++)for(let x=0;x<rows[y].length;x++)if(rows[y][x]==="X")g.fillRect(x,y,1,1);return c;}
function steamSheet(){const n=14,c=document.createElement("canvas");c.width=n;c.height=n;const g=c.getContext("2d");g.fillStyle=FG;
const on=(x,y)=>g.fillRect(x,y,1,1);
for(let y=0;y<n;y++)for(let x=0;x<n;x++){const dx=x-6.5,dy=y-6.5,d=Math.sqrt(dx*dx+dy*dy);if(d<=6.4&&d>=5.3){const ang=Math.atan2(dy,dx)*180/Math.PI;if(!(ang>108&&ang<168))on(x,y);}}
for(let y=0;y<n;y++)for(let x=0;x<n;x++){const dx=x-7.5,dy=y-5.6,d=Math.sqrt(dx*dx+dy*dy);if(d<=2.5&&d>=1.3)on(x,y);}
for(let t=0;t<=1;t+=0.05){const x=6.2-4.2*t,y=7.4+3.9*t;on(Math.round(x),Math.round(y));on(Math.round(x+1),Math.round(y));on(Math.round(x),Math.round(y+1));}
return c;}
const IC_DISCORD=sheetRows(DISCORD),IC_STEAM=steamSheet();

let state="menu",fade=0,hover=null,buttons=[];

function fit(){dpr=window.devicePixelRatio||1;const port=innerHeight>innerWidth;W=port?540:960;H=port?960:540;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function rr(v){return Math.round(v*S);}
function box(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function tw(s,n){return (s.length*4-1)*n;}
function glyphs(s,x,y,n,col){cx.fillStyle=col;for(const ch of s){const g=FONT[ch];if(g)for(let r=0;r<5;r++)for(let q=0;q<3;q++)if(g[r][q]==="X"){const a=rr(x+q*n),b=rr(y+r*n);cx.fillRect(a,b,rr(x+q*n+n)-a,rr(y+r*n+n)-b);}x+=4*n;}}
function text(s,x,y,n,al,col){if(al==="c")x=Math.round(x-tw(s,n)/2);if(al==="r")x=Math.round(x-tw(s,n));glyphs(s,x,y,n,col||FG);}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}

function layout(){
const port=H>W;
const mains=["ENTER","SETTINGS","QUIT GAME"];
const bs=port? {ty:220,ts:3,by:430,bh:64,bs:3,dy:868} : {ty:150,ts:4,by:280,bh:52,bs:3,dy:486};
buttons=[];
for(let i=0;i<3;i++){const label=mains[i];const w=tw(label,bs.bs)+56;const h=48;buttons.push({id:label,label,x:W/2-w/2,y:bs.by+i*bs.bh-h/2+8,w,h,scale:bs.bs,ty:bs.by+i*bs.bh});}
const wl=tw("WISHLIST",2),dc=tw("DISCORD",2);
const g1=28+8+wl,g2=28+8+dc,total=g1+44+g2,x0=W/2-total/2;
buttons.push({id:"WISHLIST",label:"WISHLIST",x:x0-8,y:bs.dy-10,w:g1+16,h:44,scale:2,icon:IC_STEAM,ix:x0,iy:bs.dy,tx:x0+36,ty:bs.dy+9,dead:true});
buttons.push({id:"DISCORD",label:"DISCORD",x:x0+g1+44-8,y:bs.dy-10,w:g2+16,h:44,scale:2,icon:IC_DISCORD,ix:x0+g1+44,iy:bs.dy,tx:x0+g1+44+36,ty:bs.dy+9,dead:true});
return bs;}

function draw(){
box(0,0,W,H,BG);
if(state==="game"){return;}
const bs=layout();
cx.globalAlpha=1-fade;
text("A GOOD DAY FOR GOODBYES",W/2,bs.ty,bs.ts,"c");
for(const b of buttons){
if(b.dead){
cx.globalAlpha=(hover===b.id?1:0.55)*(1-fade);
blit(b.icon,b.ix,b.iy,2);
text(b.label,b.tx,b.ty,2,null);
cx.globalAlpha=1-fade;
}else{
if(hover===b.id){box(b.x,b.y,b.w,b.h,FG);text(b.label,W/2,b.ty,b.scale,"c",BG);}
else text(b.label,W/2,b.ty,b.scale,"c");
}
}
cx.globalAlpha=1;
}

function toLogical(e){const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)/k,y:(e.clientY-r.top)/k};}
cv.addEventListener("pointermove",e=>{const p=toLogical(e);let h=null;for(const b of buttons)if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h)h=b.id;hover=h;cv.style.cursor=h?"pointer":"default";});
cv.addEventListener("pointerup",e=>{const p=toLogical(e);for(const b of buttons){if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
if(b.id==="ENTER")fading=true;
if(b.id==="QUIT GAME")window.close();
}}});
addEventListener("keydown",e=>{if(e.key==="Escape"&&state==="game"){state="menu";fade=0;fading=false;}});

let fading=false,last=performance.now();
function step(t){const dt=Math.min(100,t-last);last=t;
if(fading){fade=Math.min(1,fade+dt/280);if(fade>=1){state="game";fading=false;}}
draw();requestAnimationFrame(step);}
addEventListener("resize",()=>{fit();});
fit();requestAnimationFrame(step);
</script>
</body>
</html>
