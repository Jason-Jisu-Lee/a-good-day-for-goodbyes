<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>portrait lab</title>
<style>
html,body{margin:0;height:100%;background:#060607;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,BG="#0a0a0c",FG="#e9e7e0",LINE="#1a1a1f";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;

const FONT={
"A":[".X.","X.X","XXX","X.X","X.X"],"B":["XX.","X.X","XX.","X.X","XX."],
"C":[".XX","X..","X..","X..",".XX"],"D":["XX.","X.X","X.X","X.X","XX."],
"E":["XXX","X..","XX.","X..","XXX"],"F":["XXX","X..","XX.","X..","X.."],
"G":[".XX","X..","X.X","X.X",".XX"],"H":["X.X","X.X","XXX","X.X","X.X"],
"I":["XXX",".X.",".X.",".X.","XXX"],"J":["..X","..X","..X","X.X",".X."],
"K":["X.X","X.X","XX.","X.X","X.X"],"L":["X..","X..","X..","X..","XXX"],
"M":["X.X","XXX","X.X","X.X","X.X"],"N":["XX.","X.X","X.X","X.X","X.X"],
"O":[".X.","X.X","X.X","X.X",".X."],"P":["XX.","X.X","XX.","X..","X.."],
"Q":[".X.","X.X","X.X","XX.","..X"],"R":["XX.","X.X","XX.","X.X","X.X"],
"S":[".XX","X..",".X.","..X","XX."],"T":["XXX",".X.",".X.",".X.",".X."],
"U":["X.X","X.X","X.X","X.X","XXX"],"V":["X.X","X.X","X.X","X.X",".X."],
"W":["X.X","X.X","X.X","XXX","X.X"],"X":["X.X","X.X",".X.","X.X","X.X"],
"Y":["X.X","X.X",".X.",".X.",".X."],"Z":["XXX","..X",".X.","X..","XXX"],
"0":["XXX","X.X","X.X","X.X","XXX"],"1":[".X.","XX.",".X.",".X.","XXX"],
"2":["XXX","..X","XXX","X..","XXX"],"3":["XXX","..X","XXX","..X","XXX"],
"4":["X.X","X.X","XXX","..X","..X"],"5":["XXX","X..","XXX","..X","XXX"],
"6":["XXX","X..","XXX","X.X","XXX"],"7":["XXX","..X","..X","..X","..X"],
"8":["XXX","X.X","XXX","X.X","XXX"],"9":["XXX","X.X","XXX","..X","XXX"],
"-":["...","...","XXX","...","..."],".":["...","...","...","...",".X."]
};

const GW=26,GH=30;
const SKIN="#e9ddc8",DARK="#17161c";
function grid(){return Array.from({length:GH},()=>new Array(GW).fill(0));}
function setP(g,x,y,v){x=Math.round(x);y=Math.round(y);if(x>=0&&x<GW&&y>=0&&y<GH)g[y][x]=v;}
function ell(g,cx0,cy0,rx,ry,v){for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){const dx=(x-cx0)/rx,dy=(y-cy0)/ry;if(dx*dx+dy*dy<=1)g[y][x]=v;}}
function rect(g,x0,y0,x1,y1,v){for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)setP(g,x,y,v);}
function makeCanvas(g,pal){const c=document.createElement("canvas");c.width=GW;c.height=GH;const gx=c.getContext("2d");for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){const v=g[y][x];if(v){gx.fillStyle=pal[v];gx.fillRect(x,y,1,1);}}return c;}

// value key: 0 bg, 1 skin, 2 dark, 3 hair, 4 accent
function femaleFace(g){
 // brows (gentle arch, inner-raised = calm/soft)
 rect(g,8,12,10,12,2); setP(g,9,11,2);
 rect(g,15,12,17,12,2); setP(g,16,11,2);
 // eyes (soft) + upper-outer lash
 rect(g,8,14,10,15,2); setP(g,7,13,2);
 rect(g,15,14,17,15,2); setP(g,18,13,2);
 // nose (subtle)
 setP(g,13,17,2); setP(g,12,18,2);
 // mouth (small, centered, soft smile)
 rect(g,11,20,15,20,2); setP(g,11,19,2); setP(g,15,19,2);
}
function narrowChin(g){
 // trim lower face corners for a softer feminine jaw
 for(let y=20;y<GH;y++){const w=7-(y-20);for(let x=0;x<GW;x++)if(g[y][x]===1&&(x<13-w||x>13+w))g[y][x]=0;}
}

function womanLong(g){          // long amber
 ell(g,13,13,10,12,3);          // hair mass
 rect(g,3,13,22,29,3);          // curtains fall to bottom
 ell(g,13,15,7,9,1);            // face
 narrowChin(g);
 rect(g,5,7,9,10,3); rect(g,17,7,21,10,3); // side-swept fringe corners
 setP(g,13,7,3);
 femaleFace(g);
 rect(g,10,23,16,29,1);         // neck
 rect(g,4,21,6,29,3); rect(g,20,21,22,29,3); // strands over neck
}
function womanBob(g){           // blonde bob
 ell(g,13,12,10,11,3);          // hair mass (higher, rounder)
 rect(g,4,12,22,22,3);          // bob to chin
 ell(g,13,15,7,9,1);            // face
 narrowChin(g);
 rect(g,7,7,19,9,3);            // soft bangs
 femaleFace(g);
 rect(g,10,23,16,29,1);         // neck
 rect(g,5,18,7,23,3); rect(g,19,18,21,23,3); // bob tips at jaw
}
function manHat(g){             // brown hair, gray hat
 rect(g,5,13,7,21,3); rect(g,19,13,21,21,3); // side hair
 ell(g,13,16,7,8,1);            // face
 ell(g,13,10,11,2,4); rect(g,4,9,22,10,4);    // brim
 rect(g,7,3,19,9,4);            // crown
 ell(g,13,4,6,3,4);             // crown top
 rect(g,7,8,19,8,2);            // hat band
 rect(g,8,15,10,15,2); rect(g,15,15,17,15,2); // eyes
 setP(g,13,18,2); setP(g,12,18,2);            // nose
 rect(g,10,21,16,21,2);         // mustache
 setP(g,9,20,2);setP(g,17,20,2);setP(g,11,23,2);setP(g,15,23,2); // stubble
 rect(g,10,24,16,29,1);         // neck
}

const PEOPLE=[
{name:"MARA",meta:"26 COURIER",fn:womanLong,pal:{1:SKIN,2:DARK,3:"#c8913c"}},
{name:"IVE",meta:"29 SIGNAL TECH",fn:womanBob,pal:{1:SKIN,2:DARK,3:"#e6c86e"}},
{name:"ODELL",meta:"58 ELEVATOR MAN",fn:manHat,pal:{1:SKIN,2:DARK,3:"#7d5230",4:"#4b4740"}}
];
const ART=PEOPLE.map(p=>{const g=grid();p.fn(g);return makeCanvas(g,p.pal);});

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function rr(v){return Math.round(v*S);}
function box(x,y,w,h,col){cx.fillStyle=col||FG;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function edge(x,y,w,h){box(x,y,w,1,LINE);box(x,y+h-1,w,1,LINE);box(x,y,1,h,LINE);box(x+w-1,y,1,h,LINE);}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function tw(s,n){return (s.length*4-1)*n;}
function text(s,x,y,n,al){if(al==="c")x=Math.round(x-tw(s,n)/2);if(al==="r")x=Math.round(x-tw(s,n));for(const ch of s){const g=FONT[ch];if(g)for(let r=0;r<5;r++)for(let q=0;q<3;q++)if(g[r][q]==="X")box(x+q*n,y+r*n,n,n,FG);x+=4*n;}}

function draw(){
box(0,0,W,H,BG);
text("PORTRAIT LAB",24,20,3);
text("NECK-UP 26X30 HAIR COLOR",936,25,2,"r");
for(let i=0;i<3;i++){
const x=70+i*300,y=66;
edge(x,y,240,300);
blit(ART[i],x+70,y+26,4);
text(PEOPLE[i].name,x+120,y+236,3,"c");
text(PEOPLE[i].meta,x+120,y+262,2,"c");
}
text("SMALL",24,412,2);
for(let i=0;i<3;i++){blit(ART[i],120+i*80,404,2);}
text("TINY",370,412,2);
for(let i=0;i<3;i++){blit(ART[i],450+i*40,410,1);}
text("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2))+" DPR"+(Math.round(dpr*100)/100),936,520,1,"r");
}
function step(){draw();requestAnimationFrame(step);}
addEventListener("resize",()=>{fit();draw();});
fit();draw();requestAnimationFrame(step);
</script>
</body>
</html>
