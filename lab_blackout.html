<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>BLACKOUT height lab</title>
<style>
body{margin:0;background:#0a0a0a;color:#888;font:13px "Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px}
canvas{outline:1px solid #222}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:960px}
button{background:#111;border:1px solid #444;color:#ccc;font:13px "Segoe UI",sans-serif;padding:7px 16px;cursor:pointer}
button.on{border-color:#e3c15c;color:#e3c15c}
.note{max-width:960px;color:#666;text-align:center}
</style>
</head>
<body>
<div>All +90% tall, dim 0.5, plain fade. Medium-bold faces with character (not thin, not block). Click canvas = fast dismiss / replay.</div>
<canvas id="cv" width="960" height="540"></canvas>
<div class="row" id="btns"></div>
<div class="note" id="desc"></div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const W=960,H=540,YEL="#e3c15c",DIM=0.5;
const VARS=[
{n:"IMPACT",fam:'Impact,Haettenschweiler,"Arial Narrow",sans-serif',wt:"400",vs:1.90,wf:0.94,sp:0.06,cap:190,d:"condensed poster face. Bold but narrow, not wide-thick. Loud."},
{n:"FRANKLIN",fam:'"Franklin Gothic Medium","Arial Narrow",sans-serif',wt:"700",vs:1.90,wf:0.94,sp:0.10,cap:150,d:"newspaper headline gothic. Solid, urgent, has character."},
{n:"TAHOMA",fam:'Tahoma,Geneva,sans-serif',wt:"700",vs:1.90,wf:0.94,sp:0.10,cap:150,d:"bold humanist sans. Clean, sturdy, not blocky."},
{n:"GEORGIA",fam:'Georgia,serif',wt:"700",vs:1.90,wf:0.94,sp:0.08,cap:150,d:"bold serif. Formal, characterful, gravestone weight."},
{n:"CONSOLAS",fam:'Consolas,"Lucida Console",monospace',wt:"700",vs:1.90,wf:0.94,sp:0.08,cap:150,d:"bold monospace. Terminal / system-failure feel."},
{n:"CANDARA",fam:'Candara,Corbel,sans-serif',wt:"700",vs:1.90,wf:0.94,sp:0.10,cap:150,d:"bold humanist with warmth. Softer, organic."}
];
let vi=0,t=0,out=-1,outA=0,last=performance.now();
const brow=document.getElementById("btns"),desc=document.getElementById("desc");
VARS.forEach((v,i)=>{
const b=document.createElement("button");
b.textContent=v.n;b.className=i===vi?"on":"";
b.onclick=()=>{vi=i;t=0;out=-1;[...brow.children].forEach(c=>c.classList.remove("on"));b.classList.add("on");desc.textContent=v.d;};
brow.appendChild(b);
});
desc.textContent=VARS[vi].d;
function env(tt){return tt<0.6?tt/0.6:(tt<1.8?1:Math.max(0,(2.8-tt)/1));}
cv.addEventListener("click",()=>{
const a=out>=0?outA*Math.max(0,1-(t-out)/0.3):env(t);
if(a<=0){t=0;out=-1;}
else if(t>=0.6&&out<0){out=t;outA=env(t);}
});
function mock(){
cx.fillStyle="#000";cx.fillRect(0,0,W,H);
cx.strokeStyle="#2a2a2a";cx.lineWidth=1;
const ox=W/2,oy=150,dx=48,dy=24;
for(let gx=0;gx<8;gx++)for(let gy=0;gy<8;gy++){
const x=ox+(gx-gy)*dx,y=oy+(gx+gy)*dy;
cx.beginPath();cx.moveTo(x,y-17);cx.lineTo(x+34,y);cx.lineTo(x,y+17);cx.lineTo(x-34,y);cx.closePath();cx.stroke();
}
cx.fillStyle="#f2f2f0";cx.font="600 20px 'Segoe UI'";
cx.fillText("FOOD 14",16,14);cx.fillText("MATERIAL 6",160,14);
cx.font="600 10px 'Segoe UI'";cx.fillStyle="#777";cx.fillText("DAY 10",16,H-32);
cx.strokeStyle="#333";cx.strokeRect(W-204,60,188,392);
cx.strokeStyle="#f2f2f0";cx.strokeRect(W/2-75,H-58,150,44);
cx.font="600 20px 'Segoe UI'";cx.fillStyle="#f2f2f0";cx.textAlign="center";cx.fillText("END DAY",W/2,H-43);cx.textAlign="left";
}
function draw(){
mock();
const v=VARS[vi];
const a=out>=0?outA*Math.max(0,1-(t-out)/0.3):env(t);
if(a<=0)return;
cx.save();
cx.fillStyle="rgba(0,0,0,"+(DIM*a)+")";cx.fillRect(0,0,W,H);
cx.globalAlpha=a;cx.fillStyle=YEL;
cx.textBaseline="middle";cx.textAlign="left";
const s="BLACKOUT",target=W*v.wf;
cx.font=v.wt+" 100px "+v.fam;
const w0=[...s].map(ch=>cx.measureText(ch).width);
const tw0=w0.reduce((p,w)=>p+w,0)+100*v.sp*(s.length-1);
const size=Math.min(v.cap,100*target/tw0);
cx.font=v.wt+" "+size+"px "+v.fam;
const ws=[...s].map(ch=>cx.measureText(ch).width);
const gap=size*v.sp;
let tw=ws.reduce((p,w)=>p+w+gap,-gap);
cx.translate(0,H/2);cx.scale(1,v.vs);cx.translate(0,-H/2);
let x=W/2-tw/2;
for(let i=0;i<s.length;i++){cx.fillText(s[i],x,H/2);x+=ws[i]+gap;}
cx.restore();
}
function step(now){
t+=Math.min(100,now-last)/1000;last=now;
if(out>=0&&(t-out)>=0.3){/*hold ended state*/}
draw();
requestAnimationFrame(step);
}
requestAnimationFrame(step);
</script>
</body>
</html>
