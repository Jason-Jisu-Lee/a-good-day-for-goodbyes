{name:"JUNE",meta:"34 NIGHT NURSE",hook:"COUNTS EVERYONE TWICE AT LIGHTS OUT",s:[2,3,2,4]},
{name:"ODELL",meta:"58 ELEVATOR MAN",hook:"KNOWS THE BUILDING BY ITS SOUNDS",s:[3,4,1,2]},
{name:"MARA",meta:"26 COURIER",hook:"STILL CARRIES THE LAST LETTER",s:[2,2,4,2]},
{name:"CASTOR",meta:"41 LINE COOK",hook:"FEEDS PEOPLE BEFORE THEY ASK",s:[3,3,2,3]},
{name:"NOOR",meta:"19 DROPOUT",hook:"ARGUES WITH THE REWIND DEVICE",s:[1,4,2,2]},
{name:"TEO",meta:"12 KID",hook:"MAPS THE FLOORS IN CRAYON",s:[1,2,1,4]},
{name:"AGNES",meta:"71 PIANO TEACHER",hook:"PLAYS SCALES ON A SILENT KEYBOARD",s:[2,1,1,4]},
{name:"BRAM",meta:"47 DEMOLITION",hook:"READS WALLS LIKE WEATHER",s:[4,3,3,1]},
{name:"VERA",meta:"30 RADIO DJ",hook:"KEEPS THE DEAD AIR COMPANY",s:[2,2,3,3]},
{name:"SOL",meta:"63 TAILOR",hook:"MEASURES EVERYONE FOR WINTER",s:[2,4,1,3]}
];
const STATS=["GRIT","HANDS","NERVE","HEART"];

function sheet(rows){const c=document.createElement("canvas");c.width=12;c.height=12;const g=c.getContext("2d");g.fillStyle=FG;for(let y=0;y<rows.length;y++){const r=rows[y];for(let x=0;x<r.length;x++)if(r[x]==="X")g.fillRect(x,y,1,1);}return c;}
const A_OBJ=OBJ.map(f=>f.map(sheet)),A_MARK=MARK.map(f=>f.map(sheet)),A_WIN=WIN.map(f=>f.map(sheet));

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function rr(v){return Math.round(v*S);}
function box(x,y,w,h,col){cx.fillStyle=col||FG;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function edge(x,y,w,h){box(x,y,w,1,LINE);box(x,y+h-1,w,1,LINE);box(x,y,1,h,LINE);box(x+w-1,y,1,h,LINE);}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function tw(s,n){return (s.length*4-1)*n;}
function text(s,x,y,n,al){if(al==="c")x=Math.round(x-tw(s,n)/2);if(al==="r")x=Math.round(x-tw(s,n));for(const ch of s){const g=FONT[ch];if(g)for(let r=0;r<5;r++)for(let q=0;q<3;q++)if(g[r][q]==="X")box(x+q*n,y+r*n,n,n,FG);x+=4*n;}}

let tick=0,tickT=0;
function update(dt){tickT+=dt;if(tickT>=500){tickT=0;tick=1-tick;}}

function draw(){
box(0,0,W,H,BG);
text("SURVIVOR LAB",24,16,3);
text("1-BIT 12X12",936,21,2,"r");
for(let i=0;i<10;i++){
const col=i%5,row=(i/5)|0,x=24+col*184,y=52+row*172;
edge(x,y,172,160);
const sv=SURV[i];
const oc=A_OBJ[i][A_OBJ[i].length>1?tick:0];
blit(oc,x+10,y+8,4);
blit(A_MARK[i][0],x+62,y+8,4);
blit(A_WIN[i][0],x+114,y+8,4);
text("A",x+34,y+60,1,"c");
text("B",x+86,y+60,1,"c");
text("C",x+138,y+60,1,"c");
text(sv.name,x+8,y+72,2);
text(sv.meta,x+8,y+88,1);
text(sv.hook,x+8,y+98,1);
for(let j=0;j<4;j++){
const sy=y+112+j*11;
text(STATS[j],x+8,sy,1);
for(let d=0;d<4;d++){
if(d<sv.s[j])box(x+34+d*7,sy,4,4);
else box(x+35+d*7,sy+1,2,2,LINE);
}
}
}
text("A OBJECTS",240,410,2,"c");
text("B MARKS",480,410,2,"c");
text("C WINDOWS",720,410,2,"c");
text("PLACEHOLDER PROFILES",480,436,1,"c");
text("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2))+" DPR"+(Math.round(dpr*100)/100),480,452,1,"c");
}

let last=performance.now();
function step(t){const dt=Math.min(100,t-last);last=t;update(dt);draw();requestAnimationFrame(step);}
addEventListener("resize",()=>{fit();draw();});
fit();draw();requestAnimationFrame(step);
