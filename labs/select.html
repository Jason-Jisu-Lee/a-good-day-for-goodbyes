<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hover styles</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:22px 0 12px}
#g{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:10px 16px}
.panel{text-align:center}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:320px;max-width:100%;border:1px solid #1a1a1a;cursor:pointer}
.cap{color:#ddd;font-size:13px;letter-spacing:2px;margin-top:8px}
</style>
</head>
<body>
<h1>HOVER</h1>
<div id="g">
<div class="panel"><canvas id="c0"></canvas><div class="cap">1 LIFT</div></div>
<div class="panel"><canvas id="c1"></canvas><div class="cap">2 GLOW</div></div>
<div class="panel"><canvas id="c2"></canvas><div class="cap">3 GROUND RING</div></div>
</div>
<script>
const FG="#f2f2f0",BG="#000000",MID="#8a8a8a";
const CW=320,CH=240,TX=160,TY=130,HW=66,HH=42;
const HOUSE=new Image();
HOUSE.src="../ref_house150.png";
const cvs=[0,1,2].map(i=>document.getElementById("c"+i));
const st=[{h:false,a:0},{h:false,a:0},{h:false,a:0}];
function hitTile(x,y){return Math.abs(x-TX)/(HW+8)+Math.abs(y-TY)/(HH+6)<=1;}
cvs.forEach((c,i)=>{
c.addEventListener("pointermove",e=>{
const r=c.getBoundingClientRect();
const x=(e.clientX-r.left)*CW/r.width,y=(e.clientY-r.top)*CH/r.height;
st[i].h=hitTile(x,y);
});
c.addEventListener("pointerleave",()=>{st[i].h=false;});
});
function stamp(g,x,y,extra){
if(!HOUSE.width)return;
g.globalCompositeOperation="lighter";
if(extra){
g.globalAlpha=extra;
g.drawImage(HOUSE,x-72,y-77);
g.drawImage(HOUSE,x-70,y-77);
g.drawImage(HOUSE,x-71,y-78);
g.drawImage(HOUSE,x-71,y-76);
g.globalAlpha=1;
}
g.drawImage(HOUSE,x-71,y-77);
g.globalCompositeOperation="source-over";
}
function ring(g,x,y,grow,alpha){
g.globalAlpha=alpha;
g.fillStyle=FG;
const hw=HW+grow,hh=HH+grow*HH/HW;
for(let i=0;i<=hw;i++){
const yy=hh-i*hh/hw;
g.fillRect(x+i,y-yy,1,1);
g.fillRect(x-i,y-yy,1,1);
g.fillRect(x+i,y+yy,1,1);
g.fillRect(x-i,y+yy,1,1);
}
g.globalAlpha=1;
}
function render(t){
for(let i=0;i<3;i++){
const c=cvs[i];
if(c.width!==CW*2){c.width=CW*2;c.height=CH*2;}
const g=c.getContext("2d");
g.setTransform(2,0,0,2,0,0);
g.imageSmoothingEnabled=false;
g.fillStyle=BG;g.fillRect(0,0,CW,CH);
const s=st[i];
const target=s.h?1:0;
s.a+=(target-s.a)*0.18;
if(i===0){
stamp(g,TX,TY-Math.round(s.a*5),0);
}
if(i===1){
stamp(g,TX,TY,s.a*0.5);
}
if(i===2){
if(s.a>0.02)ring(g,TX,TY,8,s.a);
stamp(g,TX,TY,0);
}
}
requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
