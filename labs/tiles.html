<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>park variations</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,FG="#f2f2f0",BG="#000",DIM="#333333";
const LOT="#3a3a3a",WATER="#10161c",GLINE="#4a4a4a";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;

const F7={
"A":[".XXX.","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"B":["XXXX.","X...X","X...X","XXXX.","X...X","X...X","XXXX."],
"C":[".XXX.","X...X","X....","X....","X....","X...X",".XXX."],
"D":["XXXX.","X...X","X...X","X...X","X...X","X...X","XXXX."],
"E":["XXXXX","X....","X....","XXXX.","X....","X....","XXXXX"],
"F":["XXXXX","X....","X....","XXXX.","X....","X....","X...."],
"G":[".XXX.","X...X","X....","X.XXX","X...X","X...X",".XXXX"],
"H":["X...X","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"I":["XXXXX","..X..","..X..","..X..","..X..","..X..","XXXXX"],
"K":["X...X","X..X.","X.X..","XX...","X.X..","X..X.","X...X"],
"L":["X....","X....","X....","X....","X....","X....","XXXXX"],
"M":["X...X","XX.XX","X.X.X","X.X.X","X...X","X...X","X...X"],
"N":["X...X","XX..X","X.X.X","X..XX","X...X","X...X","X...X"],
"O":[".XXX.","X...X","X...X","X...X","X...X","X...X",".XXX."],
"P":["XXXX.","X...X","X...X","XXXX.","X....","X....","X...."],
"R":["XXXX.","X...X","X...X","XXXX.","X.X..","X..X.","X...X"],
"S":[".XXXX","X....","X....",".XXX.","....X","....X","XXXX."],
"T":["XXXXX","..X..","..X..","..X..","..X..","..X..","..X.."],
"U":["X...X","X...X","X...X","X...X","X...X","X...X",".XXX."],
"V":["X...X","X...X","X...X","X...X","X...X",".X.X.","..X.."],
"W":["X...X","X...X","X...X","X.X.X","X.X.X","XX.XX","X...X"],
"X":["X...X","X...X",".X.X.","..X..",".X.X.","X...X","X...X"],
"Y":["X...X","X...X",".X.X.","..X..","..X..","..X..","..X.."],
"Z":["XXXXX","....X","...X.","..X..",".X...","X....","XXXXX"],
"0":[".XXX.","X...X","X..XX","X.X.X","XX..X","X...X",".XXX."],
"1":["..X..",".XX..","..X..","..X..","..X..","..X..","XXXXX"],
"2":[".XXX.","X...X","....X","..XX.",".X...","X....","XXXXX"],
"3":[".XXX.","X...X","....X","..XX.","....X","X...X",".XXX."],
"4":["...X.","..XX.",".X.X.","X..X.","XXXXX","...X.","...X."],
"5":["XXXXX","X....","XXXX.","....X","....X","X...X",".XXX."],
"6":[".XXX.","X....","X....","XXXX.","X...X","X...X",".XXX."],
"7":["XXXXX","....X","...X.","..X..",".X...",".X...",".X..."],
"8":[".XXX.","X...X","X...X",".XXX.","X...X","X...X",".XXX."],
"9":[".XXX.","X...X","X...X",".XXXX","....X","....X",".XXX."],
".":[".....",".....",".....",".....",".....","..X..","....."],
" ":[".....",".....",".....",".....",".....",".....","....."]
};
function tw7(s,n){return (s.length*6-1)*n;}
function rr(v){return Math.round(v*S);}
function px(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function text7(s,x,y,n,al,col){col=col||FG;if(al==="c")x=Math.round(x-tw7(s,n)/2);if(al==="r")x=Math.round(x-tw7(s,n));for(const ch of s){const g=F7[ch];if(g)for(let r=0;r<7;r++)for(let q=0;q<5;q++)if(g[r][q]==="X")px(x+q*n,y+r*n,n,n,col);x+=6*n;}}

function mk(n){const c=document.createElement("canvas");c.width=n;c.height=n;return c;}
function disc(g,cx0,cy0,r,col){if(col)g.fillStyle=col;for(let y=Math.floor(cy0-r);y<=Math.ceil(cy0+r);y++){const dy=y-cy0,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx0-hw);x<=Math.floor(cx0+hw);x++)g.fillRect(x,y,1,1);}}
function pond(g,cx0,cy0,r){disc(g,cx0,cy0,r+1,FG);disc(g,cx0,cy0,r,WATER);g.fillStyle=FG;g.fillRect(cx0-2,cy0-1,1,1);g.fillRect(cx0+1,cy0+1,1,1);}
function ftree(g,cx0,baseY,r){disc(g,cx0,baseY-r-4,r,FG);g.fillStyle=FG;g.fillRect(cx0-1,baseY-5,2,5);}
function fpine(g,cx0,top,h,tw){g.fillStyle=FG;for(let i=0;i<h;i++){const half=Math.min(Math.floor(i*0.55),tw);for(let x=cx0-half;x<=cx0+half;x++)g.fillRect(x,top+i,1,1);}g.fillRect(cx0,top+h,1,3);}
function bench(g,x,y,w){g.fillStyle=FG;g.fillRect(x,y,w,1);g.fillRect(x,y+2,w,1);g.fillRect(x,y+3,1,2);g.fillRect(x+w-1,y+3,1,2);}
function tick(g,x,y){g.fillStyle=FG;g.fillRect(x,y,1,2);}

function T(fn){const c=mk(34),g=c.getContext("2d");fn(g);return c;}

const TD=T(g=>{
g.fillStyle=LOT;g.fillRect(15,20,3,14);disc(g,16,16,4,LOT);
pond(g,26,8,4);
for(const t of [[7,7,3],[9,15,2.5],[6,24,2.5],[25,20,3],[22,27,2]])disc(g,t[0],t[1],t[2],FG);
g.fillStyle=FG;g.fillRect(21,14,3,1);
});
const FRONT=T(g=>{
g.fillStyle=GLINE;g.fillRect(4,29,26,1);
ftree(g,8,29,5);
fpine(g,26,9,17,5);
bench(g,14,23,7);
g.fillStyle=FG;g.fillRect(20,28,1,1);g.fillRect(23,27,1,1);
});
const HYBRID=T(g=>{
g.fillStyle=LOT;g.fillRect(14,26,3,8);disc(g,15,23,3.5,LOT);
pond(g,8,8,3.5);
ftree(g,25,20,4);
ftree(g,19,29,3);
ftree(g,6,27,3);
bench(g,21,26,6);
tick(g,11,30);tick(g,29,25);tick(g,30,16);
});
const POND=T(g=>{
pond(g,22,14,5.5);
tick(g,27,7);tick(g,29,10);tick(g,16,9);
ftree(g,7,18,4);
ftree(g,9,31,3);
tick(g,15,28);tick(g,27,25);
});
const PLAYGROUND=T(g=>{
g.fillStyle=LOT;g.fillRect(5,22,8,6);g.fillStyle=FG;
g.fillRect(5,22,8,1);g.fillRect(5,27,8,1);g.fillRect(5,22,1,6);g.fillRect(12,22,1,6);
g.fillRect(14,12,13,1);
g.fillRect(14,13,1,12);g.fillRect(26,13,1,12);
g.fillRect(18,13,1,7);g.fillRect(22,13,1,7);
g.fillRect(17,20,3,1);g.fillRect(21,20,3,1);
ftree(g,8,15,3.5);
disc(g,29,26,1.5,FG);
});
const PLAZA=T(g=>{
disc(g,17,17,8,LOT);
g.fillStyle=FG;disc(g,17,16,3,FG);disc(g,17,16,1.8,WATER);g.fillStyle=FG;g.fillRect(17,15,1,1);
bench(g,5,24,6);bench(g,24,24,6);
ftree(g,6,10,3);ftree(g,28,11,3);
g.fillStyle=LOT;g.fillRect(15,25,4,9);
});
const OVERGROWN=T(g=>{
ftree(g,8,13,4);ftree(g,17,11,3.5);ftree(g,26,14,4);
ftree(g,5,23,3);ftree(g,13,21,3.5);ftree(g,22,24,3.5);ftree(g,29,29,3);
tick(g,10,26);tick(g,16,28);tick(g,24,29);tick(g,30,20);tick(g,3,28);tick(g,19,30);tick(g,7,30);
});

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function edgeR(x,y,w,h,col){px(x,y,w,1,col);px(x,y+h-1,w,1,col);px(x,y,1,h,col);px(x+w-1,y,1,h,col);}

function draw(){
px(0,0,W,H,BG);
text7("PARK VARIATIONS",24,14,2);
const row1=[[TD,"TOP DOWN",200],[FRONT,"FRONT",380],[HYBRID,"HYBRID",560]];
for(const t of row1){
edgeR(t[2]-1,63,104,104,DIM);
blit(t[0],t[2],64,3);
text7(t[1],t[2]+51,174,1,"c",DIM);
}
text7("CONTENT VARIATIONS  HYBRID",140,216,1,null,DIM);
const row2=[[POND,"POND",140],[PLAYGROUND,"PLAYGROUND",320],[PLAZA,"PLAZA",500],[OVERGROWN,"OVERGROWN",680]];
for(const t of row2){
edgeR(t[2]-1,235,104,104,DIM);
blit(t[0],t[2],236,3);
text7(t[1],t[2]+51,346,1,"c",DIM);
}
text7("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2)),936,524,1,"r",DIM);
}
addEventListener("resize",()=>{fit();});
fit();function step(){draw();requestAnimationFrame(step);}step();
</script>
</body>
</html>
