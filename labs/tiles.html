<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>sigils + connected block</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,FG="#f2f2f0",BG="#000",DIM="#333333";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;

const F7={
"A":[".XXX.","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"B":["XXXX.","X...X","X...X","XXXX.","X...X","X...X","XXXX."],
"C":[".XXX.","X...X","X....","X....","X....","X...X",".XXX."],
"D":["XXXX.","X...X","X...X","X...X","X...X","X...X","XXXX."],
"E":["XXXXX","X....","X....","XXXX.","X....","X....","XXXXX"],
"F":["XXXXX","X....","X....","XXXX.","X....","X....","X...."],
"G":[".XXX.","X...X","X....","X.XXX","X...X","X...X",".XXXX"],
"H":["X...X","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"I":["XXXXX","..X..","..X..","..X..","..X..","..X..","XXXXX"],
"K":["X...X","X..X.","X.X..","XX...","X.X..","X..X.","X...X"],
"L":["X....","X....","X....","X....","X....","X....","XXXXX"],
"M":["X...X","XX.XX","X.X.X","X.X.X","X...X","X...X","X...X"],
"N":["X...X","XX..X","X.X.X","X..XX","X...X","X...X","X...X"],
"O":[".XXX.","X...X","X...X","X...X","X...X","X...X",".XXX."],
"P":["XXXX.","X...X","X...X","XXXX.","X....","X....","X...."],
"R":["XXXX.","X...X","X...X","XXXX.","X.X..","X..X.","X...X"],
"S":[".XXXX","X....","X....",".XXX.","....X","....X","XXXX."],
"T":["XXXXX","..X..","..X..","..X..","..X..","..X..","..X.."],
"U":["X...X","X...X","X...X","X...X","X...X","X...X",".XXX."],
"V":["X...X","X...X","X...X","X...X","X...X",".X.X.","..X.."],
"W":["X...X","X...X","X...X","X.X.X","X.X.X","XX.XX","X...X"],
"X":["X...X","X...X",".X.X.","..X..",".X.X.","X...X","X...X"],
"Y":["X...X","X...X",".X.X.","..X..","..X..","..X..","..X.."],
"Z":["XXXXX","....X","...X.","..X..",".X...","X....","XXXXX"],
"0":[".XXX.","X...X","X..XX","X.X.X","XX..X","X...X",".XXX."],
"1":["..X..",".XX..","..X..","..X..","..X..","..X..","XXXXX"],
"9":[".XXX.","X...X","X...X",".XXXX","....X","....X",".XXX."],
"6":[".XXX.","X....","X....","XXXX.","X...X","X...X",".XXX."],
"5":["XXXXX","X....","XXXX.","....X","....X","X...X",".XXX."],
"4":["...X.","..XX.",".X.X.","X..X.","XXXXX","...X.","...X."],
"0b":[".....",".....",".....",".....",".....",".....","....."],
".":[".....",".....",".....",".....",".....","..X..","....."],
" ":[".....",".....",".....",".....",".....",".....","....."]
};
function tw7(s,n){return (s.length*6-1)*n;}
function rr(v){return Math.round(v*S);}
function px(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function text7(s,x,y,n,al,col){col=col||FG;if(al==="c")x=Math.round(x-tw7(s,n)/2);if(al==="r")x=Math.round(x-tw7(s,n));for(const ch of s){const g=F7[ch];if(g)for(let r=0;r<7;r++)for(let q=0;q<5;q++)if(g[r][q]==="X")px(x+q*n,y+r*n,n,n,col);x+=6*n;}}

function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function disc(g,cx0,cy0,r){for(let y=Math.floor(cy0-r);y<=Math.ceil(cy0+r);y++){const dy=y-cy0,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx0-hw);x<=Math.floor(cx0+hw);x++)g.fillRect(x,y,1,1);}}
function stroke(g,x0,y0,x1,y1){const n=Math.max(Math.abs(x1-x0),Math.abs(y1-y0));for(let i=0;i<=n;i++){const x=Math.round(x0+(x1-x0)*i/n),y=Math.round(y0+(y1-y0)*i/n);g.fillRect(x,y,2,2);}}

function sigil(fn){const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}
const SG_HOUSE=sigil(g=>{g.fillRect(10,10,14,2);g.fillRect(10,22,14,2);g.fillRect(10,10,2,14);g.fillRect(22,10,2,14);g.clearRect(14,22,6,2);g.fillRect(16,16,2,2);});
const SG_WOOD=sigil(g=>{g.fillRect(16,8,2,18);stroke(g,15,15,10,10);stroke(g,17,19,22,14);});
const SG_DEF=sigil(g=>{for(let y=0;y<34;y++)for(let x=0;x<34;x++){const d=Math.abs(x-16.5)+Math.abs(y-16.5);if(d>=6&&d<=8.2)g.fillRect(x,y,1,1);}g.fillRect(5,11,2,12);g.fillRect(27,11,2,12);});
const SG_HOSP=sigil(g=>{const inP=(x,y,p)=>((x>=7+p&&x<=26-p&&y>=14+p&&y<=19-p)||(x>=14+p&&x<=19-p&&y>=7+p&&y<=26-p));for(let y=0;y<34;y++)for(let x=0;x<34;x++)if(inP(x,y,0)&&!inP(x,y,2))g.fillRect(x,y,1,1);});
const SG_ZOMBIE=sigil(g=>{stroke(g,9,6,15,26);stroke(g,15,5,21,25);stroke(g,21,7,27,27);});
const SG_HAT=sigil(g=>{g.fillRect(8,21,18,2);stroke(g,16,8,11,20);stroke(g,17,8,22,20);g.fillRect(24,6,2,2);g.fillRect(23,5,1,1);g.fillRect(26,8,1,1);});
const SG_SWORD=sigil(g=>{g.fillRect(16,5,2,19);g.fillRect(11,15,12,2);g.fillRect(15,26,4,2);});
const SG_BOW=sigil(g=>{for(let y=0;y<34;y++)for(let x=0;x<34;x++){const d=Math.hypot(x-13,y-16.5);if(d>=9&&d<=11&&x>=13)g.fillRect(x,y,1,1);}g.fillRect(12,6,2,22);g.fillRect(14,16,9,2);stroke(g,22,14,24,16);stroke(g,22,18,24,16);});

function car(g,x,y){g.fillRect(x,y,7,4);g.clearRect(x+2,y+1,3,1);}
function drawHouse(g,ox,oy){g.fillStyle=FG;
g.fillRect(ox+7,oy+6,18,14);g.clearRect(ox+8,oy+12,16,1);g.clearRect(ox+10,oy+8,2,2);
g.fillRect(ox+12,oy+20,8,4);disc(g,ox+28,oy+25,2.5);
g.fillRect(ox+15,oy+26,2,2);g.fillRect(ox+15,oy+30,2,2);g.fillRect(ox+24,oy+30,2,1);}
function drawWood(g,ox,oy){g.fillStyle=FG;
for(const t of [[9,9,3],[17,7,2.5],[25,11,3],[8,19,2.5],[20,18,3],[27,23,2.5],[13,26,2.5]])disc(g,ox+t[0],oy+t[1],t[2]);
g.fillRect(ox+5,oy+29,2,1);g.fillRect(ox+9,oy+28,2,1);g.fillRect(ox+13,oy+27,2,1);g.fillRect(ox+17,oy+28,2,1);g.fillRect(ox+21,oy+29,2,1);
g.fillRect(ox+25,oy+29,4,1);g.fillRect(ox+26,oy+28,1,1);g.fillRect(ox+28,oy+28,1,1);}
function drawPolice(g,ox,oy){g.fillStyle=FG;
g.fillRect(ox+5,oy+5,17,13);g.clearRect(ox+8,oy+8,3,3);g.clearRect(ox+16,oy+12,2,2);
car(g,ox+23,oy+21);car(g,ox+23,oy+27);
g.fillRect(ox+6,oy+27,3,1);g.fillRect(ox+12,oy+27,3,1);g.fillRect(ox+18,oy+27,3,1);
g.fillRect(ox+12,oy+19,3,2);}
function drawHosp(g,ox,oy){g.fillStyle=FG;
g.fillRect(ox+5,oy+5,24,14);g.clearRect(ox+8,oy+8,7,7);g.fillRect(ox+11,oy+9,1,5);g.fillRect(ox+9,oy+11,5,1);
g.clearRect(ox+20,oy+8,2,2);g.clearRect(ox+24,oy+12,2,2);
car(g,ox+23,oy+23);
g.fillRect(ox+14,oy+21,2,2);g.fillRect(ox+14,oy+25,2,2);g.fillRect(ox+14,oy+29,2,2);}

function groundDots(g,w,h,skip){for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){if(skip&&skip(x,y))continue;const hsh=Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;if(hsh<0.008){g.fillStyle="#555555";g.fillRect(x,y,1,1);}}}

const BLK_STREET=(()=>{const st=6,sz=34*2+st,c=mk(sz),g=c.getContext("2d");
g.fillStyle="#161616";
g.fillRect(0,34,sz,st);g.fillRect(34,0,st,sz);
g.fillStyle="#3d3d3d";
g.fillRect(0,34,sz,1);g.fillRect(0,34+st-1,sz,1);g.fillRect(34,0,1,sz);g.fillRect(34+st-1,0,1,sz);
g.fillStyle="#5a5a5a";
for(let i=2;i<sz;i+=8){g.fillRect(i,34+Math.floor(st/2),3,1);g.fillRect(34+Math.floor(st/2),i,1,3);}
g.fillStyle="#7a7a7a";
for(let i=-4;i<=4;i+=3){g.fillRect(34+1+i+Math.floor(st/2),31,1,3);g.fillRect(34+1+i+Math.floor(st/2),34+st,1,3);}
drawHouse(g,0,0);drawWood(g,34+st,0);drawPolice(g,0,34+st);drawHosp(g,34+st,34+st);
g.fillStyle=FG;
g.fillRect(15,34,2,st);
groundDots(g,sz,sz,(x,y)=>(y>=34&&y<34+st)||(x>=34&&x<34+st));
return c;})();
const BLK_MERGED=(()=>{const sz=68,c=mk(sz),g=c.getContext("2d");
drawHouse(g,0,0);drawWood(g,34,0);drawPolice(g,0,34);drawHosp(g,34,34);
g.fillStyle=FG;
disc(g,34,14,2.5);disc(g,33,30,2);
g.fillRect(15,32,2,2);g.fillRect(17,34,2,2);g.fillRect(19,36,2,1);
g.fillStyle="#2c2c2c";
g.fillRect(0,33,sz,1);g.fillRect(33,0,1,sz);
groundDots(g,sz,sz,null);
return c;})();

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function edgeR(x,y,w,h,col){px(x,y,w,1,col);px(x,y+h-1,w,1,col);px(x,y,1,h,col);px(x+w-1,y,1,h,col);}

const SIGILS=[[SG_HOUSE,"HOUSE"],[SG_WOOD,"WOOD"],[SG_DEF,"DEFENSE"],[SG_HOSP,"HOSPITAL"],[SG_ZOMBIE,"ZOMBIE"],[SG_HAT,"HAT"],[SG_SWORD,"SWORD"],[SG_BOW,"BOW"]];

function draw(){
px(0,0,W,H,BG);
text7("SIGIL SET",24,12,2);
for(let i=0;i<8;i++){
const x=24+i*116;
edgeR(x-1,39,70,70,DIM);
blit(SIGILS[i][0],x,40,2);
text7(SIGILS[i][1],x+34,116,1,"c",DIM);
}
text7("CONNECTED BLOCK  MICRO SPRITE",24,152,2);
blit(BLK_STREET,140,186,3);
text7("STREETS",251,420,1,"c",DIM);
blit(BLK_MERGED,560,186,3);
text7("MERGED",662,420,1,"c",DIM);
text7("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2)),936,524,1,"r",DIM);
}
addEventListener("resize",()=>{fit();});
fit();function step(){draw();requestAnimationFrame(step);}step();
</script>
</body>
</html>
