<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>style board</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,FG="#f2f2f0",BG="#000",DIM="#333333",RED="#d4382c";
const GRD="#383838",MIDG="#9a9a9a",LITE="#d8d8d8";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;

const F7={
"A":[".XXX.","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"B":["XXXX.","X...X","X...X","XXXX.","X...X","X...X","XXXX."],
"C":[".XXX.","X...X","X....","X....","X....","X...X",".XXX."],
"D":["XXXX.","X...X","X...X","X...X","X...X","X...X","XXXX."],
"E":["XXXXX","X....","X....","XXXX.","X....","X....","XXXXX"],
"F":["XXXXX","X....","X....","XXXX.","X....","X....","X...."],
"G":[".XXX.","X...X","X....","X.XXX","X...X","X...X",".XXXX"],
"H":["X...X","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"I":["XXXXX","..X..","..X..","..X..","..X..","..X..","XXXXX"],
"J":["..XXX","...X.","...X.","...X.","...X.","X..X.",".XX.."],
"K":["X...X","X..X.","X.X..","XX...","X.X..","X..X.","X...X"],
"L":["X....","X....","X....","X....","X....","X....","XXXXX"],
"M":["X...X","XX.XX","X.X.X","X.X.X","X...X","X...X","X...X"],
"N":["X...X","XX..X","X.X.X","X..XX","X...X","X...X","X...X"],
"O":[".XXX.","X...X","X...X","X...X","X...X","X...X",".XXX."],
"P":["XXXX.","X...X","X...X","XXXX.","X....","X....","X...."],
"Q":[".XXX.","X...X","X...X","X...X","X.X.X","X..X.",".XX.X"],
"R":["XXXX.","X...X","X...X","XXXX.","X.X..","X..X.","X...X"],
"S":[".XXXX","X....","X....",".XXX.","....X","....X","XXXX."],
"T":["XXXXX","..X..","..X..","..X..","..X..","..X..","..X.."],
"U":["X...X","X...X","X...X","X...X","X...X","X...X",".XXX."],
"V":["X...X","X...X","X...X","X...X","X...X",".X.X.","..X.."],
"W":["X...X","X...X","X...X","X.X.X","X.X.X","XX.XX","X...X"],
"X":["X...X","X...X",".X.X.","..X..",".X.X.","X...X","X...X"],
"Y":["X...X","X...X",".X.X.","..X..","..X..","..X..","..X.."],
"Z":["XXXXX","....X","...X.","..X..",".X...","X....","XXXXX"],
"0":[".XXX.","X...X","X..XX","X.X.X","XX..X","X...X",".XXX."],
"1":["..X..",".XX..","..X..","..X..","..X..","..X..","XXXXX"],
"2":[".XXX.","X...X","....X","..XX.",".X...","X....","XXXXX"],
"3":[".XXX.","X...X","....X","..XX.","....X","X...X",".XXX."],
"4":["...X.","..XX.",".X.X.","X..X.","XXXXX","...X.","...X."],
"5":["XXXXX","X....","XXXX.","....X","....X","X...X",".XXX."],
"6":[".XXX.","X....","X....","XXXX.","X...X","X...X",".XXX."],
"7":["XXXXX","....X","...X.","..X..",".X...",".X...",".X..."],
"8":[".XXX.","X...X","X...X",".XXX.","X...X","X...X",".XXX."],
"9":[".XXX.","X...X","X...X",".XXXX","....X","....X",".XXX."],
".":[".....",".....",".....",".....",".....","..X..","....."],
" ":[".....",".....",".....",".....",".....",".....","....."]
};
function tw7(s,n){return (s.length*6-1)*n;}
function rr(v){return Math.round(v*S);}
function px(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function text7(s,x,y,n,al,col){col=col||FG;if(al==="c")x=Math.round(x-tw7(s,n)/2);if(al==="r")x=Math.round(x-tw7(s,n));for(const ch of s){const g=F7[ch];if(g)for(let r=0;r<7;r++)for(let q=0;q<5;q++)if(g[r][q]==="X")px(x+q*n,y+r*n,n,n,col);x+=6*n;}}

const CLUMPS=[[9,10,5],[17,7,4],[23,12,5],[8,20,4],[16,17,5],[24,21,4],[12,25,4],[20,26,3]];
function mk(n){const c=document.createElement("canvas");c.width=n;c.height=n;return c;}
function discCells(g,cx0,cy0,r,fill){for(let y=Math.floor(cy0-r);y<=cy0+r;y++){const dy=y-cy0,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx0-hw);x<=Math.floor(cx0+hw);x++){if(x<1||x>28||y<1||y>28)continue;fill(x,y);}}}
function ringCells(g,cx0,cy0,r,fill){for(let y=0;y<30;y++)for(let x=0;x<30;x++){const d=Math.hypot(x-cx0,y-cy0);if(d<=r&&d>=r-1.2&&x>0&&x<29&&y>0&&y<29)fill(x,y);}}

function T_chunky(){const c=mk(30),g=c.getContext("2d");g.fillStyle=FG;for(const cl of CLUMPS)discCells(g,cl[0],cl[1],cl[2],(x,y)=>g.fillRect(x,y,1,1));return c;}
function T_dither(){const c=mk(30),g=c.getContext("2d");g.fillStyle=FG;
const cells=new Set();for(const cl of CLUMPS)discCells(g,cl[0],cl[1],cl[2],(x,y)=>cells.add(x+"_"+y));
for(const key of cells){const [x,y]=key.split("_").map(Number);const d=Math.min(x,y,29-x,29-y);
let on=true;if(d<3)on=(x%2===0&&y%2===0);else if(d<5)on=((x+y)%2===0);
if(on)g.fillRect(x,y,1,1);}
for(let i=0;i<26;i++){const x=(i*7+3)%28+1,y=(i*11+5)%28+1;if(!cells.has(x+"_"+y)&&((x+y)%7===0))g.fillRect(x,y,1,1);}
return c;}
function T_ink(){const c=mk(30),g=c.getContext("2d");g.fillStyle="#f2f2f0";g.fillRect(0,0,30,30);g.fillStyle="#000";for(const cl of CLUMPS)discCells(g,cl[0],cl[1],cl[2],(x,y)=>g.fillRect(x,y,1,1));return c;}
function T_blue(){const c=mk(30),g=c.getContext("2d");g.fillStyle=FG;for(const cl of CLUMPS)ringCells(g,cl[0],cl[1],cl[2],(x,y)=>g.fillRect(x,y,1,1));return c;}
function T_geo(){const c=mk(30),g=c.getContext("2d");g.fillStyle=FG;
for(let r=0;r<3;r++)for(let q=0;q<3;q++){const cx0=6+q*9,ty=4+r*9;
for(let i=0;i<5;i++){const half=Math.floor(i*0.7);for(let x=cx0-half;x<=cx0+half;x++)g.fillRect(x,ty+i,1,1);}g.fillRect(cx0,ty+5,1,1);}
return c;}
function T_pat(){const c=mk(30),g=c.getContext("2d");g.fillStyle=FG;
for(let y=2;y<28;y++)for(let x=2;x<28;x++){const h=Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;
let d=0.10;for(const cl of CLUMPS){if(Math.hypot(x-cl[0],y-cl[1])<cl[2]+1)d=0.34;}
if(h<d)g.fillRect(x,y,1,1);}
return c;}
function T_gray(){const c=mk(30),g=c.getContext("2d");
g.fillStyle=GRD;g.fillRect(0,0,30,30);
g.fillStyle=MIDG;for(const cl of CLUMPS)discCells(g,cl[0],cl[1],cl[2],(x,y)=>g.fillRect(x,y,1,1));
g.fillStyle=LITE;for(const cl of CLUMPS)discCells(g,cl[0]-1,cl[1]-1,Math.max(1,cl[2]-2),(x,y)=>{const d=Math.hypot(x-(cl[0]-1),y-(cl[1]-1));if(d<cl[2]-2&&(x+y)%2===0)g.fillRect(x,y,1,1);});
return c;}
function T_red(){const c=T_chunky(),g=c.getContext("2d");g.fillStyle="#000";g.fillRect(13,20,4,4);g.fillStyle=RED;g.fillRect(14,21,2,2);return c;}
const TILES=[
[T_chunky(),"A CHUNKY 1 BIT",0],
[T_dither(),"B DITHER FOG EDGE",0],
[T_ink(),"C INK ON WHITE",1],
[T_blue(),"D BLUEPRINT",2],
[T_geo(),"E GEOMETRIC",0],
[T_pat(),"F PATTERN FILL",0],
[T_gray(),"G GRAYSCALE",3],
[T_red(),"H ONE RED ACCENT",0]
];

function ringSprite(col){const c=mk(15),g=c.getContext("2d");g.fillStyle=col;for(let y=0;y<15;y++)for(let x=0;x<15;x++){const d=Math.hypot(x-7,y-7);if(d<=7.2&&d>=4.6)g.fillRect(x,y,1,1);}return c;}
const RING_W=ringSprite(FG),RING_B=ringSprite("#000");

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function edge(x,y,w,h,col){px(x,y,w,1,col);px(x,y+h-1,w,1,col);px(x,y,1,h,col);px(x+w-1,y,1,h,col);}
function dashEdge(x,y,w,h,col){for(let i=0;i<w;i+=6){px(x+i,y,3,1,col);px(x+i,y+h-1,3,1,col);}for(let i=0;i<h;i+=6){px(x,y+i,1,3,col);px(x+w-1,y+i,1,3,col);}}

let mx=80,mdir=1;
function update(dt){mx+=mdir*40*dt/1000;if(mx>880){mx=880;mdir=-1}if(mx<80){mx=80;mdir=1}}

function draw(){
px(0,0,W,H,BG);
text7("TILE AND SURVIVOR STYLE BOARD  TOP DOWN",24,14,2);
for(let i=0;i<8;i++){
const col=i%4,row=(i/4)|0,x=20+col*235,y=56+row*205;
const t=TILES[i],mode=t[2];
if(mode===1)px(x,y,225,196,"#f2f2f0");
text7(t[1],x+8,y+8,1,null,mode===1?"#000":FG);
const tx=x+12,ty=y+26;
if(mode===0||mode===3){if(i!==1)edge(tx-1,ty-1,92,92,DIM);}
if(mode===2)dashEdge(tx-1,ty-1,92,92,FG);
blit(t[0],tx,ty,3);
const mcx=x+160,mcy=y+120;
const ringcol=mode===1?RING_B:RING_W;
blit(ringcol,mcx-15,mcy-15,2);
text7("MARA",mcx,mcy-42,2,"c",mode===1?"#000":FG);
}
blit(RING_W,mx-15,490,2);
text7("REED",mx,463,2,"c");
text7("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2)),936,525,1,"r");
}
let last=performance.now();
function step(t){const dt=Math.min(100,t-last);last=t;update(dt);draw();requestAnimationFrame(step);}
addEventListener("resize",()=>{fit();});
fit();requestAnimationFrame(step);
</script>
</body>
</html>
