<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>micro tiles v2</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,FG="#f2f2f0",BG="#000",DIM="#333333";
const ROAD="#161616",LOT="#2a2a2a",CURB="#3d3d3d",DASH="#5a5a5a",GDOT="#4a4a4a",WATER="#10161c";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;

const F7={
"A":[".XXX.","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"B":["XXXX.","X...X","X...X","XXXX.","X...X","X...X","XXXX."],
"C":[".XXX.","X...X","X....","X....","X....","X...X",".XXX."],
"D":["XXXX.","X...X","X...X","X...X","X...X","X...X","XXXX."],
"E":["XXXXX","X....","X....","XXXX.","X....","X....","XXXXX"],
"F":["XXXXX","X....","X....","XXXX.","X....","X....","X...."],
"G":[".XXX.","X...X","X....","X.XXX","X...X","X...X",".XXXX"],
"H":["X...X","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"I":["XXXXX","..X..","..X..","..X..","..X..","..X..","XXXXX"],
"K":["X...X","X..X.","X.X..","XX...","X.X..","X..X.","X...X"],
"L":["X....","X....","X....","X....","X....","X....","XXXXX"],
"M":["X...X","XX.XX","X.X.X","X.X.X","X...X","X...X","X...X"],
"N":["X...X","XX..X","X.X.X","X..XX","X...X","X...X","X...X"],
"O":[".XXX.","X...X","X...X","X...X","X...X","X...X",".XXX."],
"P":["XXXX.","X...X","X...X","XXXX.","X....","X....","X...."],
"R":["XXXX.","X...X","X...X","XXXX.","X.X..","X..X.","X...X"],
"S":[".XXXX","X....","X....",".XXX.","....X","....X","XXXX."],
"T":["XXXXX","..X..","..X..","..X..","..X..","..X..","..X.."],
"U":["X...X","X...X","X...X","X...X","X...X","X...X",".XXX."],
"V":["X...X","X...X","X...X","X...X","X...X",".X.X.","..X.."],
"W":["X...X","X...X","X...X","X.X.X","X.X.X","XX.XX","X...X"],
"X":["X...X","X...X",".X.X.","..X..",".X.X.","X...X","X...X"],
"0":[".XXX.","X...X","X..XX","X.X.X","XX..X","X...X",".XXX."],
"1":["..X..",".XX..","..X..","..X..","..X..","..X..","XXXXX"],
"2":[".XXX.","X...X","....X","..XX.",".X...","X....","XXXXX"],
"3":[".XXX.","X...X","....X","..XX.","....X","X...X",".XXX."],
"7":["XXXXX","....X","...X.","..X..",".X...",".X...",".X..."],
"8":[".XXX.","X...X","X...X",".XXX.","X...X","X...X",".XXX."],
"9":[".XXX.","X...X","X...X",".XXXX","....X","....X",".XXX."],
"6":[".XXX.","X....","X....","XXXX.","X...X","X...X",".XXX."],
"5":["XXXXX","X....","XXXX.","....X","....X","X...X",".XXX."],
"4":["...X.","..XX.",".X.X.","X..X.","XXXXX","...X.","...X."],
".":[".....",".....",".....",".....",".....","..X..","....."],
" ":[".....",".....",".....",".....",".....",".....","....."]
};
function tw7(s,n){return (s.length*6-1)*n;}
function rr(v){return Math.round(v*S);}
function px(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function text7(s,x,y,n,al,col){col=col||FG;if(al==="c")x=Math.round(x-tw7(s,n)/2);if(al==="r")x=Math.round(x-tw7(s,n));for(const ch of s){const g=F7[ch];if(g)for(let r=0;r<7;r++)for(let q=0;q<5;q++)if(g[r][q]==="X")px(x+q*n,y+r*n,n,n,col);x+=6*n;}}

function disc(g,cx0,cy0,r){for(let y=Math.floor(cy0-r);y<=Math.ceil(cy0+r);y++){const dy=y-cy0,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx0-hw);x<=Math.floor(cx0+hw);x++)g.fillRect(x,y,1,1);}}

function drawHouse(g,ox,oy){
g.fillStyle=LOT;g.fillRect(ox+9,oy+28,3,6);g.fillRect(ox+17,oy+20,6,5);
g.fillStyle=FG;
g.fillRect(ox+4,oy+6,20,10);
g.fillRect(ox+7,oy+16,8,12);
g.clearRect(ox+7,oy+10,15,1);
g.clearRect(ox+5,oy+8,1,1);g.clearRect(ox+6,oy+9,1,1);g.clearRect(ox+5,oy+13,1,1);g.clearRect(ox+6,oy+12,1,1);
g.clearRect(ox+22,oy+8,1,1);g.clearRect(ox+21,oy+9,1,1);g.clearRect(ox+22,oy+13,1,1);g.clearRect(ox+21,oy+12,1,1);
g.clearRect(ox+10,oy+17,1,10);
g.clearRect(ox+18,oy+7,2,2);
g.fillRect(ox+19,oy+22,1,1);
disc(g,ox+28,oy+9,2.5);
g.fillRect(ox+25,oy+29,2,2);g.fillRect(ox+28,oy+29,2,2);g.fillRect(ox+31,oy+29,2,2);
}
function drawPark(g,ox,oy){
g.fillStyle=LOT;g.fillRect(ox+0,oy+16,11,3);
g.fillStyle=LOT;disc(g,ox+14,oy+18,3.5);
g.fillStyle=FG;
disc(g,ox+9,oy+8,4);disc(g,ox+16,oy+5,2);disc(g,ox+6,oy+26,2.5);disc(g,ox+29,oy+22,2.5);disc(g,ox+24,oy+28,2);
disc(g,ox+24,oy+10,4.6);disc(g,ox+27,oy+14,3.6);
g.fillStyle=WATER;disc(g,ox+24,oy+10,3.6);disc(g,ox+27,oy+14,2.6);
g.fillStyle=FG;g.fillRect(ox+23,oy+10,1,1);g.fillRect(ox+26,oy+13,1,1);
disc(g,ox+14,oy+18,1.5);g.clearRect(ox+14,oy+18,1,1);
g.fillRect(ox+19,oy+30,1,1);g.fillRect(ox+30,oy+6,1,1);g.fillRect(ox+4,oy+20,1,1);
}
function drawPolice(g,ox,oy){
g.fillStyle=LOT;g.fillRect(ox+9,oy+0,3,13);g.fillRect(ox+20,oy+21,14,11);
g.fillStyle=FG;
g.fillRect(ox+4,oy+13,22,7);
g.fillRect(ox+4,oy+20,9,8);
g.clearRect(ox+9,oy+13,3,2);
g.clearRect(ox+6,oy+15,2,1);g.clearRect(ox+6,oy+17,2,1);
g.clearRect(ox+21,oy+14,3,3);g.fillRect(ox+22,oy+15,1,1);
g.fillRect(ox+20,oy+20,14,1);g.fillRect(ox+19,oy+21,1,11);g.fillRect(ox+20,oy+32,14,1);
g.fillStyle=FG;
g.fillRect(ox+22,oy+23,6,4);g.clearRect(ox+26,oy+24,1,2);g.clearRect(ox+23,oy+24,1,1);
g.fillRect(ox+22,oy+28,6,4);g.clearRect(ox+26,oy+29,1,2);g.clearRect(ox+23,oy+29,1,1);
}
function drawHosp(g,ox,oy){
g.fillStyle=LOT;g.fillRect(ox+15,oy+0,4,7);g.fillRect(ox+0,oy+16,6,3);
g.fillStyle=FG;
g.fillRect(ox+6,oy+14,24,8);
g.fillRect(ox+13,oy+7,10,22);
g.clearRect(ox+16,oy+16,4,4);
g.clearRect(ox+8,oy+15,2,1);g.clearRect(ox+8,oy+20,2,1);g.clearRect(ox+26,oy+15,2,1);g.clearRect(ox+26,oy+20,2,1);
g.clearRect(ox+14,oy+9,1,2);g.clearRect(ox+21,oy+9,1,2);g.clearRect(ox+14,oy+25,1,2);g.clearRect(ox+21,oy+25,1,2);
disc(g,ox+28,oy+28,4.2);
g.fillStyle=WATER;disc(g,ox+28,oy+28,3.2);
g.fillStyle=FG;
g.fillRect(ox+26,oy+26,1,4);g.fillRect(ox+30,oy+26,1,4);g.fillRect(ox+27,oy+28,3,1);
g.fillRect(ox+15,oy+1,4,6);g.clearRect(ox+16,oy+2,2,2);
}

function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function tileCanvas(fn){const c=mk(34),g=c.getContext("2d");fn(g,0,0);return c;}
const T_HOUSE=tileCanvas(drawHouse),T_PARK=tileCanvas(drawPark),T_POLICE=tileCanvas(drawPolice),T_HOSP=tileCanvas(drawHosp);

const BLOCK=(()=>{const sz=74,c=mk(sz),g=c.getContext("2d");
g.fillStyle=ROAD;g.fillRect(34,0,6,sz);g.fillRect(0,34,sz,6);
g.fillStyle=CURB;
g.fillRect(34,0,1,sz);g.fillRect(39,0,1,sz);g.fillRect(0,34,sz,1);g.fillRect(0,39,sz,1);
g.fillStyle=ROAD;g.fillRect(34,34,6,6);
g.fillStyle=DASH;
for(let i=2;i<30;i+=8){g.fillRect(36,i,1,4);g.fillRect(36,i+40,1,4);g.fillRect(i,36,4,1);g.fillRect(i+40,36,4,1);}
drawHouse(g,0,0);
drawPark(g,40,0);
drawPolice(g,0,40);
drawHosp(g,40,40);
g.fillStyle=LOT;
g.fillRect(9,34,3,1);
g.fillRect(39,16,1,3);
g.fillRect(9,39,3,1);
g.fillRect(34,61,1,5);
g.fillRect(55,39,4,1);
g.fillRect(39,56,1,3);
g.fillStyle=GDOT;
for(let y=1;y<sz-1;y++)for(let x=1;x<sz-1;x++){
if((x>=34&&x<=39)||(y>=34&&y<=39))continue;
const h=Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;
if(h<0.007)g.fillRect(x,y,1,1);
}
return c;})();

const DARK=new Image();DARK.src="../face_man_dark.png";

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function edgeR(x,y,w,h,col){px(x,y,w,1,col);px(x,y+h-1,w,1,col);px(x,y,1,h,col);px(x+w-1,y,1,h,col);}

function draw(){
px(0,0,W,H,BG);
text7("MICRO TILES V2  FROM SCRATCH",24,14,2);
const singles=[[T_HOUSE,"HOUSE",70,110],[T_PARK,"PARK",190,110],[T_POLICE,"POLICE",70,246],[T_HOSP,"HOSPITAL",190,246]];
for(const s of singles){
edgeR(s[2]-1,s[3]-1,104,104,DIM);
blit(s[0],s[2],s[3],3);
text7(s[1],s[2]+51,s[3]+108,1,"c",DIM);
}
blit(BLOCK,400,110,4);
text7("CONNECTED",548,420,1,"c",DIM);
if(DARK.width){const a=rr(770),b=rr(140);cx.drawImage(DARK,a,b,rr(770+118)-a,rr(140+120)-b);}
text7("PROFILE ON BLACK",829,272,1,"c",DIM);
text7("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2)),936,524,1,"r",DIM);
}
addEventListener("resize",()=>{fit();});
fit();function step(){draw();requestAnimationFrame(step);}step();
</script>
</body>
</html>
