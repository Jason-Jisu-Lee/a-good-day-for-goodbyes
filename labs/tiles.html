<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>style set 7 to 10</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,FG="#f2f2f0",BG="#000",DIM="#333333";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;

const F7={
"A":[".XXX.","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"B":["XXXX.","X...X","X...X","XXXX.","X...X","X...X","XXXX."],
"C":[".XXX.","X...X","X....","X....","X....","X...X",".XXX."],
"D":["XXXX.","X...X","X...X","X...X","X...X","X...X","XXXX."],
"E":["XXXXX","X....","X....","XXXX.","X....","X....","XXXXX"],
"F":["XXXXX","X....","X....","XXXX.","X....","X....","X...."],
"G":[".XXX.","X...X","X....","X.XXX","X...X","X...X",".XXXX"],
"H":["X...X","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"I":["XXXXX","..X..","..X..","..X..","..X..","..X..","XXXXX"],
"K":["X...X","X..X.","X.X..","XX...","X.X..","X..X.","X...X"],
"L":["X....","X....","X....","X....","X....","X....","XXXXX"],
"M":["X...X","XX.XX","X.X.X","X.X.X","X...X","X...X","X...X"],
"N":["X...X","XX..X","X.X.X","X..XX","X...X","X...X","X...X"],
"O":[".XXX.","X...X","X...X","X...X","X...X","X...X",".XXX."],
"P":["XXXX.","X...X","X...X","XXXX.","X....","X....","X...."],
"R":["XXXX.","X...X","X...X","XXXX.","X.X..","X..X.","X...X"],
"S":[".XXXX","X....","X....",".XXX.","....X","....X","XXXX."],
"T":["XXXXX","..X..","..X..","..X..","..X..","..X..","..X.."],
"U":["X...X","X...X","X...X","X...X","X...X","X...X",".XXX."],
"V":["X...X","X...X","X...X","X...X","X...X",".X.X.","..X.."],
"W":["X...X","X...X","X...X","X.X.X","X.X.X","XX.XX","X...X"],
"X":["X...X","X...X",".X.X.","..X..",".X.X.","X...X","X...X"],
"Y":["X...X","X...X",".X.X.","..X..","..X..","..X..","..X.."],
"0":[".XXX.","X...X","X..XX","X.X.X","XX..X","X...X",".XXX."],
"1":["..X..",".XX..","..X..","..X..","..X..","..X..","XXXXX"],
"7":["XXXXX","....X","...X.","..X..",".X...",".X...",".X..."],
"8":[".XXX.","X...X","X...X",".XXX.","X...X","X...X",".XXX."],
"9":[".XXX.","X...X","X...X",".XXXX","....X","....X",".XXX."],
"6":[".XXX.","X....","X....","XXXX.","X...X","X...X",".XXX."],
"5":["XXXXX","X....","XXXX.","....X","....X","X...X",".XXX."],
"4":["...X.","..XX.",".X.X.","X..X.","XXXXX","...X.","...X."],
"3":[".XXX.","X...X","....X","..XX.","....X","X...X",".XXX."],
"2":[".XXX.","X...X","....X","..XX.",".X...","X....","XXXXX"],
".":[".....",".....",".....",".....",".....","..X..","....."],
" ":[".....",".....",".....",".....",".....",".....","....."]
};
function tw7(s,n){return (s.length*6-1)*n;}
function rr(v){return Math.round(v*S);}
function px(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function text7(s,x,y,n,al,col){col=col||FG;if(al==="c")x=Math.round(x-tw7(s,n)/2);if(al==="r")x=Math.round(x-tw7(s,n));for(const ch of s){const g=F7[ch];if(g)for(let r=0;r<7;r++)for(let q=0;q<5;q++)if(g[r][q]==="X")px(x+q*n,y+r*n,n,n,col);x+=6*n;}}

function mk(n){const c=document.createElement("canvas");c.width=n;c.height=n;return c;}
const STAR=[
"....X....",
"....X....",
"...XXX...",
"XXXXXXXXX",
".XXXXXXX.",
"..XXXXX..",
".XXX.XXX.",
".XX...XX.",
".X.....X."
];

const T7P=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
const inside=(x,y,pad)=>{if(y<6+pad||y>27-pad)return false;const half=y<17?8-pad:Math.max(0,8-(y-16)*0.85)-pad;return Math.abs(x-16.5)<=half;};
for(let y=0;y<34;y++)for(let x=0;x<34;x++)if(inside(x,y,0)&&!inside(x,y,2))g.fillRect(x,y,1,1);
for(let r=0;r<9;r++)for(let q=0;q<9;q++)if(STAR[r][q]==="X")g.fillRect(12+q,9+r,1,1);
return c;})();
const T7A=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
for(let y=8;y<=14;y++){const half=(y-7)*1.3;for(let x=Math.ceil(16.5-half);x<=Math.floor(16.5+half);x++)g.fillRect(x,y,1,1);}
g.fillRect(10,15,14,11);
g.clearRect(15,20,4,6);
return c;})();
const T8P=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
for(let y=4;y<30;y++)for(let x=4;x<30;x++){const band=(y-4)%9;if(band<6){const c3=Math.floor(x/3)+Math.floor(y/3);if(c3%2===0)g.fillRect(x,y,1,1);}}
return c;})();
const T8A=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
for(let y=4;y<30;y++)for(let x=4;x<30;x++){const wx=(x-4)%6,wy=(y-4)%8;if(!(wx<3&&wy<4))g.fillRect(x,y,1,1);}
return c;})();
const T9P=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
g.fillRect(5,5,17,13);g.clearRect(8,8,3,3);g.clearRect(16,12,2,2);
const car=(x,y)=>{g.fillRect(x,y,7,4);g.clearRect(x+2,y+1,3,1);};
car(23,21);car(23,27);
g.fillRect(6,27,3,1);g.fillRect(12,27,3,1);g.fillRect(18,27,3,1);
return c;})();
const T9A=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
g.fillRect(5,5,12,14);g.clearRect(8,8,2,2);g.clearRect(13,14,2,2);
g.fillRect(20,8,10,10);g.clearRect(23,11,2,2);
for(let y=-2;y<=2;y++){const hw=Math.floor(Math.sqrt(Math.max(0,6.5-y*y)));for(let x=-hw;x<=hw;x++)g.fillRect(12+x,26+y,1,1);}
g.fillRect(21,24,7,4);g.clearRect(23,25,3,1);
return c;})();
const T10P=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
for(let y=0;y<34;y++)for(let x=0;x<34;x++){const d=Math.abs(x-16.5)+Math.abs(y-16.5);if(d>=6&&d<=8.2)g.fillRect(x,y,1,1);}
g.fillRect(5,11,2,12);g.fillRect(27,11,2,12);
return c;})();
const T10A=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
g.fillRect(10,10,14,2);g.fillRect(10,22,14,2);g.fillRect(10,10,2,14);g.fillRect(22,10,2,14);
g.clearRect(14,22,6,2);
g.fillRect(16,16,2,2);
return c;})();

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function edgeR(x,y,w,h,col){px(x,y,w,1,col);px(x,y+h-1,w,1,col);px(x,y,1,h,col);px(x+w-1,y,1,h,col);}

const COLS=[100,315,530,745];
const HEADS=["7 EMBLEM","8 PATTERN","9 MICRO SPRITE","10 SIGIL"];
const POL=[T7P,T8P,T9P,T10P],APT=[T7A,T8A,T9A,T10A];

function draw(){
px(0,0,W,H,BG);
text7("TILE STYLES 7 8 9 10",24,14,2);
for(let i=0;i<4;i++){
const x0=COLS[i];
text7(HEADS[i],x0+108,46,1,"c");
const tx=x0+57;
edgeR(tx-2,68,106,106,DIM);
blit(POL[i],tx,70,3);
edgeR(tx-2,210,106,106,DIM);
blit(APT[i],tx,212,3);
}
text7("POLICE",8,115,1,null,DIM);
text7("APARTMENT",8,257,1,null,DIM);
text7("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2)),936,522,1,"r");
}
addEventListener("resize",()=>{fit();});
fit();function step(){draw();requestAnimationFrame(step);}step();
</script>
</body>
</html>
