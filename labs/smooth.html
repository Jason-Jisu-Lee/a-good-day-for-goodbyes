<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>smooth</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:22px 0 12px}
.panel{text-align:center;padding-bottom:30px}
canvas{display:block;margin:0 auto;width:880px;max-width:96vw;border:1px solid #1a1a1a}
</style>
</head>
<body>
<h1>SMOOTH</h1>
<div class="panel"><canvas id="cv"></canvas></div>
<script>
const CW=880,CH=560,FGC="#f2f2f0";
const HW=118,HH=75,DX=172,DY=108;
const T={h:[440,150],a:[612,258],e1:[268,258],e2:[440,366]};
function lerp(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];}
function sub(a,b){return [a[0]-b[0],a[1]-b[1]];}
function add(a,b){return [a[0]+b[0],a[1]+b[1]];}
function edge(g,a,b){
g.beginPath();
g.moveTo(a[0],a[1]);
g.lineTo(b[0],b[1]);
g.stroke();
}
function dia(g,cxx,cyy){
g.save();
g.strokeStyle=FGC;
g.lineWidth=3;
g.lineCap="round";
g.setLineDash([20,13]);
g.lineDashOffset=0;
const vT=[cxx,cyy-HH],vR=[cxx+HW,cyy],vB=[cxx,cyy+HH],vL=[cxx-HW,cyy];
edge(g,vT,vR);
edge(g,vR,vB);
edge(g,vB,vL);
edge(g,vL,vT);
g.restore();
}
function street(g,pa,pb,u){
g.save();
g.strokeStyle="#6a6a6a";
g.lineWidth=2.5;
g.lineCap="round";
g.setLineDash([15,11]);
const m=[(pa[0]+pb[0])/2,(pa[1]+pb[1])/2];
g.beginPath();
g.moveTo(m[0]-u[0]*44,m[1]-u[1]*44);
g.lineTo(m[0]+u[0]*44,m[1]+u[1]*44);
g.stroke();
g.restore();
}
function shadow(g,x,y,rx,ry){
const gr=g.createRadialGradient(x,y,2,x,y,rx);
gr.addColorStop(0,"rgba(255,255,255,0.09)");
gr.addColorStop(1,"rgba(255,255,255,0)");
g.save();
g.translate(x,y);
g.scale(1,ry/rx);
g.translate(-x,-y);
g.fillStyle=gr;
g.beginPath();
g.arc(x,y,rx,0,7);
g.fill();
g.restore();
}
function poly(g,pts,fill){
g.beginPath();
g.moveTo(pts[0][0],pts[0][1]);
for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);
g.closePath();
g.fillStyle=fill;
g.fill();
}
function seam(g,a,b){
g.save();
g.strokeStyle="#000";
g.lineWidth=3;
g.lineJoin="round";
g.lineCap="round";
edge(g,a,b);
g.restore();
}
function house(g,X,Y){
const F=[X,Y+34],L=[X-74,Y-3],R=[X+74,Y-3];
const h=44;
const Fp=[F[0],F[1]-h],Lp=[L[0],L[1]-h],Rp=[R[0],R[1]-h];
const A=[X-37,Y-92];
const A2=add(A,sub(R,F));
shadow(g,X,Y+18,95,34);
poly(g,[F,R,Rp,Fp],FGC);
poly(g,[L,F,Fp,A,Lp],FGC);
poly(g,[A,A2,Rp,Fp],FGC);
seam(g,F,Fp);
seam(g,Fp,A);
seam(g,Fp,Rp);
const dbl=lerp(L,F,0.42),dbr=lerp(L,F,0.62);
const dtl=[dbl[0],dbl[1]-26],dtr=[dbr[0],dbr[1]-26];
g.fillStyle="#000";
g.beginPath();
g.moveTo(dbl[0],dbl[1]);
g.lineTo(dtl[0],dtl[1]);
g.quadraticCurveTo((dtl[0]+dtr[0])/2,(dtl[1]+dtr[1])/2-11,dtr[0],dtr[1]);
g.lineTo(dbr[0],dbr[1]);
g.closePath();
g.fill();
const w1=lerp(F,R,0.34),w2=lerp(F,R,0.62);
poly(g,[[w1[0],w1[1]-15],[w2[0],w2[1]-15],[w2[0],w2[1]-31],[w1[0],w1[1]-31]],"#000");
}
function apt(g,X,Y){
const F=[X,Y+26],L=[X-62,Y-5],R=[X+62,Y-5],B=[X,Y-36];
const h=96;
const Fp=[F[0],F[1]-h],Lp=[L[0],L[1]-h],Rp=[R[0],R[1]-h],Bp=[B[0],B[1]-h];
shadow(g,X,Y+14,82,30);
poly(g,[F,R,Rp,Fp],FGC);
poly(g,[L,F,Fp,Lp],FGC);
poly(g,[Fp,Rp,Bp,Lp],FGC);
seam(g,F,Fp);
seam(g,Fp,Rp);
seam(g,Fp,Lp);
g.fillStyle="#000";
const win=(a,b,t1,t2,u1,u2)=>{
const p1=lerp(a,b,t1),p2=lerp(a,b,t2);
poly(g,[[p1[0],p1[1]-u1],[p2[0],p2[1]-u1],[p2[0],p2[1]-u2],[p1[0],p1[1]-u2]],"#000");
};
for(let f=0;f<3;f++){
const u1=20+f*26,u2=u1+16;
win(F,L,0.2,0.44,u1,u2);
win(F,L,0.58,0.82,u1,u2);
win(F,R,0.2,0.44,u1,u2);
win(F,R,0.58,0.82,u1,u2);
}
win(F,L,0.08,0.3,0,16);
}
function render(){
const c=document.getElementById("cv");
const d=Math.max(1,Math.round(window.devicePixelRatio||1));
c.width=CW*d;c.height=CH*d;
const g=c.getContext("2d");
g.setTransform(d,0,0,d,0,0);
g.fillStyle="#000";g.fillRect(0,0,CW,CH);
dia(g,T.h[0],T.h[1]);
dia(g,T.a[0],T.a[1]);
dia(g,T.e1[0],T.e1[1]);
dia(g,T.e2[0],T.e2[1]);
const len=Math.hypot(HW,HH);
const ua=[HW/len,-HH/len],ub=[HW/len,HH/len];
street(g,T.h,T.a,ua);
street(g,T.h,T.e1,ub);
street(g,T.e1,T.e2,ua);
street(g,T.a,T.e2,ub);
house(g,T.h[0],T.h[1]-16);
apt(g,T.a[0],T.a[1]-14);
}
render();
addEventListener("resize",render);
</script>
</body>
</html>
