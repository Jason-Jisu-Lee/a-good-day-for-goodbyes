<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>block board</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:20px 0 10px}
#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:26px;max-width:1680px;margin:0 auto;padding:18px}
.panel{text-align:center}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:520px;max-width:100%}
.cap{color:#ddd;font-size:13px;letter-spacing:2px;margin-top:10px}
</style>
</head>
<body>
<h1>BLOCK BOARD / APARTMENT HOUSE GROCERY SCRAPYARD</h1>
<div id="grid">
<div class="panel"><canvas id="c0"></canvas><div class="cap">A FLAT BOXES</div></div>
<div class="panel"><canvas id="c1"></canvas><div class="cap">B GABLE VILLAGE</div></div>
<div class="panel"><canvas id="c2"></canvas><div class="cap">C SHADOW MASS</div></div>
<div class="panel"><canvas id="c3"></canvas><div class="cap">D BLUEPRINT</div></div>
<div class="panel"><canvas id="c4"></canvas><div class="cap">E ROUNDED TOY</div></div>
<div class="panel"><canvas id="c5"></canvas><div class="cap">F DITHERWORK</div></div>
</div>
<script>
const FG="#f2f2f0",BG="#000000",LOTG="#1a1a1a",SW="#232323",SWE="#2e2e2e",ROADC="#0f0f0f",DASHC="#303030",SEAM="#0d0d0d";
const PW=260,PH=300;
let SS=2,q=null;
function R(v){return Math.round(v*SS);}
function pq(x,y,w,h,col){q.fillStyle=col;const a=R(x),b=R(y);q.fillRect(a,b,R(x+w)-a,R(y+h)-b);}
function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function bl(s,x,y){const a=R(x),b=R(y);q.drawImage(s,a,b,R(x+s.width*3)-a,R(y+s.height*3)-b);}
function hash2(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;}
function C34(fn){const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}
function disc(g,cx,cy,r){for(let y=Math.floor(cy-r);y<=Math.ceil(cy+r);y++){const dy=y-cy,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx-hw);x<=Math.floor(cx+hw);x++)g.fillRect(x,y,1,1);}}
function ringO(g,cx,cy,ro,ri){for(let y=0;y<34;y++)for(let x=0;x<34;x++){const d=Math.hypot(x-cx,y-cy);if(d<=ro&&d>=ri)g.fillRect(x,y,1,1);}}
function seg(g,x0,y0,x1,y1){const n=Math.max(Math.abs(x1-x0),Math.abs(y1-y0));for(let i=0;i<=n;i++){g.fillRect(Math.round(x0+(x1-x0)*i/n),Math.round(y0+(y1-y0)*i/n),1,1);}}
function rect1(g,x,y,w,h){g.fillRect(x,y,w,1);g.fillRect(x,y+h-1,w,1);g.fillRect(x,y,1,h);g.fillRect(x+w-1,y,1,h);}

const A_ap=C34(g=>{
for(let r=0;r<4;r++)g.fillRect(5+r,7-r,13,1);
g.fillRect(5,8,12,21);
for(let k=0;k<4;k++)g.fillRect(17+k,8-k,1,21);
g.clearRect(5,8,12,1);
for(let gy=0;gy<4;gy++)for(let gx=0;gx<2;gx++)g.clearRect(7+gx*5,11+gy*4,2,2);
g.clearRect(9,26,3,3);
});
const A_ho=C34(g=>{
for(let r=0;r<3;r++)g.fillRect(4+r,18-r,15,1);
g.fillRect(4,19,14,10);
for(let k=0;k<3;k++)g.fillRect(18+k,19-k,1,10);
g.clearRect(4,19,14,1);
g.clearRect(7,24,3,5);
g.clearRect(13,22,3,3);
});
const A_gr=C34(g=>{
for(let r=0;r<4;r++)g.fillRect(2+r,18-r,23,1);
g.fillRect(2,19,22,10);
for(let k=0;k<4;k++)g.fillRect(24+k,19-k,1,10);
g.clearRect(2,19,22,1);
g.clearRect(4,22,12,4);
g.clearRect(18,23,4,6);
});
const A_sc=C34(g=>{
g.fillRect(3,15,26,1);
for(let x=3;x<30;x+=4)g.fillRect(x,14,1,2);
g.fillRect(3,15,1,13);
g.fillRect(28,15,1,13);
g.fillRect(3,27,9,1);
g.fillRect(20,27,9,1);
g.fillRect(8,23,6,3);g.fillRect(9,21,4,2);
g.fillRect(19,24,6,3);g.fillRect(21,22,3,2);
});

const B_ap=C34(g=>{
for(let r=0;r<5;r++)g.fillRect(4+r,12-r,15,1);
g.fillRect(4,13,14,16);
for(let k=0;k<5;k++)g.fillRect(18+k,13-k,1,16);
g.clearRect(4,13,14,1);
g.fillRect(16,6,2,3);
g.clearRect(6,15,3,2);g.clearRect(12,15,3,2);
g.clearRect(6,19,3,2);g.clearRect(12,19,3,2);
g.clearRect(6,23,3,2);g.clearRect(12,23,3,2);
g.clearRect(8,26,4,3);
});
const B_ho=C34(g=>{
for(let y=16;y<=21;y++){const hw=y-16;g.fillRect(9-hw,y,2*hw+2,1);}
g.fillRect(4,22,12,7);
for(let k=0;k<3;k++)g.fillRect(16+k,22-k,1,7);
g.clearRect(8,24,3,5);
g.clearRect(8,19,3,2);
});
const B_gr=C34(g=>{
for(let y=13;y<=17;y++){const hw=(y-13)*2;g.fillRect(12-hw,y,2*hw+2,1);}
g.fillRect(4,18,18,11);
for(let k=0;k<3;k++)g.fillRect(22+k,18-k,1,11);
g.fillRect(4,24,17,1);
g.fillRect(6,25,1,4);g.fillRect(18,25,1,4);
g.clearRect(11,25,4,4);
g.clearRect(6,20,6,2);
});
const B_sc=C34(g=>{
for(let y=17;y<=20;y++){const hw=y-17;g.fillRect(8-hw,y,2*hw+2,1);}
g.fillRect(5,21,1,8);g.fillRect(12,21,1,8);
g.fillRect(7,25,4,3);
g.fillRect(18,24,6,4);g.fillRect(20,22,3,2);
g.fillRect(16,28,12,1);
});

const C_ap=C34(g=>{
g.fillRect(4,16,14,13);
g.fillRect(6,8,10,8);
g.fillRect(8,5,6,3);
g.fillStyle=BG;
for(let k=0;k<4;k++)g.fillRect(18+k,16-k,1,13);
g.fillStyle=FG;
g.clearRect(7,19,2,2);g.clearRect(13,19,2,2);
g.clearRect(7,22,2,2);g.clearRect(13,22,2,2);
g.clearRect(9,10,2,2);
g.clearRect(9,25,4,4);
});
const C_ho=C34(g=>{
for(let y=14;y<=19;y++){const hw=Math.round((y-14)*1.4);g.fillRect(10-hw,y,2*hw+2,1);}
g.fillRect(3,20,14,9);
g.fillStyle=BG;
for(let k=0;k<4;k++)g.fillRect(17+k,20-k,1,9);
g.fillStyle=FG;
g.clearRect(8,24,3,5);
});
const C_gr=C34(g=>{
g.fillRect(2,17,22,12);
g.fillStyle=BG;
for(let k=0;k<4;k++)g.fillRect(24+k,17-k,1,12);
g.fillStyle=FG;
g.clearRect(0,20,26,1);
g.fillRect(0,21,26,3);
g.clearRect(4,25,9,2);
g.clearRect(17,25,4,4);
});
const C_sc=C34(g=>{
g.fillRect(4,24,8,5);g.fillRect(6,22,4,2);
g.fillRect(14,25,7,4);g.fillRect(16,23,3,2);
g.fillRect(23,26,6,3);
g.fillRect(26,11,1,15);
g.fillRect(19,11,8,1);
g.fillRect(20,12,1,3);
g.fillRect(19,15,3,1);
});

const D_ap=C34(g=>{
rect1(g,5,7,13,22);
seg(g,5,7,8,4);seg(g,17,7,20,4);seg(g,8,4,20,4);
for(let gy=0;gy<5;gy++){g.fillRect(7,10+gy*4,1,1);g.fillRect(10,10+gy*4,1,1);}
rect1(g,9,25,4,4);
seg(g,15,9,12,12);seg(g,12,12,15,15);seg(g,15,15,12,18);seg(g,12,18,15,21);
});
const D_ho=C34(g=>{
seg(g,10,14,4,20);seg(g,11,14,17,20);
rect1(g,4,20,14,9);
seg(g,1,22,8,22);
g.fillRect(1,23,1,6);g.fillRect(8,23,1,6);
rect1(g,4,24,3,5);
rect1(g,12,22,3,3);
});
const D_gr=C34(g=>{
rect1(g,3,15,15,14);
rect1(g,17,21,11,8);
seg(g,3,15,6,12);seg(g,17,15,20,12);seg(g,6,12,20,12);
seg(g,4,19,16,19);
rect1(g,20,24,4,5);
g.fillRect(6,22,1,1);g.fillRect(10,22,1,1);g.fillRect(14,22,1,1);
});
const D_sc=C34(g=>{
rect1(g,2,16,28,13);
for(let x=2;x<30;x+=4)g.fillRect(x,15,1,1);
g.clearRect(12,28,7,1);
rect1(g,7,23,10,4);
g.fillRect(9,27,2,1);g.fillRect(13,27,2,1);
rect1(g,9,18,9,4);
});

const E_ap=C34(g=>{
disc(g,12,10,6);
g.fillRect(6,10,12,19);
for(let k=0;k<2;k++)g.fillRect(18+k,11-k,1,18);
g.fillStyle=BG;
disc(g,9,16,1.6);disc(g,15,16,1.6);
disc(g,9,21,1.6);disc(g,15,21,1.6);
g.fillRect(10,25,5,4);disc(g,12,25,2);
g.fillStyle=FG;
});
const E_ho=C34(g=>{
disc(g,10,20,6.5);
g.fillRect(4,20,13,9);
g.fillStyle=BG;
g.fillRect(7,25,3,4);disc(g,8,25,1.5);
disc(g,13,22,1.6);
g.fillStyle=FG;
});
const E_gr=C34(g=>{
g.fillRect(3,18,20,11);
disc(g,6,18,2.2);disc(g,11,18,2.2);disc(g,16,18,2.2);disc(g,21,18,2.2);
g.fillStyle=BG;
disc(g,7,23,1.6);disc(g,18,23,1.6);
g.fillRect(10,25,5,4);disc(g,12,25,2);
g.fillStyle=FG;
});
const E_sc=C34(g=>{
ringO(g,8,25,3.4,1.6);
ringO(g,14,26,2.6,1.2);
disc(g,22,25,4);disc(g,26,26,3);
});

const F_ap=C34(g=>{
g.fillRect(4,8,15,1);
g.fillRect(5,9,13,20);
g.fillRect(7,5,4,3);
for(let k=0;k<3;k++)for(let y=9-k;y<29-k;y++)if((18+k+y)%2===0)g.fillRect(18+k,y,1,1);
g.clearRect(7,12,3,2);g.clearRect(12,12,3,2);
g.clearRect(7,17,3,2);g.clearRect(12,17,3,2);
g.clearRect(7,22,3,2);g.clearRect(12,22,3,2);
g.clearRect(9,26,4,3);
g.clearRect(6,11,1,1);g.clearRect(16,14,1,1);g.clearRect(6,20,1,1);g.clearRect(16,24,1,1);
});
const F_ho=C34(g=>{
for(let r=0;r<4;r++)g.fillRect(3+r,17-r,16,1);
g.fillRect(3,18,15,11);
for(let k=0;k<3;k++)for(let y=18-k;y<29-k;y++)if((18+k+y)%2===0)g.fillRect(18+k,y,1,1);
g.fillRect(15,11,2,3);
g.fillRect(14,8,1,1);g.fillRect(13,6,1,1);
g.clearRect(6,23,3,6);
g.clearRect(12,21,4,3);
});
const F_gr=C34(g=>{
g.fillRect(3,14,20,15);
g.clearRect(3,19,20,1);
for(let x=4;x<22;x+=2)g.clearRect(x,20,1,2);
g.clearRect(3,23,20,1);
g.clearRect(5,25,7,2);
g.clearRect(16,24,4,5);
for(let k=0;k<3;k++)for(let y=14-k;y<29-k;y++)if((23+k+y)%2===0)g.fillRect(23+k,y,1,1);
});
const F_sc=C34(g=>{
for(let r=0;r<3;r++)g.fillRect(3+r,15-r,13,1);
g.fillRect(3,16,12,13);
for(let x=4;x<15;x+=2)g.clearRect(x,18,1,9);
g.clearRect(9,22,5,7);
for(let y=22;y<=28;y++){const half=y-21;for(let x=22-half;x<=22+half;x++)if((x+y)%2===0&&x<32)g.fillRect(x,y,1,1);}
g.fillRect(20,26,3,2);g.fillRect(24,27,2,1);
});

const PANELS=[
{ap:A_ap,ho:A_ho,gr:A_gr,sc:A_sc,sh:"solid"},
{ap:B_ap,ho:B_ho,gr:B_gr,sc:B_sc,sh:"solid"},
{ap:C_ap,ho:C_ho,gr:C_gr,sc:C_sc,sh:"solid"},
{ap:D_ap,ho:D_ho,gr:D_gr,sc:D_sc,sh:"none"},
{ap:E_ap,ho:E_ho,gr:E_gr,sc:E_sc,sh:"solid"},
{ap:F_ap,ho:F_ho,gr:F_gr,sc:F_sc,sh:"dither"}
];

function street(y){
pq(12,y,236,1,SWE);
pq(12,y+1,236,6,SW);
pq(12,y+7,236,16,ROADC);
for(let x=16;x<244;x+=24)pq(x,y+14,10,2,DASHC);
}
function shadow(x,y,w,mode){
if(mode==="none")return;
if(mode==="solid"){pq(x,y,w,5,BG);return;}
for(let yy=y;yy<y+5;yy+=2)for(let xx=x;xx<x+w;xx+=2)if((xx+yy)%4===0)pq(xx,yy,2,2,BG);
}
function scatter(rects){
for(let yy=0;yy<PH;yy+=2)for(let xx=0;xx<PW;xx+=2){
let d=1e9;
for(const r of rects){
const dx=Math.max(r.x-xx,xx-(r.x+r.w),0),dy=Math.max(r.y-yy,yy-(r.y+r.h),0);
const dd=Math.max(dx,dy);
if(dd<d)d=dd;
if(d===0)break;
}
if(d>0&&d<23&&hash2(xx,yy)<0.45-d*0.02)pq(xx,yy,2,2,"#1e1e1e");
}}

const cvs=[0,1,2,3,4,5].map(i=>document.getElementById("c"+i));
function render(){
SS=2*(window.devicePixelRatio||1);
for(let i=0;i<6;i++){
const c=cvs[i];
c.width=Math.round(PW*SS);c.height=Math.round(PH*SS);
q=c.getContext("2d");q.imageSmoothingEnabled=false;
pq(0,0,PW,PH,BG);
const p=PANELS[i];
const rows=[22,147];
for(const ry of rows){
pq(28,ry,204,102,LOTG);
pq(129,ry,2,102,SEAM);
}
street(124);
street(249);
shadow(28+12,22+88,72,p.sh);
shadow(130+12,22+88,66,p.sh);
shadow(28+12,147+88,72,p.sh);
bl(p.ap,28,22);
bl(p.ho,130,22);
bl(p.gr,28,147);
bl(p.sc,130,147);
scatter([{x:28,y:22,w:204,h:102},{x:12,y:124,w:236,h:23},{x:28,y:147,w:204,h:102},{x:12,y:249,w:236,h:23}]);
}
}
addEventListener("resize",render);
render();
</script>
</body>
</html>
