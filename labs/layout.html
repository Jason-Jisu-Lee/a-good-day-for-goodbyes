<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>first moments layout</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,FG="#f2f2f0",BG="#000",DIM="#333333",MID="#777777";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;

const F7={
"A":[".XXX.","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"B":["XXXX.","X...X","X...X","XXXX.","X...X","X...X","XXXX."],
"C":[".XXX.","X...X","X....","X....","X....","X...X",".XXX."],
"D":["XXXX.","X...X","X...X","X...X","X...X","X...X","XXXX."],
"E":["XXXXX","X....","X....","XXXX.","X....","X....","XXXXX"],
"F":["XXXXX","X....","X....","XXXX.","X....","X....","X...."],
"G":[".XXX.","X...X","X....","X.XXX","X...X","X...X",".XXXX"],
"H":["X...X","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"I":["XXXXX","..X..","..X..","..X..","..X..","..X..","XXXXX"],
"J":["..XXX","...X.","...X.","...X.","...X.","X..X.",".XX.."],
"K":["X...X","X..X.","X.X..","XX...","X.X..","X..X.","X...X"],
"L":["X....","X....","X....","X....","X....","X....","XXXXX"],
"M":["X...X","XX.XX","X.X.X","X.X.X","X...X","X...X","X...X"],
"N":["X...X","XX..X","X.X.X","X..XX","X...X","X...X","X...X"],
"O":[".XXX.","X...X","X...X","X...X","X...X","X...X",".XXX."],
"P":["XXXX.","X...X","X...X","XXXX.","X....","X....","X...."],
"Q":[".XXX.","X...X","X...X","X...X","X.X.X","X..X.",".XX.X"],
"R":["XXXX.","X...X","X...X","XXXX.","X.X..","X..X.","X...X"],
"S":[".XXXX","X....","X....",".XXX.","....X","....X","XXXX."],
"T":["XXXXX","..X..","..X..","..X..","..X..","..X..","..X.."],
"U":["X...X","X...X","X...X","X...X","X...X","X...X",".XXX."],
"V":["X...X","X...X","X...X","X...X","X...X",".X.X.","..X.."],
"W":["X...X","X...X","X...X","X.X.X","X.X.X","XX.XX","X...X"],
"X":["X...X","X...X",".X.X.","..X..",".X.X.","X...X","X...X"],
"Y":["X...X","X...X",".X.X.","..X..","..X..","..X..","..X.."],
"Z":["XXXXX","....X","...X.","..X..",".X...","X....","XXXXX"],
"0":[".XXX.","X...X","X..XX","X.X.X","XX..X","X...X",".XXX."],
"1":["..X..",".XX..","..X..","..X..","..X..","..X..","XXXXX"],
"2":[".XXX.","X...X","....X","..XX.",".X...","X....","XXXXX"],
"3":[".XXX.","X...X","....X","..XX.","....X","X...X",".XXX."],
"4":["...X.","..XX.",".X.X.","X..X.","XXXXX","...X.","...X."],
"5":["XXXXX","X....","XXXX.","....X","....X","X...X",".XXX."],
"6":[".XXX.","X....","X....","XXXX.","X...X","X...X",".XXX."],
"7":["XXXXX","....X","...X.","..X..",".X...",".X...",".X..."],
"8":[".XXX.","X...X","X...X",".XXX.","X...X","X...X",".XXX."],
"9":[".XXX.","X...X","X...X",".XXXX","....X","....X",".XXX."],
"?":[".XXX.","X...X","....X","..XX.","..X..",".....","..X.."],
".":[".....",".....",".....",".....",".....","..X..","....."],
" ":[".....",".....",".....",".....",".....",".....","....."]
};
function tw7(s,n){return (s.length*6-1)*n;}
function rr(v){return Math.round(v*S);}
function px(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function text7(s,x,y,n,al,col){col=col||FG;if(al==="c")x=Math.round(x-tw7(s,n)/2);if(al==="r")x=Math.round(x-tw7(s,n));for(const ch of s){const g=F7[ch];if(g)for(let r=0;r<7;r++)for(let q=0;q<5;q++)if(g[r][q]==="X")px(x+q*n,y+r*n,n,n,col);x+=6*n;}}

function mk(n){const c=document.createElement("canvas");c.width=n;c.height=n;return c;}
function disc(g,cx0,cy0,r){for(let y=Math.floor(cy0-r);y<=Math.ceil(cy0+r);y++){const dy=y-cy0,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx0-hw);x<=Math.floor(cx0+hw);x++)g.fillRect(x,y,1,1);}}
function car(g,x,y){g.fillRect(x,y,7,4);g.clearRect(x+2,y+1,3,1);}
const M_HOUSE=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
g.fillRect(7,6,18,14);g.clearRect(8,12,16,1);g.clearRect(10,8,2,2);
g.fillRect(12,20,8,4);disc(g,28,25,2.5);
g.fillRect(15,26,2,2);g.fillRect(15,30,2,2);g.fillRect(24,30,2,1);
return c;})();
const M_WOOD=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
for(const t of [[9,9,3],[17,7,2.5],[25,11,3],[8,19,2.5],[20,18,3],[27,23,2.5],[13,26,2.5]])disc(g,t[0],t[1],t[2]);
g.fillRect(5,29,2,1);g.fillRect(9,28,2,1);g.fillRect(13,27,2,1);g.fillRect(17,28,2,1);g.fillRect(21,29,2,1);
g.fillRect(25,29,4,1);g.fillRect(26,28,1,1);g.fillRect(28,28,1,1);
return c;})();
const M_POLICE=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
g.fillRect(5,5,17,13);g.clearRect(8,8,3,3);g.clearRect(16,12,2,2);
car(g,23,21);car(g,23,27);
g.fillRect(6,27,3,1);g.fillRect(12,27,3,1);g.fillRect(18,27,3,1);
g.fillRect(12,19,3,2);
return c;})();
const M_HOSP=(()=>{const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;
g.fillRect(5,5,24,14);g.clearRect(8,8,7,7);g.fillRect(11,9,1,5);g.fillRect(9,11,5,1);
g.clearRect(20,8,2,2);g.clearRect(24,12,2,2);
car(g,23,23);
g.fillRect(14,21,2,2);g.fillRect(14,25,2,2);g.fillRect(14,29,2,2);
return c;})();
const RING=(()=>{const c=mk(15),g=c.getContext("2d");g.fillStyle=FG;for(let y=0;y<15;y++)for(let x=0;x<15;x++){const d=Math.hypot(x-7,y-7);if(d<=7.2&&d>=4.6)g.fillRect(x,y,1,1);}return c;})();

const AV=["face_man","face_woman","face_man2","face_woman2"].map(n=>{const i=new Image();i.src="../"+n+".png";return i;});

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function blitImg(img,x,y,w){if(!img.width)return false;const a=rr(x),b=rr(y);cx.drawImage(img,a,b,rr(x+w)-a,rr(y+w)-b);return true;}
function edgeR(x,y,w,h,col){px(x,y,w,1,col);px(x,y+h-1,w,1,col);px(x,y,1,h,col);px(x+w-1,y,1,h,col);}

const TS=102,ST=14,OX=150,OY=76;
function tpos(cxx,cyy){return [OX+cxx*(TS+ST),OY+cyy*(TS+ST)];}
function unknownTile(x,y){for(let yy=0;yy<TS;yy+=2)for(let xx=0;xx<TS;xx+=2){const d=Math.min(xx,yy,TS-2-xx,TS-2-yy);if(d<8&&((xx+yy)/2)%2===0)px(x+xx,y+yy,2,2,"#242424");}}
function fogEdge(x,y,w,h){
for(let yy=y-22;yy<y+h+22;yy+=2)for(let xx=x-22;xx<x+w+22;xx+=2){
if(xx>=x&&xx<x+w&&yy>=y&&yy<y+h)continue;
const dx=Math.max(x-xx,xx-(x+w),0),dy=Math.max(y-yy,yy-(y+h),0),d=Math.max(dx,dy);
const hsh=Math.abs(Math.sin(xx*12.9898+yy*78.233)*43758.5453)%1;
if(hsh<0.45-d*0.02)px(xx,yy,2,2,"#1e1e1e");
}}
function street(x,y,w,h,vert){
for(let i=0;i<(vert?h:w);i+=10){
if(vert)px(x+Math.floor(w/2),y+i,1,4,DIM);
else px(x+i,y+Math.floor(h/2),4,1,DIM);
}}

function bubble(x,y,s){
const wdt=tw7(s,1)+10;
px(x,y,wdt,13,BG);
edgeR(x,y,wdt,13,FG);
text7(s,x+5,y+3,1);
px(x+6,y+13,1,1,FG);px(x+5,y+14,1,1,FG);
}

function draw(){
px(0,0,W,H,BG);
const known=[[1,1,M_HOUSE],[2,1,M_WOOD],[1,2,M_POLICE],[2,2,M_HOSP]];
const unknown=[[0,0],[1,0],[2,0],[0,1],[0,2]];
const p00=tpos(0,0),p22=tpos(2,2);
fogEdge(p00[0],p00[1],(TS+ST)*3-ST,(TS+ST)*3-ST);
for(const u of unknown){const p=tpos(u[0],u[1]);unknownTile(p[0],p[1]);}
for(let i=0;i<3;i++){
const c0=tpos(i,0),r0=tpos(0,i);
street(c0[0],p00[1],TS,(TS+ST)*3-ST,true);
street(p00[0],r0[1],(TS+ST)*3-ST,TS,false);
}
for(const t of known){const p=tpos(t[0],t[1]);px(p[0]-1,p[1]-1,TS+2,TS+2,BG);edgeR(p[0]-1,p[1]-1,TS+2,TS+2,DIM);blit(t[2],p[0],p[1],3);}
const sel=tpos(2,1);
for(const c of [[0,0],[1,0],[0,1]]){
px(sel[0]-3+c[0]*(TS+6-8),sel[1]-3+c[1]*(TS+6-8),8,2,FG);px(sel[0]-3+c[0]*(TS+6-8),sel[1]-3+c[1]*(TS+6-8),2,8,FG);
}
px(sel[0]+TS-5,sel[1]+TS-5,8,2,FG);px(sel[0]+TS+1,sel[1]+TS-5,2,8,FG);
const home=tpos(1,1),park=tpos(2,1),police=tpos(1,2);
const survivors=[
["MARA",home[0]+30,home[1]+66],
["REED",home[0]+76,home[1]+30],
["JUNE",home[0]+TS+7,home[1]+60],
["OKON",police[0]+30,police[1]+26]
];
for(const s of survivors){
blit(RING,s[1]-15,s[2]-15,2);
const nw=tw7(s[0],1);
px(s[1]-nw/2-2,s[2]-30,nw+4,11,BG);
text7(s[0],s[1],s[2]-28,1,"c");
}
bubble(home[0]+44,home[1]+30,"COLD TONIGHT.");
text7("WOOD 12",16,12,2);
text7("FOOD 8",150,12,2);
text7("WATER 9",268,12,2);
text7("DAY 1",944,14,1,"r",MID);
const pn={x:700,y:60,w:244,h:210};
edgeR(pn.x,pn.y,pn.w,pn.h,DIM);
text7("PARK",pn.x+16,pn.y+14,2);
text7("UNSCOUTED",pn.x+16,pn.y+38,1,MID);
text7("DANGER ?",pn.x+16,pn.y+54,1,MID);
edgeR(pn.x+16,pn.y+84,120,30,FG);
text7("SCOUT",pn.x+76,pn.y+93,2,"c");
edgeR(pn.x+16,pn.y+126,120,30,DIM);
text7("RECLAIM",pn.x+76,pn.y+135,2,"c",DIM);
const py=470;
text7("SURVIVORS",16,452,1,MID);
for(let i=0;i<4;i++){
const x=16+i*56;
if(!blitImg(AV[i],x,py-4,48)){blit(RING,x+9,py+5,2);}
}
text7("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2)),936,524,1,"r",DIM);
}
addEventListener("resize",()=>{fit();});
fit();function step(){draw();requestAnimationFrame(step);}step();
</script>
</body>
</html>
