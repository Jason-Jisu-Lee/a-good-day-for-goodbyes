<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>origin four, styles 1-8</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:20px 0 10px}
#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:26px;max-width:1930px;margin:0 auto;padding:18px}
.panel{text-align:center}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:600px;max-width:100%}
.cap{color:#ddd;font-size:13px;letter-spacing:2px;margin-top:10px}
</style>
</head>
<body>
<h1>ORIGIN FOUR / STYLES 1-8</h1>
<div id="grid">
<div class="panel"><canvas id="c0"></canvas><div class="cap">#1 CHUNKY</div></div>
<div class="panel"><canvas id="c1"></canvas><div class="cap">#2 DITHER</div></div>
<div class="panel"><canvas id="c2"></canvas><div class="cap">#3 SILHOUETTE</div></div>
<div class="panel"><canvas id="c3"></canvas><div class="cap">#4 GEOMETRIC</div></div>
<div class="panel"><canvas id="c4"></canvas><div class="cap">#5 TYPE</div></div>
<div class="panel"><canvas id="c5"></canvas><div class="cap">#6 OUTLINE</div></div>
<div class="panel"><canvas id="c6"></canvas><div class="cap">#7 EMBLEM</div></div>
<div class="panel"><canvas id="c7"></canvas><div class="cap">#8 PATTERN</div></div>
</div>
<script>
const FG="#f2f2f0",BG="#000000",ROAD="#161616",CURB="#3d3d3d",DASH="#5a5a5a";
const TS=102,ST=14,M=27,CW=300;
let SS=2,q=null;
function R(v){return Math.round(v*SS);}
function pq(x,y,w,h,col){q.fillStyle=col;const a=R(x),b=R(y);q.fillRect(a,b,R(x+w)-a,R(y+h)-b);}
function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function bl(s,x,y,n){const a=R(x),b=R(y);q.drawImage(s,a,b,R(x+s.width*n)-a,R(y+s.height*n)-b);}
function hash2(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;}
function C34(fn){const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}
function C17(fn){const c=mk(17),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}
function disc(g,cx,cy,r){for(let y=Math.floor(cy-r);y<=Math.ceil(cy+r);y++){const dy=y-cy,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx-hw);x<=Math.floor(cx+hw);x++)g.fillRect(x,y,1,1);}}
function ringO(g,cx,cy,ro,ri){for(let y=0;y<34;y++)for(let x=0;x<34;x++){const d=Math.hypot(x-cx,y-cy);if(d<=ro&&d>=ri)g.fillRect(x,y,1,1);}}
function seg(g,x0,y0,x1,y1){const n=Math.max(Math.abs(x1-x0),Math.abs(y1-y0));for(let i=0;i<=n;i++){g.fillRect(Math.round(x0+(x1-x0)*i/n),Math.round(y0+(y1-y0)*i/n),1,1);}}
function rect1(g,x,y,w,h){g.fillRect(x,y,w,1);g.fillRect(x,y+h-1,w,1);g.fillRect(x,y,1,h);g.fillRect(x+w-1,y,1,h);}
function chk(g,x,y,w,h,m){for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++){if(m===50&&(xx+yy)%2===0)g.fillRect(xx,yy,1,1);if(m===25&&xx%2===0&&yy%2===0)g.fillRect(xx,yy,1,1);if(m===75&&!(xx%2===1&&yy%2===1))g.fillRect(xx,yy,1,1);}}

const s1_g=C17(g=>{
g.fillRect(1,3,15,2);
g.fillRect(2,5,13,10);
g.clearRect(4,7,5,4);
g.clearRect(11,10,3,5);
g.fillRect(0,15,17,1);
});
const s1_h=C17(g=>{
for(let r=0;r<6;r++)g.fillRect(8-r,2+r,2*r+1,1);
g.fillRect(2,8,13,1);
g.fillRect(3,9,11,6);
g.fillRect(12,4,2,3);
g.clearRect(7,11,3,4);
g.clearRect(5,10,2,2);
g.fillRect(0,15,17,1);
});
const s1_r=C17(g=>{
g.fillRect(2,12,4,3);
g.fillRect(7,13,4,2);
g.fillRect(12,11,3,4);
g.fillRect(5,10,2,2);
g.fillRect(10,9,2,2);
g.fillRect(0,15,7,1);
g.fillRect(10,15,7,1);
});
const s2_g=C34(g=>{
chk(g,3,12,28,4,50);
g.fillRect(5,16,24,14);
g.clearRect(19,21,5,9);
g.clearRect(8,20,8,6);
chk(g,29,16,3,14,25);
chk(g,3,30,28,2,50);
});
const s2_h=C34(g=>{
for(let y=8;y<=17;y++){const hw=Math.round((y-7)*1.2);for(let x=17-hw;x<=17+hw;x++)if(x>=6&&x<=28&&(x+y)%2===0)g.fillRect(x,y,1,1);}
g.fillRect(8,18,18,12);
g.fillRect(22,10,3,6);
g.fillRect(21,7,1,1);g.fillRect(19,5,1,1);g.fillRect(18,3,1,1);
g.clearRect(15,22,4,8);
g.clearRect(11,21,4,5);
chk(g,5,30,24,2,50);
});
const s2_r=C34(g=>{
chk(g,13,14,8,4,25);
chk(g,9,18,16,6,50);
chk(g,5,24,24,6,75);
g.fillRect(6,22,4,4);
g.fillRect(21,19,5,6);
g.fillRect(15,11,3,3);
chk(g,3,30,28,2,50);
});
const s3_g=C34(g=>{
g.fillRect(4,11,26,3);
for(let x=6;x<=26;x+=5)g.clearRect(x,13,3,1);
g.fillRect(6,14,24,16);
g.clearRect(19,23,5,7);
});
const s3_h=C34(g=>{
for(let y=8;y<=16;y++){const hw=Math.round((y-7)*1.3);g.fillRect(Math.max(6,17-hw),y,Math.min(28,17+hw)-Math.max(6,17-hw)+1,1);}
g.fillRect(7,16,20,14);
g.fillRect(22,8,4,8);
g.clearRect(15,24,4,6);
});
const s3_r=C34(g=>{
g.fillRect(4,18,7,12);
g.fillRect(4,16,3,2);
g.fillRect(23,14,6,16);
g.fillRect(23,12,3,2);
g.fillRect(12,25,10,5);
for(let i=0;i<6;i++)g.fillRect(13+i,19+i,6,1);
});
const s4_g=C34(g=>{
g.fillRect(7,12,20,18);
g.fillStyle=BG;
disc(g,17,18,4.5);
g.fillStyle=FG;
g.clearRect(15,25,4,5);
});
const s4_h=C34(g=>{
for(let y=8;y<=18;y++){const hw=Math.round((y-7)*1.1);g.fillRect(17-hw,y,hw*2+1,1);}
g.fillRect(8,18,18,12);
g.clearRect(15,24,4,6);
});
const s4_r=C34(g=>{
for(let i=0;i<9;i++)g.fillRect(5,21+i,i+1,1);
for(let i=0;i<7;i++)g.fillRect(28-i,23+i,i+1,1);
for(let i=-4;i<=4;i++){const w=4-Math.abs(i);g.fillRect(19-w,22+i,w*2+1,1);}
g.fillRect(14,27,2,2);
g.fillRect(24,28,2,2);
});
const F7={
"F":["XXXXX","X....","X....","XXXX.","X....","X....","X...."],
"O":[".XXX.","X...X","X...X","X...X","X...X","X...X",".XXX."],
"D":["XXXX.","X...X","X...X","X...X","X...X","X...X","XXXX."],
"H":["X...X","X...X","X...X","XXXXX","X...X","X...X","X...X"],
"M":["X...X","XX.XX","X.X.X","X.X.X","X...X","X...X","X...X"],
"E":["XXXXX","X....","X....","XXXX.","X....","X....","XXXXX"],
"R":["XXXX.","X...X","X...X","XXXX.","X.X..","X..X.","X...X"],
"U":["X...X","X...X","X...X","X...X","X...X","X...X",".XXX."],
"I":["XXXXX","..X..","..X..","..X..","..X..","..X..","XXXXX"],
"N":["X...X","XX..X","X.X.X","X..XX","X...X","X...X","X...X"]
};
function word7(s,x,y,n){for(const ch of s){const gl=F7[ch];for(let r=0;r<7;r++)for(let c=0;c<5;c++)if(gl[r][c]==="X")pq(x+c*n,y+r*n,n,n,FG);x+=6*n;}}
function glyphR(ch,x,y,n){const gl=F7[ch];for(let r=0;r<7;r++)for(let c=0;c<5;c++)if(gl[r][c]==="X")pq(x+(6-r)*n,y+c*n,n,n,FG);}
const s6_g=C34(g=>{
for(let x=4;x<=27;x+=4){g.fillRect(x,12,1,1);g.fillRect(x+1,13,1,1);g.fillRect(x+2,14,1,1);g.fillRect(x+3,13,1,1);}
rect1(g,4,15,26,14);
rect1(g,19,21,6,8);
rect1(g,8,20,8,6);
g.fillRect(11,20,1,6);g.fillRect(8,22,8,1);
rect1(g,2,7,7,5);
g.fillRect(5,12,1,3);
});
const s6_h=C34(g=>{
for(let i=0;i<=10;i++){g.fillRect(17-i,7+i,1,1);g.fillRect(17+i,7+i,1,1);}
rect1(g,7,17,21,12);
rect1(g,21,8,4,4);
rect1(g,14,21,5,8);
rect1(g,10,20,5,5);
g.fillRect(12,20,1,5);g.fillRect(10,22,5,1);
});
const s6_r=C34(g=>{
rect1(g,7,21,12,8);
g.clearRect(11,21,4,1);g.clearRect(7,25,1,2);
seg(g,17,27,27,21);seg(g,19,29,29,23);seg(g,17,27,19,29);seg(g,27,21,29,23);
g.fillRect(13,29,1,1);g.fillRect(24,28,1,1);g.fillRect(30,27,1,1);
});
const s7_g=C34(g=>{
ringO(g,17,16,10.6,8.4);
disc(g,17,17.5,3.6);
g.fillRect(16,12,1,2);
g.fillRect(18,11,2,2);
});
const s7_h=C34(g=>{
ringO(g,17,16,10.6,8.4);
for(let i=0;i<6;i++){g.fillRect(16-i,12+i,2,1);g.fillRect(17+i,12+i,2,1);}
g.fillRect(16,20,3,3);
});
const s7_r=C34(g=>{
ringO(g,16,15,10.6,8.4);
g.fillStyle=BG;
disc(g,23,7,3.5);
disc(g,8,23,2.4);
g.fillStyle=FG;
seg(g,12,9,21,22);
g.fillRect(24,25,3,1);
g.fillRect(27,22,2,1);
g.fillRect(22,28,2,1);
});
const s8_g=C34(g=>{
for(let y=7;y<=27;y+=5)for(let x=5;x<=29;x+=6){if(x===17)continue;g.fillRect(x-1,y-1,2,2);}
});
const s8_h=C34(g=>{
let row=0;
for(let y=7;y<=27;y+=5){
const off=row%2?4:0;
for(let x=4+off;x<=26;x+=8){
g.fillRect(x,y+2,1,1);g.fillRect(x+1,y+1,1,1);g.fillRect(x+2,y,1,1);g.fillRect(x+3,y+1,1,1);g.fillRect(x+4,y+2,1,1);
}
row++;
}
});
const s8_r=C34(g=>{
for(let y=5;y<30;y++)for(let x=3;x<31;x++){
const h=hash2(x*7,y*13);
if(h<0.03+(y-5)*0.012)g.fillRect(x,y,1,1);
}
g.fillRect(8,25,3,2);
g.fillRect(21,26,3,3);
g.fillRect(14,20,2,2);
});

const STYLES=[
{cap:0,g:(x,y)=>bl(s1_g,x,y,6),h:(x,y)=>bl(s1_h,x,y,6),r:(x,y)=>bl(s1_r,x,y,6)},
{cap:1,g:(x,y)=>bl(s2_g,x,y,3),h:(x,y)=>bl(s2_h,x,y,3),r:(x,y)=>bl(s2_r,x,y,3)},
{cap:2,g:(x,y)=>bl(s3_g,x,y,3),h:(x,y)=>bl(s3_h,x,y,3),r:(x,y)=>bl(s3_r,x,y,3)},
{cap:3,g:(x,y)=>bl(s4_g,x,y,3),h:(x,y)=>bl(s4_h,x,y,3),r:(x,y)=>bl(s4_r,x,y,3)},
{cap:4,
g:(x,y)=>{word7("FOOD",x+17,y+66,3);},
h:(x,y)=>{word7("HOME",x+17,y+66,3);},
r:(x,y)=>{
word7("R",x+15,y+66,3);
word7("U",x+33,y+72,3);
word7("I",x+51,y+69,3);
word7("N",x+69,y+75,3);
pq(x+21,y+90,3,3,FG);pq(x+36,y+93,3,3,FG);pq(x+48,y+92,3,3,FG);pq(x+63,y+90,3,3,FG);pq(x+78,y+93,3,3,FG);pq(x+30,y+96,3,3,FG);pq(x+57,y+96,3,3,FG);
}},
{cap:5,g:(x,y)=>bl(s6_g,x,y,3),h:(x,y)=>bl(s6_h,x,y,3),r:(x,y)=>bl(s6_r,x,y,3)},
{cap:6,g:(x,y)=>bl(s7_g,x,y,3),h:(x,y)=>bl(s7_h,x,y,3),r:(x,y)=>bl(s7_r,x,y,3)},
{cap:7,g:(x,y)=>bl(s8_g,x,y,3),h:(x,y)=>bl(s8_h,x,y,3),r:(x,y)=>bl(s8_r,x,y,3)}
];

function tp(g){return M+ST+g*(TS+ST);}
const TT=[[{k:"g",ex:true},{k:"h",ex:true}],[{k:"r",ex:true},{k:"m",ex:false}]];
function ex(gx,gy){return gx>=0&&gx<2&&gy>=0&&gy<2&&TT[gy][gx].ex;}
function streets(rects){
for(let i=0;i<3;i++)for(let j=0;j<2;j++){
if(ex(i-1,j)||ex(i,j)){
const x=M+i*(TS+ST),y=tp(j);
pq(x,y,ST,TS,ROAD);rects.push({x,y,w:ST,h:TS});
pq(x,y,1,TS,CURB);pq(x+ST-1,y,1,TS,CURB);
for(let yy=tp(0)+4;yy+8<=y+TS;yy+=24)if(yy>=y)pq(x+6,yy,2,8,DASH);
}}
for(let j=0;j<3;j++)for(let i=0;i<2;i++){
if(ex(i,j-1)||ex(i,j)){
const y=M+j*(TS+ST),x=tp(i);
pq(x,y,TS,ST,ROAD);rects.push({x,y,w:TS,h:ST});
pq(x,y,TS,1,CURB);pq(x,y+ST-1,TS,1,CURB);
for(let xx=tp(0)+4;xx+8<=x+TS;xx+=24)if(xx>=x)pq(xx,y+6,8,2,DASH);
}}
for(let i=0;i<3;i++)for(let j=0;j<3;j++){
if(ex(i-1,j-1)||ex(i,j-1)||ex(i-1,j)||ex(i,j)){
const x=M+i*(TS+ST),y=M+j*(TS+ST);
pq(x,y,ST,ST,ROAD);rects.push({x,y,w:ST,h:ST});
}}
}
function darkCell(x,y){
pq(x,y,TS,TS,"#0e0e0e");
for(let yy=0;yy<TS;yy+=2)for(let xx=0;xx<TS;xx+=2){
const d=Math.min(TS-2-xx,TS-2-yy);
if(d<14&&hash2(x+xx,y+yy)<0.55-d*0.04)pq(x+xx,y+yy,2,2,BG);
}}
function scatter(rects){
for(let yy=0;yy<CW;yy+=2)for(let xx=0;xx<CW;xx+=2){
let d=1e9;
for(const r of rects){
const dx=Math.max(r.x-xx,xx-(r.x+r.w),0),dy=Math.max(r.y-yy,yy-(r.y+r.h),0);
const dd=Math.max(dx,dy);
if(dd<d)d=dd;
if(d===0)break;
}
if(d>0&&d<23&&hash2(xx,yy)<0.45-d*0.02)pq(xx,yy,2,2,"#1e1e1e");
}}

const cvs=[0,1,2,3,4,5,6,7].map(i=>document.getElementById("c"+i));
function render(){
SS=2*(window.devicePixelRatio||1);
for(let i=0;i<8;i++){
const c=cvs[i];
c.width=Math.round(CW*SS);c.height=Math.round(CW*SS);
q=c.getContext("2d");q.imageSmoothingEnabled=false;
pq(0,0,CW,CW,BG);
const rects=[];
streets(rects);
for(let gy=0;gy<2;gy++)for(let gx=0;gx<2;gx++){
const t=TT[gy][gx],x=tp(gx),y=tp(gy);
if(!t.ex){darkCell(x,y);continue;}
rects.push({x,y,w:TS,h:TS});
if(t.k==="g")STYLES[i].g(x,y);
if(t.k==="h")STYLES[i].h(x,y);
if(t.k==="r")STYLES[i].r(x,y);
}
scatter(rects);
}
}
addEventListener("resize",render);
render();
</script>
</body>
</html>
