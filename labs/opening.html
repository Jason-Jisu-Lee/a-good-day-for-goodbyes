<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>opening 2x2</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:20px 0 10px}
.panel{text-align:center;padding:10px 0 30px}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:600px;max-width:100%}
</style>
</head>
<body>
<h1>OPENING / FLAT BOXES</h1>
<div class="panel">
<canvas id="cv"></canvas>
</div>
<script>
const FG="#f2f2f0",BG="#000000",LOTG="#1a1a1a",ROAD="#161616",CURB="#3d3d3d",DASH="#5a5a5a";
const PW=300,PH=300,TS=102,ST=14,M=27;
let SS=2;
function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function hash2(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;}
function C51(fn){const c=mk(51),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}

const GROC=C51(g=>{
for(let r=10;r<=18;r++)g.fillRect(4+(18-r),r,36,1);
g.fillRect(4,19,36,22);
for(let k=1;k<=9;k++)g.fillRect(39+k,19-k,1,22);
for(let k=1;k<=9;k++)g.clearRect(39+k,19-k,1,1);
g.clearRect(2,19,42,1);
g.fillRect(2,20,42,5);
g.clearRect(2,25,42,1);
g.clearRect(19,12,9,2);
g.clearRect(33,14,6,3);g.fillRect(34,15,4,1);
g.clearRect(7,29,15,8);g.fillRect(14,29,1,8);
g.clearRect(27,28,8,13);g.fillRect(33,33,1,3);
});
const HOUSE=C51(g=>{
for(let r=14;r<=19;r++)g.fillRect(10+(19-r),r,25,1);
g.fillRect(10,20,25,19);
for(let k=1;k<=6;k++)g.fillRect(34+k,20-k,1,19);
for(let k=1;k<=6;k++)g.clearRect(34+k,20-k,1,1);
g.clearRect(10,20,25,1);
g.fillRect(31,9,2,5);
g.clearRect(14,29,6,10);g.fillRect(18,34,1,1);
g.clearRect(23,27,7,7);g.fillRect(26,27,1,7);g.fillRect(23,30,7,1);
g.fillRect(13,39,8,2);
});
const RUB=C51(g=>{
g.fillRect(8,34,36,7);
g.fillRect(13,29,25,5);
g.fillRect(19,25,13,4);
g.fillRect(23,22,6,3);
g.clearRect(8,34,2,2);g.clearRect(42,34,2,3);g.clearRect(13,29,2,1);g.clearRect(36,29,2,2);g.clearRect(19,25,2,1);
g.clearRect(15,33,8,1);g.clearRect(28,33,9,1);
g.clearRect(21,28,6,1);
g.clearRect(11,37,6,1);g.clearRect(24,38,8,1);g.clearRect(35,36,5,1);
g.clearRect(18,34,1,3);g.clearRect(30,35,1,4);g.clearRect(25,29,1,3);g.clearRect(38,34,1,3);
for(let i=0;i<4;i++)g.fillRect(33+i*2,23-i*2,3,2);
g.fillRect(4,38,3,3);g.fillRect(45,37,3,3);
g.fillRect(6,33,1,1);g.fillRect(46,34,1,1);
});

const EXPL=[[true,true],[true,false]];
function ex(gx,gy){return gx>=0&&gx<2&&gy>=0&&gy<2&&EXPL[gy][gx];}
function lotX(gx){return M+ST+gx*(TS+ST);}
function lotY(gy){return M+ST+gy*(TS+ST);}

const cv=document.getElementById("cv"),cx=cv.getContext("2d");
function P(x,y,w,h,col){cx.fillStyle=col;cx.fillRect(Math.round(x*SS),Math.round(y*SS),Math.round(w*SS),Math.round(h*SS));}
function render(){
SS=2*(window.devicePixelRatio||1);
cv.width=Math.round(PW*SS);cv.height=Math.round(PH*SS);
cx.imageSmoothingEnabled=false;
P(0,0,PW,PH,BG);
const rects=[];
for(let gy=0;gy<2;gy++)for(let gx=0;gx<2;gx++){
const x=lotX(gx),y=lotY(gy);
if(ex(gx,gy)){P(x,y,TS,TS,LOTG);rects.push({x,y,w:TS,h:TS});}
else{
P(x,y,TS,TS,"#0e0e0e");
for(let yy=0;yy<TS;yy+=2)for(let xx=0;xx<TS;xx+=2){
const d=Math.min(TS-2-xx,TS-2-yy);
if(d<14&&hash2(x+xx,y+yy)<0.55-d*0.04)P(x+xx,y+yy,2,2,BG);
}
}
}
for(let c=0;c<3;c++)for(let j=0;j<2;j++){
if(ex(c-1,j)||ex(c,j)){
const x=M+c*(TS+ST),y=lotY(j);
P(x,y,ST,TS,ROAD);rects.push({x,y,w:ST,h:TS});
P(x,y,1,TS,CURB);P(x+ST-1,y,1,TS,CURB);
for(let yy=lotY(0)+4;yy+8<=y+TS;yy+=24)if(yy>=y)P(x+6,yy,2,8,DASH);
}}
for(let r=0;r<3;r++)for(let i=0;i<2;i++){
if(ex(i,r-1)||ex(i,r)){
const y=M+r*(TS+ST),x=lotX(i);
P(x,y,TS,ST,ROAD);rects.push({x,y,w:TS,h:ST});
P(x,y,TS,1,CURB);P(x,y+ST-1,TS,1,CURB);
for(let xx=lotX(0)+4;xx+8<=x+TS;xx+=24)if(xx>=x)P(xx,y+6,8,2,DASH);
}}
for(let c=0;c<3;c++)for(let r=0;r<3;r++){
if(ex(c-1,r-1)||ex(c,r-1)||ex(c-1,r)||ex(c,r)){
P(M+c*(TS+ST),M+r*(TS+ST),ST,ST,ROAD);rects.push({x:M+c*(TS+ST),y:M+r*(TS+ST),w:ST,h:ST});
}}
P(lotX(0)+12,lotY(0)+84,80,5,BG);
P(lotX(1)+16,lotY(0)+82,64,5,BG);
P(lotX(0)+14,lotY(1)+84,76,4,BG);
const B=(spr,gx,gy)=>{cx.drawImage(spr,Math.round(lotX(gx)*SS),Math.round(lotY(gy)*SS),Math.round(102*SS),Math.round(102*SS));};
B(GROC,0,0);
B(HOUSE,1,0);
B(RUB,0,1);
cx.fillStyle="#1e1e1e";
for(let yy=0;yy<PH;yy+=2)for(let xx=0;xx<PW;xx+=2){
let d=1e9;
for(const r of rects){
const dx=Math.max(r.x-xx,xx-(r.x+r.w),0),dy=Math.max(r.y-yy,yy-(r.y+r.h),0);
const dd=Math.max(dx,dy);
if(dd<d)d=dd;
if(d===0)break;
}
if(d>0&&d<23&&hash2(xx,yy)<0.45-d*0.02)cx.fillRect(Math.round(xx*SS),Math.round(yy*SS),Math.round(2*SS),Math.round(2*SS));
}
}
addEventListener("resize",render);
render();
</script>
</body>
</html>
