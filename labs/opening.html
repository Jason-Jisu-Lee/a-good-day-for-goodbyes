function cleanHouse(){
const rows=HOUSE_D.map(r=>r.split(""));
for(let r=49;r<rows.length;r++)for(let c=47;c<62;c++)rows[r][c]=".";
return rows.map(r=>r.join(""));
}
function ruinRows(){
const rows=cleanHouse().map(r=>r.split(""));
for(let r=0;r<20;r++)for(let c=0;c<62;c++)rows[r][c]=".";
for(let r=20;r<35;r++)for(let c=23;c<62;c++)rows[r][c]=".";
for(let r=35;r<rows.length;r++)for(let c=34;c<62;c++)rows[r][c]=".";
return rows.map(r=>r.join(""));
}
function spr(arr){
const w=arr[0].length,h=arr.length,c=mk(w,h),g=c.getContext("2d");
g.fillStyle=FG;
for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(arr[y][x]==="X")g.fillRect(x,y,1,1);
return c;
}

const APT=spr(APT_D);
const RUIN=spr(ruinRows());

const T={h:[240,106],a:[304,138],r:[176,138],m:[240,170]};

function render(){

const buf=mk(BW,BH),g=buf.getContext("2d");

const dia=(cxx,cyy,col)=>{
