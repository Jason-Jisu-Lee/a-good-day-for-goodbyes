<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1 to 1</title>
<style>
html,body{margin:0;background:#000;overflow:hidden}
[hidden]{display:none !important}
.panel{display:flex;align-items:center;justify-content:center;height:100vh}
canvas{display:block;image-rendering:pixelated;width:960px;max-width:100%;border:1px solid #222}
</style>
</head>
<body>
<div class="panel">
<canvas id="cv"></canvas>
</div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const H=new Image(),A=new Image();
let loaded=0;
function done(){
loaded++;
if(loaded<2)return;
render();
}
H.onload=done;A.onload=done;
H.src="../ref_house.png";
A.src="../ref_apt.png";
function render(){
const d=Math.max(1,Math.round(window.devicePixelRatio||1));
cv.width=960*d;cv.height=540*d;
cx.imageSmoothingEnabled=false;
cx.fillStyle="#000";cx.fillRect(0,0,cv.width,cv.height);
cx.drawImage(H,0,0,600,510,155*d,198*d,300*d,255*d);
cx.drawImage(A,0,0,620,630,495*d,125*d,310*d,315*d);
}
addEventListener("resize",render);
</script>
</body>
</html>
