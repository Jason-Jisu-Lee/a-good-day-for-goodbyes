<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>opening 2x2</title>
<style>
html,body{margin:0;background:#000;overflow:hidden}
[hidden]{display:none !important}
.panel{display:flex;align-items:center;justify-content:center;height:100vh}
canvas{display:block;image-rendering:pixelated;width:960px;max-width:100%;border:1px solid #222}
</style>
</head>
<body>
<div class="panel">
<canvas id="cv"></canvas>
</div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const HOUSE=new Image(),APT=new Image(),TILE=new Image();
let loaded=0;
function done(){loaded++;if(loaded===3)render();}
HOUSE.onload=done;APT.onload=done;TILE.onload=done;
HOUSE.src="../ref_house.png";
APT.src="../ref_apt.png";
TILE.src="../ref_tile.png";
const Q=[".XXX.","X...X","....X","..XX.","..X..",".....","..X.."];
function render(){
const d=Math.max(1,Math.round(window.devicePixelRatio||1));
cv.width=960*d;cv.height=540*d;
cx.imageSmoothingEnabled=false;
cx.fillStyle="#000";cx.fillRect(0,0,cv.width,cv.height);
const blit=(img,x,y,w,h)=>cx.drawImage(img,0,0,img.width,img.height,x*d,y*d,w*d,h*d);
cx.globalCompositeOperation="lighter";
blit(HOUSE,338,12,300,255);
blit(TILE,196,100,300,255);
blit(APT,480,37,310,315);
blit(TILE,338,189,300,255);
cx.globalCompositeOperation="source-over";
cx.fillStyle="#f2f2f0";
const qm=(cxx,cyy)=>{
for(let r=0;r<7;r++)for(let c=0;c<5;c++)if(Q[r][c]==="X")cx.fillRect((cxx-15+c*6)*d,(cyy-21+r*6)*d,6*d,6*d);
};
qm(338,253);
qm(480,342);
}
addEventListener("resize",render);
</script>
</body>
</html>
