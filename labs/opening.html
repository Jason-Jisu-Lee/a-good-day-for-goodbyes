function cells(arr,cleanCols){
const H=arr.length&~1,W=arr[0].length&~1,ch=H>>1,cw=W>>1;
const at=(y,x)=>{
if(cleanCols&&y>=cleanCols[0]&&x>=cleanCols[1])return ".";
return arr[y][x];
};
const g=[];
for(let r=0;r<ch;r++){g.push([]);for(let c=0;c<cw;c++){
const n=(at(2*r,2*c)==="X")+(at(2*r,2*c+1)==="X")+(at(2*r+1,2*c)==="X")+(at(2*r+1,2*c+1)==="X");
g[r].push(n>=2?1:0);
}}
for(let r=0;r<ch;r++)for(let c=0;c<cw;c++){
if(!g[r][c])continue;
let nb=0;
for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
if(!dr&&!dc)continue;
const rr=r+dr,cc=c+dc;
if(rr>=0&&rr<ch&&cc>=0&&cc<cw&&g[rr][cc])nb++;
}
if(nb<=1)g[r][c]=0;
}
return g;
}
function sprC(grid){
const h=grid.length,w=grid[0].length,c=mk(w*2,h*2),g2=c.getContext("2d");
for(let r=0;r<h;r++){
let f=-1,l=-1;
for(let cc=0;cc<w;cc++)if(grid[r][cc]){if(f<0)f=cc;l=cc;}
if(f<0)continue;
g2.fillStyle=BG;
g2.fillRect(f*2,r*2,(l-f+1)*2,2);
g2.fillStyle=FG;
for(let cc=f;cc<=l;cc++)if(grid[r][cc])g2.fillRect(cc*2,r*2,2,2);
}
return c;
}

const Q=[".XXX.","X...X","....X","..XX.","..X..",".....","..X.."];
const HD=58;
const T={h:[240,62],a:[304,126],q1:[176,126],q2:[240,190]};

const cv=document.getElementById("cv"),cx=cv.getContext("2d");
function render(){
const dprI=Math.max(1,Math.round(window.devicePixelRatio||1));
cv.width=BW*2*dprI;cv.height=BH*2*dprI;
cx.imageSmoothingEnabled=false;
const buf=mk(BW,BH),g=buf.getContext("2d");
g.fillStyle=BG;g.fillRect(0,0,BW,BH);
const dashOn=i=>i<=8||(i>=17&&i<=25)||(i>=33&&i<=41)||i>=50;
const dia=(cxx,cyy,col)=>{
g.fillStyle=col;
for(let i=0;i<=HD;i++){
if(!dashOn(i))continue;
g.fillRect(cxx+i,cyy-HD+i,2,2);
g.fillRect(cxx-i-2,cyy-HD+i,2,2);
g.fillRect(cxx+i,cyy+HD-i-2,2,2);
g.fillRect(cxx-i-2,cyy+HD-i-2,2,2);
}
};

dia(T.q2[0],T.q2[1],MID);
g.drawImage(HOUSE,T.h[0]-31,T.h[1]+12-56);

};
