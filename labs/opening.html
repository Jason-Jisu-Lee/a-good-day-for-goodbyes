<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>opening 2x2 diagonal</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
.panel{text-align:center;padding:14px 0 30px}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:960px;max-width:100%;border:1px solid #222}
</style>
</head>
<body>
<div class="panel">
<canvas id="cv"></canvas>
</div>
<script>
const FG="#f2f2f0",BG="#000000";
const BW=480,BH=270,TS=102,ST=14,WORLD=246,OX=240,OY=12;
let SS=1;
function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function hash2(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;}
function CS(w,h,fn){const c=mk(w,h),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}

const EXPL=[[true,true],[true,false]];
function ex(gx,gy){return gx>=0&&gx<2&&gy>=0&&gy<2&&EXPL[gy][gx];}
function seg(w){
if(w<0||w>=WORLD)return null;
if(w<14)return {k:"s",i:0};
if(w<116)return {k:"l",i:0};
if(w<130)return {k:"s",i:1};
if(w<232)return {k:"l",i:1};
return {k:"s",i:2};
}
function bandStart(i){return i===0?0:(i===1?116:232);}
function lotStart(i){return i===0?14:130;}
function dashHit(w){const m=((w-18)%24+24)%24;return m>=0&&m<10;}
const C_LOT=[26,26,26],C_ROAD=[22,22,22],C_CURB=[61,61,61],C_DASH=[90,90,90],C_DARK=[14,14,14],C_FOG=[30,30,30],C_BLACK=[0,0,0];
function worldColor(wx,wy){
const bx=seg(wx),by=seg(wy);
if(!bx||!by)return null;
if(bx.k==="l"&&by.k==="l"){
if(ex(bx.i,by.i))return C_LOT;
const d=Math.min(231-wx,231-wy);
if(d<14&&hash2(Math.floor(wx/4)*4,Math.floor(wy/4)*4)<0.55-d*0.04)return C_BLACK;
return C_DARK;
}
if(bx.k==="l"&&by.k==="s"){
if(!(ex(bx.i,by.i-1)||ex(bx.i,by.i)))return null;
const loc=wy-bandStart(by.i);
if(loc<=1||loc>=12)return C_CURB;
if(loc>=6&&loc<8&&dashHit(wx))return C_DASH;
return C_ROAD;
}
if(bx.k==="s"&&by.k==="l"){
if(!(ex(bx.i-1,by.i)||ex(bx.i,by.i)))return null;
const loc=wx-bandStart(bx.i);
if(loc<=1||loc>=12)return C_CURB;
if(loc>=6&&loc<8&&dashHit(wy))return C_DASH;
return C_ROAD;
}
if(ex(bx.i-1,by.i-1)||ex(bx.i,by.i-1)||ex(bx.i-1,by.i)||ex(bx.i,by.i))return C_ROAD;
return null;
}
const RECTS=[];
for(let gy=0;gy<2;gy++)for(let gx=0;gx<2;gx++)if(ex(gx,gy))RECTS.push({x:lotStart(gx),y:lotStart(gy),w:TS,h:TS});
for(let c=0;c<3;c++)for(let j=0;j<2;j++)if(ex(c-1,j)||ex(c,j))RECTS.push({x:bandStart(c),y:lotStart(j),w:ST,h:TS});
for(let r=0;r<3;r++)for(let i=0;i<2;i++)if(ex(i,r-1)||ex(i,r))RECTS.push({x:lotStart(i),y:bandStart(r),w:TS,h:ST});
for(let c=0;c<3;c++)for(let r=0;r<3;r++)if(ex(c-1,r-1)||ex(c,r-1)||ex(c-1,r)||ex(c,r))RECTS.push({x:bandStart(c),y:bandStart(r),w:ST,h:ST});
RECTS.push({x:lotStart(1),y:lotStart(1),w:TS,h:TS});

const HOUSE=CS(90,76,g=>{
for(let r=0;r<=52;r++){const hw=(r<=26?r:52-r)+1;g.fillRect(50-hw,4+r,hw*2,1);}
const yE=x=>x<=49?x+6:106-x;
for(let x=24;x<=76;x++)g.fillRect(x,yE(x),1,14);
for(let x=50;x<=76;x++)for(let y=yE(x)+1;y<=yE(x)+13;y++)if((x+y)%2===0)g.clearRect(x,y,1,1);
for(let x=24;x<=76;x++)g.clearRect(x,yE(x),1,1);
g.clearRect(49,57,1,13);
for(let r=0;r<=52;r++){const hw=(r<=26?r:52-r)+1;if(hw>4){g.clearRect(50-hw+3,4+r,1,1);g.clearRect(50+hw-4,4+r,1,1);}}
g.clearRect(42,54,5,7);
g.fillRect(45,57,1,1);
g.clearRect(56,51,6,6);g.fillRect(56,51,6,1);
g.clearRect(66,41,6,6);g.fillRect(66,41,6,1);
g.fillRect(59,9,5,2);g.fillRect(60,11,3,6);
for(let r=0;r<=28;r++){const hw=(r<=14?r:28-r)+1;g.fillRect(26-hw,29+r,hw*2,1);}
const yW=x=>x<=25?x+31:83-x;
for(let x=12;x<=40;x++)g.fillRect(x,yW(x),1,10);
for(let x=26;x<=40;x++)for(let y=yW(x)+1;y<=yW(x)+9;y++)if((x+y)%2===0)g.clearRect(x,y,1,1);
for(let x=12;x<=40;x++)g.clearRect(x,yW(x),1,1);
g.clearRect(25,58,1,9);
g.clearRect(18,53,4,5);
g.fillRect(19,55,2,1);
});
const APT=CS(100,106,g=>{
for(let r=0;r<=48;r++){const hw=(r<=24?r:48-r)+1;g.fillRect(50-hw,26+r,hw*2,1);}
for(let r=0;r<=38;r++){const hw=(r<=19?r:38-r)+1;g.fillRect(50-hw,4+r,hw*2,1);}
const yEu=x=>x<=49?x-8:92-x;
for(let x=31;x<=69;x++)g.fillRect(x,yEu(x),1,9);
for(let x=50;x<=69;x++)for(let y=yEu(x)+1;y<=yEu(x)+8;y++)if((x+y)%2===0)g.clearRect(x,y,1,1);
for(let x=31;x<=69;x++)g.clearRect(x,yEu(x),1,1);
g.clearRect(49,43,1,8);
const yEl=x=>x<=49?x+24:124-x;
for(let x=26;x<=74;x++)g.fillRect(x,yEl(x),1,30);
for(let x=50;x<=74;x++)for(let y=yEl(x)+1;y<=yEl(x)+29;y++)if((x+y)%2===0)g.clearRect(x,y,1,1);
for(let x=26;x<=74;x++)g.clearRect(x,yEl(x),1,1);
g.clearRect(49,75,1,29);
for(let f=0;f<3;f++){
g.clearRect(30,59+f*8,5,5);
g.clearRect(39,68+f*8,5,5);
g.clearRect(55,70+f*8,5,5);g.fillRect(55,70+f*8,5,1);
g.clearRect(64,61+f*8,5,5);g.fillRect(64,61+f*8,5,1);
}
g.clearRect(36,32,4,4);
g.clearRect(57,36,4,3);
g.fillRect(33,69,7,1);g.clearRect(33,70,7,1);
g.clearRect(34,71,5,8);
for(let x=34;x<=38;x++)g.clearRect(x,79,1,yEl(x)+30-79);
g.fillRect(48,0,4,1);g.fillRect(49,1,2,6);
g.clearRect(26,46,6,5);g.fillRect(27,47,4,3);
});
const RUB=CS(92,80,g=>{
for(let x=10;x<=44;x++){g.fillRect(x,50-x,1,1);g.fillRect(x,x+30,1,1);g.fillRect(x,x+31,1,1);}
for(let x=45;x<=78;x++){g.fillRect(x,x-38,1,1);g.fillRect(x,118-x,1,1);g.fillRect(x,119-x,1,1);}
for(let x=18;x<=22;x++)g.fillRect(x,42-x,1,8);
for(let x=24;x<=31;x++)g.fillRect(x,39-x,1,11);
for(let x=26;x<=28;x++)g.clearRect(x,42-x,1,3);
for(let x=50;x<=56;x++)g.fillRect(x,x-45,1,7);
for(let x=59;x<=62;x++)g.fillRect(x,x-43,1,5);
const ch=(cx0,cy0,w,h)=>{g.fillRect(cx0,cy0,w,h);g.clearRect(cx0+w-1,cy0+1,1,h-1);g.clearRect(cx0+1,cy0+h-1,w-1,1);};
ch(30,36,5,4);ch(40,46,6,4);ch(50,38,5,3);ch(36,56,5,4);ch(48,58,4,3);ch(27,48,4,3);ch(56,50,5,4);
for(let y=42;y<=48;y++)for(let x=30;x<=42;x++)if((x+y)%4===0)g.fillRect(x,y,1,1);
for(let y=46;y<=52;y++)for(let x=48;x<=58;x++)if((x+y)%4===0)g.fillRect(x,y,1,1);
for(let i=0;i<5;i++)g.fillRect(28+2*i,16+2*i,2,2);
g.fillRect(24,60,1,1);g.fillRect(58,60,1,1);
});

function isoX(wx,wy){return OX+(wx-wy)/2;}
function isoY(wx,wy){return OY+(wx+wy)/2;}

const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let buf=null,bg=null;
function shadowDiamond(sx,sy,w){
if(w<=0)return;
bg.fillStyle=BG;
for(let r=0;r<w;r++){
const hw=Math.round(w/2*(1-Math.abs(2*r/w-1)));
if(hw>0)bg.fillRect(Math.round(sx-hw),Math.round(sy-w/2+r),hw*2,1);
}
}
function render(){
SS=Math.max(1,Math.round(window.devicePixelRatio||1));
cv.width=BW*2*SS;cv.height=BH*2*SS;
cx.imageSmoothingEnabled=false;
buf=mk(BW,BH);bg=buf.getContext("2d");
const id=bg.createImageData(BW,BH),px=id.data;
for(let sy=0;sy<BH;sy++)for(let sx=0;sx<BW;sx++){
const wx=Math.floor((sy-OY)+(sx-OX)),wy=Math.floor((sy-OY)-(sx-OX));
let c=worldColor(wx,wy);
if(!c){
let d=1e9;
for(const r of RECTS){
const dx=Math.max(r.x-wx,wx-(r.x+r.w),0),dy=Math.max(r.y-wy,wy-(r.y+r.h),0);
const dd=Math.max(dx,dy);
if(dd<d)d=dd;
if(d===0)break;
}
if(d>0&&d<23&&hash2(Math.floor(wx/4)*4,Math.floor(wy/4)*4)<0.45-d*0.02)c=C_FOG;
}
if(c){
const o=(sy*BW+sx)*4;
px[o]=c[0];px[o+1]=c[1];px[o+2]=c[2];px[o+3]=255;
}
}
bg.putImageData(id,0,0);
const place=(spr,ax,ay,wcx,wcy,fw)=>{
const sx=isoX(wcx,wcy),sy=isoY(wcx,wcy);
shadowDiamond(sx+2,sy+2,fw);
bg.drawImage(spr,Math.round(sx-ax),Math.round(sy-ay));
};
place(HOUSE,50,43,65,65,58);
place(APT,50,79,181,65,54);
place(RUB,44,40,65,181,0);
cx.drawImage(buf,0,0,BW*2*SS,BH*2*SS);
}
addEventListener("resize",render);
render();
</script>
</body>
</html>
