<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>opening 2x2 diagonal</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:20px 0 10px}
.panel{text-align:center;padding:10px 0 30px}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:1080px;max-width:100%}
</style>
</head>
<body>
<h1>OPENING / FLAT BOXES / DIAGONAL</h1>
<div class="panel">
<canvas id="cv"></canvas>
</div>
<script>
const FG="#f2f2f0",BG="#000000";
const PW=540,PH=540,TS=102,ST=14,WORLD=246,OX=270,OY=24;
let SS=2;
function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function hash2(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;}
function CS(w,h,fn){const c=mk(w,h),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}

const EXPL=[[true,true],[true,false]];
function ex(gx,gy){return gx>=0&&gx<2&&gy>=0&&gy<2&&EXPL[gy][gx];}
function seg(w){
if(w<0||w>=WORLD)return null;
if(w<14)return {k:"s",i:0};
if(w<116)return {k:"l",i:0};
if(w<130)return {k:"s",i:1};
if(w<232)return {k:"l",i:1};
return {k:"s",i:2};
}
function bandStart(i){return i===0?0:(i===1?116:232);}
function lotStart(i){return i===0?14:130;}
function dashHit(w){const m=((w-18)%24+24)%24;return m>=0&&m<8;}
const C_LOT=[26,26,26],C_ROAD=[22,22,22],C_CURB=[61,61,61],C_DASH=[90,90,90],C_DARK=[14,14,14],C_FOG=[30,30,30],C_BLACK=[0,0,0];
function worldColor(wx,wy){
const bx=seg(wx),by=seg(wy);
if(!bx||!by)return null;
if(bx.k==="l"&&by.k==="l"){
if(ex(bx.i,by.i))return C_LOT;
const d=Math.min(231-wx,231-wy);
if(d<14&&hash2(wx,wy)<0.55-d*0.04)return C_BLACK;
return C_DARK;
}
if(bx.k==="l"&&by.k==="s"){
if(!(ex(bx.i,by.i-1)||ex(bx.i,by.i)))return null;
const loc=wy-bandStart(by.i);
if(loc===0||loc===13)return C_CURB;
if(loc>=6&&loc<8&&dashHit(wx))return C_DASH;
return C_ROAD;
}
if(bx.k==="s"&&by.k==="l"){
if(!(ex(bx.i-1,by.i)||ex(bx.i,by.i)))return null;
const loc=wx-bandStart(bx.i);
if(loc===0||loc===13)return C_CURB;
if(loc>=6&&loc<8&&dashHit(wy))return C_DASH;
return C_ROAD;
}
if(ex(bx.i-1,by.i-1)||ex(bx.i,by.i-1)||ex(bx.i-1,by.i)||ex(bx.i,by.i))return C_ROAD;
return null;
}
const RECTS=[];
for(let gy=0;gy<2;gy++)for(let gx=0;gx<2;gx++)if(ex(gx,gy))RECTS.push({x:lotStart(gx),y:lotStart(gy),w:TS,h:TS});
for(let c=0;c<3;c++)for(let j=0;j<2;j++)if(ex(c-1,j)||ex(c,j))RECTS.push({x:bandStart(c),y:lotStart(j),w:ST,h:TS});
for(let r=0;r<3;r++)for(let i=0;i<2;i++)if(ex(i,r-1)||ex(i,r))RECTS.push({x:lotStart(i),y:bandStart(r),w:TS,h:ST});
for(let c=0;c<3;c++)for(let r=0;r<3;r++)if(ex(c-1,r-1)||ex(c,r-1)||ex(c-1,r)||ex(c,r))RECTS.push({x:bandStart(c),y:bandStart(r),w:ST,h:ST});
RECTS.push({x:lotStart(1),y:lotStart(1),w:TS,h:TS});

const HOUSE=CS(50,58,g=>{
for(let r=0;r<=22;r++)g.fillRect(24-r,2+r,2*r+1,1);
for(let r=1;r<=22;r++)g.fillRect(24-(22-r),24+r,2*(22-r)+1,1);
const yE=x=>x<=24?22+x:70-x;
for(let x=2;x<=46;x++)g.fillRect(x,yE(x),1,11);
for(let x=2;x<=46;x++)g.clearRect(x,yE(x),1,1);
g.clearRect(24,46,1,11);
for(let x=10;x<=14;x++)g.clearRect(x,yE(x)+4,1,7);
g.fillRect(13,yE(13)+8,1,1);
for(let x=30;x<=35;x++)g.clearRect(x,yE(x)+3,1,4);
g.fillRect(29,3,5,2);g.fillRect(30,5,3,6);
});
const APT=CS(50,82,g=>{
for(let r=0;r<=21;r++)g.fillRect(24-r,2+r,2*r+1,1);
for(let r=1;r<=21;r++)g.fillRect(24-(21-r),23+r,2*(21-r)+1,1);
const yE=x=>x<=24?20+x:68-x;
for(let x=3;x<=45;x++)g.fillRect(x,yE(x),1,36);
for(let x=3;x<=45;x++)g.clearRect(x,yE(x),1,1);
g.clearRect(24,44,1,36);
for(let f=0;f<4;f++){
const o=4+f*8;
for(let x=7;x<=10;x++)g.clearRect(x,yE(x)+o,1,4);
for(let x=16;x<=19;x++)g.clearRect(x,yE(x)+o,1,4);
for(let x=30;x<=33;x++)g.clearRect(x,yE(x)+o,1,4);
for(let x=37;x<=40;x++)g.clearRect(x,yE(x)+o,1,4);
}
for(let x=11;x<=15;x++)g.clearRect(x,yE(x)+29,1,7);
g.fillRect(26,12,5,4);
});
const RUB=CS(54,60,g=>{
for(let x=2;x<=26;x++){g.fillRect(x,34-x,1,1);g.fillRect(x,30+x,1,1);}
for(let x=27;x<=50;x++){g.fillRect(x,x-18,1,1);g.fillRect(x,82-x,1,1);}
for(let x=2;x<=50;x++)g.fillRect(x,(x<=26?30+x:82-x)+1,1,1);
for(let x=4;x<=8;x++)g.fillRect(x,24-x,1,10);
for(let x=11;x<=17;x++)g.fillRect(x,21-x,1,13);
for(let x=13;x<=15;x++)g.clearRect(x,25-x,1,3);
for(let x=31;x<=36;x++)g.fillRect(x,x-27,1,9);
for(let x=39;x<=42;x++)g.fillRect(x,x-24,1,6);
g.fillRect(21,28,4,3);g.fillRect(29,33,3,2);g.fillRect(17,36,3,2);g.fillRect(33,39,4,3);g.fillRect(25,43,3,2);g.fillRect(30,24,2,2);
g.fillRect(15,31,1,1);g.fillRect(37,35,1,1);g.fillRect(23,47,1,1);
for(let i=0;i<4;i++)g.fillRect(31+i*2,25-i*2,3,2);
});

function isoX(wx,wy){return OX+(wx-wy);}
function isoY(wx,wy){return OY+(wx+wy);}

const cv=document.getElementById("cv"),cx=cv.getContext("2d");
function shadowDiamond(sx,sy,w,h){
if(w<=0)return;
cx.fillStyle=BG;
for(let r=0;r<h;r++){
const hw=Math.round(w/2*(1-Math.abs(2*r/h-1)));
if(hw>0)cx.fillRect(Math.round((sx-hw)*SS),Math.round((sy-h/2+r)*SS),Math.round(hw*2*SS),Math.max(1,Math.round(SS)));
}
}
function render(){
SS=2*(window.devicePixelRatio||1);
cv.width=Math.round(PW*SS);cv.height=Math.round(PH*SS);
cx.imageSmoothingEnabled=false;
cx.fillStyle=BG;cx.fillRect(0,0,cv.width,cv.height);
const off=mk(PW,PH),og=off.getContext("2d");
const id=og.createImageData(PW,PH),px=id.data;
for(let sy=0;sy<PH;sy++)for(let sx=0;sx<PW;sx++){
const wx=Math.floor(((sy-OY)+(sx-OX))/2),wy=Math.floor(((sy-OY)-(sx-OX))/2);
let c=worldColor(wx,wy);
if(!c){
let d=1e9;
for(const r of RECTS){
const dx=Math.max(r.x-wx,wx-(r.x+r.w),0),dy=Math.max(r.y-wy,wy-(r.y+r.h),0);
const dd=Math.max(dx,dy);
if(dd<d)d=dd;
if(d===0)break;
}
if(d>0&&d<23&&hash2(Math.floor(wx/2)*2,Math.floor(wy/2)*2)<0.45-d*0.02)c=C_FOG;
}
if(c){
const o=(sy*PW+sx)*4;
px[o]=c[0];px[o+1]=c[1];px[o+2]=c[2];px[o+3]=255;
}
}
og.putImageData(id,0,0);
cx.drawImage(off,0,0,Math.round(PW*SS),Math.round(PH*SS));
const place=(spr,ax,ay,wcx,wcy,fw,fh)=>{
const sx=isoX(wcx,wcy),sy=isoY(wcx,wcy);
shadowDiamond(sx+3,sy+3,fw,fh);
cx.drawImage(spr,Math.round((sx-ax*2)*SS),Math.round((sy-ay*2)*SS),Math.round(spr.width*2*SS),Math.round(spr.height*2*SS));
};
place(HOUSE,24,35,65,65,96,96);
place(APT,24,59,181,65,88,88);
place(RUB,26,34,65,181,0,0);
}
addEventListener("resize",render);
render();
</script>
</body>
</html>
