<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>survivor faces</title>
<style>
html,body{margin:0;height:100%;background:#060607;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,BG="#0a0a0c",FG="#e9e7e0",PANEL="#f4f4f0";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;
const FONT={"A":[".X.","X.X","XXX","X.X","X.X"],"C":[".XX","X..","X..","X..",".XX"],"D":["XX.","X.X","X.X","X.X","XX."],"E":["XXX","X..","XX.","X..","XXX"],"F":["XXX","X..","XX.","X..","X.."],"I":["XXX",".X.",".X.",".X.","XXX"],"L":["X..","X..","X..","X..","XXX"],"M":["X.X","XXX","X.X","X.X","X.X"],"N":["XX.","X.X","X.X","X.X","X.X"],"O":[".X.","X.X","X.X","X.X",".X."],"R":["XX.","X.X","XX.","X.X","X.X"],"S":[".XX","X..",".X.","..X","XX."],"T":["XXX",".X.",".X.",".X.",".X."],"U":["X.X","X.X","X.X","X.X","XXX"],"V":["X.X","X.X","X.X","X.X",".X."],"W":["X.X","X.X","X.X","XXX","X.X"],"Y":["X.X","X.X",".X.",".X.",".X."],"G":[".XX","X..","X.X","X.X",".XX"],"H":["X.X","X.X","XXX","X.X","X.X"],"P":["XX.","X.X","XX.","X..","X.."]," ":["...","...","...","...","..."]};
const man=new Image();man.src="../person_man.png";
const woman=new Image();woman.src="../person_woman.png";
let ready=0;man.onload=()=>{ready++;draw();};woman.onload=()=>{ready++;draw();};

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function rr(v){return Math.round(v*S);}
function box(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function tw(s,n){return (s.length*4-1)*n;}
function text(s,x,y,n,al){if(al==="c")x=Math.round(x-tw(s,n)/2);for(const ch of s){const g=FONT[ch];if(g)for(let r=0;r<5;r++)for(let q=0;q<3;q++)if(g[r][q]==="X")box(x+q*n,y+r*n,n,n,FG);x+=4*n;}}
function blit(img,x,y,n){if(!img.width)return;const a=rr(x),b=rr(y);cx.drawImage(img,a,b,rr(x+img.width*n)-a,rr(y+img.height*n)-b);}

function draw(){
box(0,0,W,H,BG);
text("SURVIVOR FACES  YOUR ART ISOLATED",480,26,3,"c");
const cards=[[man,"MAN"],[woman,"WOMAN"]];
for(let i=0;i<2;i++){
 const x=200+i*400,y=70;
 box(x,y,200,240,PANEL);
 blit(cards[i][0],x+44,y+30,3);
 text(cards[i][1],x+100,y+205,2,"c");
}
text("SMALL",200,360,2);
for(let i=0;i<2;i++){box(240+i*90,352,70,70,PANEL);blit(cards[i][0],252+i*90,360,1);}
text("TINY",520,360,2);
for(let i=0;i<2;i++){blit(cards[i][0],600+i*60,368,0.6);}
}
addEventListener("resize",()=>{fit();draw();});
fit();function step(){draw();requestAnimationFrame(step);}step();
