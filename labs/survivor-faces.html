<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bust recreate</title>
<style>
html,body{margin:0;height:100%;background:#060607;overflow:hidden}
[hidden]{display:none !important}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const W=960,H=540,BG="#0a0a0c",FG="#e9e7e0";
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
let k=1,S=1,dpr=1;
const NAVY="#101e29",FACE="#f8f8f8",GRAY="#909dad";

const FONT={"A":[".X.","X.X","XXX","X.X","X.X"],"B":["XX.","X.X","XX.","X.X","XX."],"C":[".XX","X..","X..","X..",".XX"],"E":["XXX","X..","XX.","X..","XXX"],"F":["XXX","X..","XX.","X..","X.."],"I":["XXX",".X.",".X.",".X.","XXX"],"L":["X..","X..","X..","X..","XXX"],"M":["X.X","XXX","X.X","X.X","X.X"],"N":["XX.","X.X","X.X","X.X","X.X"],"O":[".X.","X.X","X.X","X.X",".X."],"R":["XX.","X.X","XX.","X.X","X.X"],"U":["X.X","X.X","X.X","X.X","XXX"],"W":["X.X","X.X","X.X","XXX","X.X"],"Y":["X.X","X.X",".X.",".X.",".X."],"S":[".XX","X..",".X.","..X","XX."],"T":["XXX",".X.",".X.",".X.",".X."],"D":["XX.","X.X","X.X","X.X","XX."],"H":["X.X","X.X","XXX","X.X","X.X"],"G":[".XX","X..","X.X","X.X",".XX"],"P":["XX.","X.X","XX.","X..","X.."],"V":["X.X","X.X","X.X","X.X",".X."]," ":["...","...","...","...","..."]};

const MAN=[
"......................",
"......................",
"........######........",
".......########.......",
"......##########......",
"......##########......",
"......##########......",
"......##......##......",
"......##.#..#.##......",
"......##.#..#.##......",
"......##.#..#.##......",
"......##......##......",
"......##......##......",
".......#......#.......",
".........++++.........",
"........++++++........",
".......++++++++.......",
"......++++++++++......",
"......++++++++++......",
".....++++++++++++.....",
".....++++++++++++.....",
".....++++++++++++.....",
".....++++++++++++.....",
".....++++++++++++.....",
".....++++++++++++.....",
".....++++++++++++....."];

const WOMAN=[
"......................",
"......................",
"........######........",
".......########.......",
"......##########......",
".....############.....",
".....###......###.....",
".....###......###.....",
".....###.#..#.###.....",
".....###.#..#.###.....",
".....###.#..#.###.....",
".....###......###.....",
".....###......###.....",
".....###......###.....",
".....###.++++.###.....",
".....###++++++###.....",
".....###++++++###.....",
".....###++++++###.....",
".....###++++++###.....",
".....###++++++###.....",
"....####++++++####....",
"....####++++++####....",
"....####++++++####....",
"....####++++++####....",
"....####++++++####....",
"....####++++++####...."];

const ref=new Image();let refReady=false;ref.onload=()=>{refReady=true;};ref.src="../assetFace.png";

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function rr(v){return Math.round(v*S);}
function box(x,y,w,h,col){cx.fillStyle=col;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function tw(s,n){return (s.length*4-1)*n;}
function text(s,x,y,n,al){if(al==="c")x=Math.round(x-tw(s,n)/2);for(const ch of s){const g=FONT[ch];if(g)for(let r=0;r<5;r++)for(let q=0;q<3;q++)if(g[r][q]==="X")box(x+q*n,y+r*n,n,n,FG);x+=4*n;}}
function drawBust(bmp,px,py,n){
 for(let y=0;y<bmp.length;y++)for(let x=0;x<bmp[y].length;x++){const c=bmp[y][x];let col=null;if(c==="#")col=NAVY;else if(c==="+")col=GRAY;if(col)box(px+x*n,py+y*n,n,n,col);}
}
function drawImg(img,px,py,scale){const a=rr(px),b=rr(py);cx.drawImage(img,a,b,rr(px+img.width*scale)-a,rr(py+img.height*scale)-b);}

function draw(){
box(0,0,W,H,BG);
text("YOUR ART",250,40,3,"c");
text("RECREATED",690,40,3,"c");
if(refReady){box(60,70,380,210,FACE);drawImg(ref,70,75,1.5);}
box(470,70,440,320,FACE);
const n=8;
drawBust(MAN,505,90,n);
drawBust(WOMAN,710,90,n);
text("MAN",567,320,2,"c");text("WOMAN",772,320,2,"c");
}
function step(){draw();requestAnimationFrame(step);}
addEventListener("resize",()=>{fit();draw();});
ref.onload=()=>{refReady=true;draw();};
fit();draw();requestAnimationFrame(step);
</script>
</body>
</html>
