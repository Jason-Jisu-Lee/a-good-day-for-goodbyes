<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>shine</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:22px 0 12px}
#g{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:10px 16px}
.panel{text-align:center}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:320px;max-width:100%;border:1px solid #1a1a1a}
.cap{color:#ddd;font-size:13px;letter-spacing:2px;margin-top:8px}
</style>
</head>
<body>
<h1>SHINE</h1>
<div id="g">
<div class="panel"><canvas id="c0"></canvas><div class="cap">1 SOFT</div></div>
<div class="panel"><canvas id="c1"></canvas><div class="cap">2 MEDIUM</div></div>
<div class="panel"><canvas id="c2"></canvas><div class="cap">3 STRONG</div></div>
</div>
<script>
const CW=320,CH=240,TX=160,TY=130;
const HOUSE=new Image();
HOUSE.src="../asset/tiles/ref_house150.png";
const cvs=[0,1,2].map(i=>document.getElementById("c"+i));
const CFG=[{a:0.22,w:70,gap:14,sp:2600},{a:0.35,w:46,gap:12,sp:2200},{a:0.5,w:30,gap:10,sp:1700}];
const off=document.createElement("canvas");
off.width=150;off.height=128;
const og=off.getContext("2d");
function render(t){
if(HOUSE.width){
for(let i=0;i<3;i++){
const c=cvs[i];
if(c.width!==CW*2){c.width=CW*2;c.height=CH*2;}
const g=c.getContext("2d");
g.setTransform(2,0,0,2,0,0);
g.imageSmoothingEnabled=false;
g.fillStyle="#000";g.fillRect(0,0,CW,CH);
const cfg=CFG[i];
og.setTransform(1,0,0,1,0,0);
og.clearRect(0,0,150,128);
og.drawImage(HOUSE,0,0);
og.globalCompositeOperation="source-atop";
const ph=((t%cfg.sp)/cfg.sp)*2-0.5;
const bx=ph*(150+160)-80;
og.save();
og.translate(bx,64);
og.rotate(-0.5);
og.fillStyle="rgba(0,0,0,"+cfg.a+")";
og.fillRect(-cfg.gap/2-cfg.w,-160,cfg.w,320);
og.fillRect(cfg.gap/2,-160,cfg.w,320);
og.restore();
og.globalCompositeOperation="source-over";
g.drawImage(off,TX-71,TY-77);
}
}
requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
