<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3x3 block board</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:20px 0 10px}
#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:30px;max-width:2280px;margin:0 auto;padding:18px}
.panel{text-align:center}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:724px;max-width:100%}
.cap{color:#ddd;font-size:13px;letter-spacing:2px;margin-top:10px}
</style>
</head>
<body>
<h1>3X3 BLOCK BOARD</h1>
<div id="grid">
<div class="panel"><canvas id="c0"></canvas><div class="cap">A FLAT BOXES</div></div>
<div class="panel"><canvas id="c1"></canvas><div class="cap">C SHADOW MASS</div></div>
<div class="panel"><canvas id="c2"></canvas><div class="cap">F DITHERWORK</div></div>
</div>
<script>
const FG="#f2f2f0",BG="#000000",LOTG="#1a1a1a",SW="#232323",SWE="#2e2e2e",ROADC="#0f0f0f",DASHC="#303030",SEAM="#0d0d0d";
const PW=362,PH=425;
let SS=2,q=null;
function R(v){return Math.round(v*SS);}
function pq(x,y,w,h,col){q.fillStyle=col;const a=R(x),b=R(y);q.fillRect(a,b,R(x+w)-a,R(y+h)-b);}
function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function bl(s,x,y){const a=R(x),b=R(y);q.drawImage(s,a,b,R(x+s.width*3)-a,R(y+s.height*3)-b);}
function hash2(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;}
function C34(fn){const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}
function disc(g,cx,cy,r){for(let y=Math.floor(cy-r);y<=Math.ceil(cy+r);y++){const dy=y-cy,t=r*r-dy*dy;if(t<0)continue;const hw=Math.sqrt(t);for(let x=Math.ceil(cx-hw);x<=Math.floor(cx+hw);x++)g.fillRect(x,y,1,1);}}

const A_ap=C34(g=>{
for(let r=0;r<4;r++)g.fillRect(5+r,7-r,13,1);
g.fillRect(5,8,12,21);
for(let k=0;k<4;k++)g.fillRect(17+k,8-k,1,21);
g.clearRect(5,8,12,1);
for(let gy=0;gy<4;gy++)for(let gx=0;gx<2;gx++)g.clearRect(7+gx*5,11+gy*4,2,2);
g.clearRect(9,26,3,3);
});
const A_ho=C34(g=>{
for(let r=0;r<3;r++)g.fillRect(4+r,18-r,15,1);
g.fillRect(4,19,14,10);
for(let k=0;k<3;k++)g.fillRect(18+k,19-k,1,10);
g.clearRect(4,19,14,1);
g.clearRect(7,24,3,5);
g.clearRect(13,22,3,3);
});
const A_gr=C34(g=>{
for(let r=0;r<4;r++)g.fillRect(2+r,18-r,23,1);
g.fillRect(2,19,22,10);
for(let k=0;k<4;k++)g.fillRect(24+k,19-k,1,10);
g.clearRect(2,19,22,1);
g.clearRect(4,22,12,4);
g.clearRect(18,23,4,6);
});
const A_sc=C34(g=>{
g.fillRect(3,15,26,1);
for(let x=3;x<30;x+=4)g.fillRect(x,14,1,2);
g.fillRect(3,15,1,13);
g.fillRect(28,15,1,13);
g.fillRect(3,27,9,1);
g.fillRect(20,27,9,1);
g.fillRect(8,23,6,3);g.fillRect(9,21,4,2);
g.fillRect(19,24,6,3);g.fillRect(21,22,3,2);
});
const A_ru=C34(g=>{
g.fillRect(4,17,2,12);
g.fillRect(4,17,9,2);
for(let i=0;i<6;i++)g.fillRect(11+i*2,20+i,7,2);
g.fillRect(24,27,4,2);g.fillRect(8,27,4,2);g.fillRect(15,28,3,1);
g.fillRect(19,28,1,1);g.fillRect(6,28,1,1);
});
const A_ca=C34(g=>{
for(let y=20;y<=28;y++){const hw=Math.round((y-20)*0.85);g.fillRect(9-hw,y,2*hw+2,1);}
g.clearRect(8,24,3,5);
g.fillRect(22,26,3,2);g.fillRect(23,24,1,2);g.fillRect(21,23,1,1);g.fillRect(25,23,1,1);
g.fillRect(20,28,7,1);
g.fillRect(27,22,4,4);g.clearRect(28,23,2,1);
});
const A_pa=C34(g=>{
g.fillRect(5,13,10,8);
g.fillRect(9,21,2,5);
g.fillRect(19,17,8,6);
g.fillRect(22,23,2,4);
g.fillRect(5,27,7,1);
g.fillRect(6,28,1,1);g.fillRect(10,28,1,1);
});
const A_lo=C34(g=>{
g.fillRect(9,21,13,7);
g.clearRect(11,23,9,3);
g.fillRect(5,27,1,2);g.fillRect(24,26,1,3);g.fillRect(26,28,1,1);g.fillRect(7,25,1,1);
});
const A_po=C34(g=>{
for(let r=0;r<3;r++)g.fillRect(3+r,14-r,20,1);
g.fillRect(3,15,19,14);
for(let k=0;k<3;k++)g.fillRect(22+k,15-k,1,14);
g.clearRect(3,15,19,1);
g.clearRect(5,18,15,3);
g.clearRect(10,24,6,5);
g.fillRect(6,9,1,4);g.fillRect(5,8,3,1);
});

const C_ap=C34(g=>{
g.fillRect(4,16,14,13);
g.fillRect(6,8,10,8);
g.fillRect(8,5,6,3);
g.fillStyle=BG;
for(let k=0;k<4;k++)g.fillRect(18+k,16-k,1,13);
g.fillStyle=FG;
g.clearRect(7,19,2,2);g.clearRect(13,19,2,2);
g.clearRect(7,22,2,2);g.clearRect(13,22,2,2);
g.clearRect(9,10,2,2);
g.clearRect(9,25,4,4);
});
const C_ho=C34(g=>{
for(let y=14;y<=19;y++){const hw=Math.round((y-14)*1.4);g.fillRect(10-hw,y,2*hw+2,1);}
g.fillRect(3,20,14,9);
g.fillStyle=BG;
for(let k=0;k<4;k++)g.fillRect(17+k,20-k,1,9);
g.fillStyle=FG;
g.clearRect(8,24,3,5);
});
const C_gr=C34(g=>{
g.fillRect(2,17,22,12);
g.fillStyle=BG;
for(let k=0;k<4;k++)g.fillRect(24+k,17-k,1,12);
g.fillStyle=FG;
g.clearRect(0,20,26,1);
g.fillRect(0,21,26,3);
g.clearRect(4,25,9,2);
g.clearRect(17,25,4,4);
});
const C_sc=C34(g=>{
g.fillRect(4,24,8,5);g.fillRect(6,22,4,2);
g.fillRect(14,25,7,4);g.fillRect(16,23,3,2);
g.fillRect(23,26,6,3);
g.fillRect(26,11,1,15);
g.fillRect(19,11,8,1);
g.fillRect(20,12,1,3);
g.fillRect(19,15,3,1);
});
const C_ru=C34(g=>{
g.fillRect(4,19,7,10);g.fillRect(4,17,4,2);
g.fillRect(15,22,10,7);g.fillRect(17,20,5,2);
for(let i=0;i<4;i++)g.clearRect(6+i,21+i*2,1,2);
g.fillRect(27,26,3,3);g.fillRect(12,27,2,2);
g.fillStyle=BG;
for(let k=0;k<3;k++)g.fillRect(25+k,22-k,1,7);
g.fillStyle=FG;
});
const C_ca=C34(g=>{
for(let y=18;y<=27;y++){const hw=Math.round((y-18)*0.8);g.fillRect(10-hw,y,2*hw+2,1);}
g.clearRect(9,22,3,6);
g.fillRect(24,24,2,2);g.fillRect(23,22,1,1);g.fillRect(26,21,1,1);
g.fillRect(23,27,5,1);
});
const C_pa=C34(g=>{
disc(g,9,16,5.2);
g.fillStyle=BG;
disc(g,12,15,2.6);
g.fillStyle=FG;
g.fillRect(7,21,2,6);
disc(g,21,20,4);
g.fillStyle=BG;
disc(g,23,19,2);
g.fillStyle=FG;
g.fillRect(20,24,2,4);
g.fillRect(27,26,5,2);g.fillRect(28,28,1,1);g.fillRect(31,28,1,1);
});
const C_lo=C34(g=>{
g.fillRect(9,24,14,4);
g.fillRect(11,22,10,2);
g.fillStyle=BG;
for(let k=0;k<3;k++)g.fillRect(23+k,24-k,1,4);
g.fillStyle=FG;
g.fillRect(6,27,1,2);g.fillRect(27,27,1,2);
});
const C_po=C34(g=>{
g.fillRect(4,14,18,15);
g.clearRect(7,14,2,2);g.clearRect(12,14,2,2);g.clearRect(17,14,2,2);
g.clearRect(7,19,2,5);g.clearRect(13,19,2,5);
g.clearRect(16,24,4,5);
g.fillStyle=BG;
for(let k=0;k<4;k++)g.fillRect(22+k,14-k,1,15);
g.fillStyle=FG;
g.fillRect(6,10,1,4);g.fillRect(5,9,3,1);
});

const F_ap=C34(g=>{
g.fillRect(4,8,15,1);
g.fillRect(5,9,13,20);
g.fillRect(7,5,4,3);
for(let k=0;k<3;k++)for(let y=9-k;y<29-k;y++)if((18+k+y)%2===0)g.fillRect(18+k,y,1,1);
g.clearRect(7,12,3,2);g.clearRect(12,12,3,2);
g.clearRect(7,17,3,2);g.clearRect(12,17,3,2);
g.clearRect(7,22,3,2);g.clearRect(12,22,3,2);
g.clearRect(9,26,4,3);
g.clearRect(6,11,1,1);g.clearRect(16,14,1,1);g.clearRect(6,20,1,1);g.clearRect(16,24,1,1);
});
const F_ho=C34(g=>{
for(let r=0;r<4;r++)g.fillRect(3+r,17-r,16,1);
g.fillRect(3,18,15,11);
for(let k=0;k<3;k++)for(let y=18-k;y<29-k;y++)if((18+k+y)%2===0)g.fillRect(18+k,y,1,1);
g.fillRect(15,11,2,3);
g.fillRect(14,8,1,1);g.fillRect(13,6,1,1);
g.clearRect(6,23,3,6);
g.clearRect(12,21,4,3);
});
const F_gr=C34(g=>{
g.fillRect(3,14,20,15);
g.clearRect(3,19,20,1);
for(let x=4;x<22;x+=2)g.clearRect(x,20,1,2);
g.clearRect(3,23,20,1);
g.clearRect(5,25,7,2);
g.clearRect(16,24,4,5);
for(let k=0;k<3;k++)for(let y=14-k;y<29-k;y++)if((23+k+y)%2===0)g.fillRect(23+k,y,1,1);
});
const F_sc=C34(g=>{
for(let r=0;r<3;r++)g.fillRect(3+r,15-r,13,1);
g.fillRect(3,16,12,13);
for(let x=4;x<15;x+=2)g.clearRect(x,18,1,9);
g.clearRect(9,22,5,7);
for(let y=22;y<=28;y++){const half=y-21;for(let x=22-half;x<=22+half;x++)if((x+y)%2===0&&x<32)g.fillRect(x,y,1,1);}
g.fillRect(20,26,3,2);g.fillRect(24,27,2,1);
});
const F_ru=C34(g=>{
g.fillRect(5,15,9,14);
g.clearRect(5,15,3,2);g.clearRect(11,15,3,3);g.clearRect(8,15,2,1);
g.clearRect(8,20,3,3);
g.clearRect(6,25,1,1);g.clearRect(11,23,1,1);
for(let y=21;y<=28;y++){const half=y-20;for(let x=19-half;x<=19+half;x++)if((x+y)%2===0&&x<33&&x>13)g.fillRect(x,y,1,1);}
g.fillRect(16,26,3,2);g.fillRect(24,27,3,2);
});
const F_ca=C34(g=>{
for(let y=19;y<=27;y++){const hw=Math.round((y-19)*0.9);g.fillRect(9-hw,y,2*hw+2,1);}
g.clearRect(7,21,6,1);
g.clearRect(5,24,10,1);
g.clearRect(8,23,3,5);
g.fillRect(22,25,3,2);
g.fillRect(24,22,1,1);g.fillRect(25,20,1,1);g.fillRect(24,18,1,1);g.fillRect(26,16,1,1);
g.fillRect(27,27,5,2);g.clearRect(28,27,1,2);g.clearRect(30,27,1,2);
});
const F_pa=C34(g=>{
for(let y=11;y<=20;y++)for(let x=4;x<=15;x++)if(Math.hypot(x-9.5,y-15.5)<=4.8&&(x+y)%2===0)g.fillRect(x,y,1,1);
g.fillRect(8,16,4,2);
g.fillRect(9,20,2,6);
for(let y=14;y<=22;y++)for(let x=17;x<=26;x++)if(Math.hypot(x-21.5,y-18.5)<=3.6&&(x+y)%2===0)g.fillRect(x,y,1,1);
g.fillRect(20,18,3,1);
g.fillRect(21,22,1,5);
g.fillRect(5,28,1,1);g.fillRect(14,27,1,2);g.fillRect(27,28,1,1);
});
const F_lo=C34(g=>{
for(let y=21;y<=27;y++)for(let x=7;x<=25;x++){const e=(x-16)*(x-16)/64+(y-24)*(y-24)/8;if(e<1&&(x+y)%2===0)g.fillRect(x,y,1,1);}
g.fillRect(6,27,1,2);g.fillRect(26,26,1,3);
g.fillRect(19,26,5,1);
});
const F_po=C34(g=>{
g.fillRect(3,12,20,1);
g.fillRect(4,13,18,16);
for(let k=0;k<3;k++)for(let y=13-k;y<29-k;y++)if((22+k+y)%2===0)g.fillRect(22+k,y,1,1);
g.clearRect(6,17,5,4);g.fillRect(8,17,1,4);
g.clearRect(14,17,5,4);g.fillRect(16,17,1,4);
g.clearRect(10,24,5,5);
g.clearRect(11,14,4,2);
g.clearRect(5,15,1,1);g.clearRect(19,21,1,1);g.clearRect(6,26,1,1);g.clearRect(18,26,1,1);
g.fillRect(6,8,1,4);g.fillRect(5,7,3,1);
});

const PANELS=[
{grid:[[A_ap,A_po,A_ho],[A_gr,A_pa,A_ca],[A_ru,A_lo,A_sc]],sh:"solid"},
{grid:[[C_ap,C_po,C_ho],[C_gr,C_pa,C_ca],[C_ru,C_lo,C_sc]],sh:"solid"},
{grid:[[F_ap,F_po,F_ho],[F_gr,F_pa,F_ca],[F_ru,F_lo,F_sc]],sh:"dither"}
];
const SHW=[[66,72,54],[72,0,0],[0,0,0]];

function street(y){
pq(12,y,338,1,SWE);
pq(12,y+1,338,6,SW);
pq(12,y+7,338,16,ROADC);
for(let x=16;x<346;x+=24)pq(x,y+14,10,2,DASHC);
}
function shadow(x,y,w,mode){
if(mode==="none"||w===0)return;
if(mode==="solid"){pq(x,y,w,5,BG);return;}
for(let yy=y;yy<y+5;yy+=2)for(let xx=x;xx<x+w;xx+=2)if((xx+yy)%4===0)pq(xx,yy,2,2,BG);
}
function scatter(rects){
for(let yy=0;yy<PH;yy+=2)for(let xx=0;xx<PW;xx+=2){
let d=1e9;
for(const r of rects){
const dx=Math.max(r.x-xx,xx-(r.x+r.w),0),dy=Math.max(r.y-yy,yy-(r.y+r.h),0);
const dd=Math.max(dx,dy);
if(dd<d)d=dd;
if(d===0)break;
}
if(d>0&&d<23&&hash2(xx,yy)<0.45-d*0.02)pq(xx,yy,2,2,"#1e1e1e");
}}

const cvs=[0,1,2].map(i=>document.getElementById("c"+i));
function render(){
SS=2*(window.devicePixelRatio||1);
for(let i=0;i<3;i++){
const c=cvs[i];
c.width=Math.round(PW*SS);c.height=Math.round(PH*SS);
q=c.getContext("2d");q.imageSmoothingEnabled=false;
pq(0,0,PW,PH,BG);
const p=PANELS[i];
const rows=[22,147,272];
const rects=[];
for(const ry of rows){
pq(28,ry,306,102,LOTG);
pq(129,ry,2,102,SEAM);
pq(231,ry,2,102,SEAM);
rects.push({x:28,y:ry,w:306,h:102});
}
for(const sy of [124,249,374]){street(sy);rects.push({x:12,y:sy,w:338,h:23});}
for(let gy=0;gy<3;gy++)for(let gx=0;gx<3;gx++){
const x=28+gx*102,y=rows[gy];
shadow(x+12,y+88,SHW[gy][gx],p.sh);
bl(p.grid[gy][gx],x,y);
}
scatter(rects);
}
}
addEventListener("resize",render);
render();
</script>
</body>
</html>
