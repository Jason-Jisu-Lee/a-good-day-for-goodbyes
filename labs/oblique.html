<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>oblique board</title>
<style>
html,body{margin:0;background:#000;color:#888;font:12px system-ui}
[hidden]{display:none !important}
h1{font:600 14px system-ui;color:#ccc;letter-spacing:3px;text-align:center;margin:20px 0 10px}
#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:26px;max-width:1150px;margin:0 auto;padding:18px}
.panel{text-align:center}
canvas{display:block;margin:0 auto;image-rendering:pixelated;width:520px;max-width:100%}
.cap{color:#ddd;font-size:13px;letter-spacing:2px;margin-top:10px}
</style>
</head>
<body>
<h1>OBLIQUE BOARD / GROCERY + HOUSE</h1>
<div id="grid">
<div class="panel"><canvas id="c0"></canvas><div class="cap">#1 CHUNKY</div></div>
<div class="panel"><canvas id="c1"></canvas><div class="cap">#2 DITHER</div></div>
<div class="panel"><canvas id="c2"></canvas><div class="cap">#3 SOLID</div></div>
<div class="panel"><canvas id="c3"></canvas><div class="cap">#6 OUTLINE</div></div>
</div>
<script>
const FG="#f2f2f0",BG="#000000",LOTG="#1a1a1a",SW="#232323",SWE="#2e2e2e",ROADC="#0f0f0f",DASHC="#303030",SEAM="#0d0d0d";
const PW=260,PH=180,TX=28,TY=26;
let SS=2,q=null;
function R(v){return Math.round(v*SS);}
function pq(x,y,w,h,col){q.fillStyle=col;const a=R(x),b=R(y);q.fillRect(a,b,R(x+w)-a,R(y+h)-b);}
function mk(w,h){const c=document.createElement("canvas");c.width=w;c.height=h||w;return c;}
function bl(s,x,y,n){const a=R(x),b=R(y);q.drawImage(s,a,b,R(x+s.width*n)-a,R(y+s.height*n)-b);}
function hash2(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233)*43758.5453)%1;}
function C34(fn){const c=mk(34),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}
function C17(fn){const c=mk(17),g=c.getContext("2d");g.fillStyle=FG;fn(g);return c;}
function seg(g,x0,y0,x1,y1){const n=Math.max(Math.abs(x1-x0),Math.abs(y1-y0));for(let i=0;i<=n;i++){g.fillRect(Math.round(x0+(x1-x0)*i/n),Math.round(y0+(y1-y0)*i/n),1,1);}}
function rect1(g,x,y,w,h){g.fillRect(x,y,w,1);g.fillRect(x,y+h-1,w,1);g.fillRect(x,y,1,h);g.fillRect(x+w-1,y,1,h);}

function grocGeom(g){
for(let r=0;r<6;r++)g.fillRect(2+r,18-r,27,1);
g.fillRect(2,19,26,10);
for(let k=0;k<6;k++)g.fillRect(28+k,19-k,1,10);
}
function grocCuts(g){
g.clearRect(2,19,27,1);
g.clearRect(27,20,1,9);
for(let k=1;k<6;k++)g.clearRect(28+k,19-k,1,1);
g.clearRect(16,15,4,1);g.clearRect(15,16,4,1);
g.clearRect(3,22,23,1);
g.clearRect(5,24,8,3);
g.clearRect(19,23,5,6);
}
function grocProps(g){
g.fillRect(7,29,3,3);g.clearRect(8,30,1,1);
g.fillRect(11,30,3,2);
}
function houseGeom(g){
for(let r=0;r<7;r++)g.fillRect(2+r,19-r,23,1);
g.fillRect(4,20,19,9);
for(let k=0;k<7;k++)g.fillRect(23+k,20-k,1,9);
g.fillRect(20,9,3,4);
}
function houseCuts(g){
g.clearRect(4,20,19,1);
g.clearRect(22,21,1,8);
for(let k=1;k<7;k++)g.clearRect(23+k,20-k,1,1);
g.clearRect(7,23,4,6);
g.clearRect(13,22,4,4);
}
function houseProps(g){
g.fillRect(7,29,4,1);
}

const G_SOLID=C34(g=>{grocGeom(g);grocCuts(g);grocProps(g);});
const H_SOLID=C34(g=>{houseGeom(g);houseCuts(g);houseProps(g);});
const G_DITH=C34(g=>{
for(let r=0;r<6;r++)g.fillRect(2+r,18-r,27,1);
g.fillRect(2,19,26,10);
for(let k=0;k<6;k++)for(let y=19-k;y<29-k;y++)if((28+k+y)%2===0)g.fillRect(28+k,y,1,1);
grocCuts(g);grocProps(g);
});
const H_DITH=C34(g=>{
for(let r=0;r<7;r++)g.fillRect(2+r,19-r,23,1);
g.fillRect(4,20,19,9);
for(let k=0;k<7;k++)for(let y=20-k;y<29-k;y++)if((23+k+y)%2===0)g.fillRect(23+k,y,1,1);
g.fillRect(20,9,3,4);
houseCuts(g);houseProps(g);
g.fillRect(19,6,1,1);g.fillRect(18,4,1,1);
});
const G_OUT=C34(g=>{
g.fillStyle=BG;grocGeom(g);g.fillStyle=FG;
seg(g,2,18,28,18);seg(g,7,13,33,13);seg(g,2,18,7,13);seg(g,28,18,33,13);
seg(g,28,19,33,14);g.fillRect(33,14,1,10);seg(g,28,28,33,23);
rect1(g,2,19,26,10);
seg(g,16,15,19,15);seg(g,15,16,18,16);
seg(g,3,22,25,22);
rect1(g,5,24,8,3);
rect1(g,19,23,5,6);
rect1(g,7,29,3,3);g.fillRect(11,30,3,2);
});
const H_OUT=C34(g=>{
g.fillStyle=BG;houseGeom(g);g.fillStyle=FG;
seg(g,2,19,24,19);seg(g,8,13,30,13);seg(g,2,19,8,13);seg(g,24,19,30,13);
seg(g,23,20,29,14);g.fillRect(29,14,1,9);seg(g,23,28,29,22);
rect1(g,4,20,19,9);
rect1(g,20,9,3,4);
rect1(g,7,23,4,6);
rect1(g,13,22,4,4);
seg(g,7,29,10,29);
});
const G_CHUNK=C17(g=>{
for(let r=0;r<3;r++)g.fillRect(1+r,9-r,14,1);
g.fillRect(1,10,13,5);
for(let k=0;k<3;k++)g.fillRect(14+k,10-k,1,5);
g.clearRect(1,10,14,1);
g.clearRect(8,8,2,1);
g.clearRect(3,12,4,2);
g.clearRect(9,12,3,3);
g.fillRect(2,15,2,2);
});
const H_CHUNK=C17(g=>{
for(let r=0;r<4;r++)g.fillRect(1+r,8-r,12,1);
g.fillRect(2,9,10,6);
for(let k=0;k<4;k++)g.fillRect(12+k,9-k,1,6);
g.fillRect(10,3,2,2);
g.clearRect(2,9,10,1);
g.clearRect(4,11,2,4);
g.clearRect(8,11,3,2);
g.fillRect(4,15,3,1);
});

function ground(){
pq(TX,TY,204,102,LOTG);
pq(TX+101,TY,2,102,SEAM);
pq(12,128,236,1,SWE);
pq(12,129,236,6,SW);
pq(12,135,236,16,ROADC);
for(let x=16;x<244;x+=24)pq(x,142,10,2,DASHC);
}
function shadow(x,y,w,mode){
if(mode==="none")return;
if(mode==="solid"){pq(x,y,w,6,BG);return;}
for(let yy=y;yy<y+6;yy+=2)for(let xx=x;xx<x+w;xx+=2)if((xx+yy)%4===0)pq(xx,yy,2,2,BG);
}
function scatter(rects){
for(let yy=0;yy<PH;yy+=2)for(let xx=0;xx<PW;xx+=2){
let d=1e9;
for(const r of rects){
const dx=Math.max(r.x-xx,xx-(r.x+r.w),0),dy=Math.max(r.y-yy,yy-(r.y+r.h),0);
const dd=Math.max(dx,dy);
if(dd<d)d=dd;
if(d===0)break;
}
if(d>0&&d<23&&hash2(xx,yy)<0.45-d*0.02)pq(xx,yy,2,2,"#1e1e1e");
}}

const PANELS=[
{g:G_CHUNK,h:H_CHUNK,n:6,sh:"solid"},
{g:G_DITH,h:H_DITH,n:3,sh:"dither"},
{g:G_SOLID,h:H_SOLID,n:3,sh:"solid"},
{g:G_OUT,h:H_OUT,n:3,sh:"none"}
];
const cvs=[0,1,2,3].map(i=>document.getElementById("c"+i));
function render(){
SS=2*(window.devicePixelRatio||1);
for(let i=0;i<4;i++){
const c=cvs[i];
c.width=Math.round(PW*SS);c.height=Math.round(PH*SS);
q=c.getContext("2d");q.imageSmoothingEnabled=false;
pq(0,0,PW,PH,BG);
ground();
const p=PANELS[i];
shadow(TX+15,TY+88,88,p.sh);
shadow(TX+102+15,TY+88,76,p.sh);
bl(p.g,TX,TY,p.n);
bl(p.h,TX+102,TY,p.n);
scatter([{x:TX,y:TY,w:204,h:102},{x:12,y:128,w:236,h:23}]);
}
}
addEventListener("resize",render);
render();
</script>
</body>
</html>
