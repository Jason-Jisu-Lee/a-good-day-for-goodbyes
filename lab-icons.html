function sheet(rows){const c=document.createElement("canvas");c.width=12;c.height=12;const g=c.getContext("2d");g.fillStyle=FG;for(let y=0;y<rows.length;y++){const r=rows[y];for(let x=0;x<r.length;x++)if(r[x]==="X")g.fillRect(x,y,1,1);}return c;}
const ART={};for(const n in SPRITES)ART[n]=SPRITES[n].map(sheet);

function fit(){dpr=window.devicePixelRatio||1;k=Math.min(innerWidth/W,innerHeight/H);if(k>=1)k=Math.floor(k);S=k*dpr;cv.style.width=W*k+"px";cv.style.height=H*k+"px";cv.width=Math.max(1,Math.round(W*S));cv.height=Math.max(1,Math.round(H*S));cx.imageSmoothingEnabled=false;}
function rr(v){return Math.round(v*S);}
function box(x,y,w,h,col){cx.fillStyle=col||FG;const a=rr(x),b=rr(y);cx.fillRect(a,b,rr(x+w)-a,rr(y+h)-b);}
function edge(x,y,w,h){box(x,y,w,1,LINE);box(x,y+h-1,w,1,LINE);box(x,y,1,h,LINE);box(x+w-1,y,1,h,LINE);}
function blit(c,x,y,n){const a=rr(x),b=rr(y);cx.drawImage(c,a,b,rr(x+c.width*n)-a,rr(y+c.height*n)-b);}
function tw(s,n){return (s.length*4-1)*n;}
function text(s,x,y,n,al){if(al==="c")x=Math.round(x-tw(s,n)/2);if(al==="r")x=Math.round(x-tw(s,n));for(const ch of s){const g=FONT[ch];if(g)for(let r=0;r<5;r++)for(let q=0;q<3;q++)if(g[r][q]==="X")box(x+q*n,y+r*n,n,n,FG);x+=4*n;}}

let fireF=0,fireT=0,pose=0,poseT=0,shX=0,shY=0,shT=0,glT=0;
const ri=n=>Math.floor(Math.random()*n);
function update(dt){
fireT+=dt;if(fireT>=95){fireT=0;let f;do{f=ri(4)}while(f===fireF);fireF=f;}
poseT+=dt;if(poseT>=420){poseT=0;pose=1-pose;}
shT+=dt;if(shT>=40){shT=0;shX=ri(3)-1;shY=ri(3)-1;}
glT=(glT+dt)%2800;
}

const CARDS=[["FIRE","fire"],["ZOMBIE","zombie"],["GRAVE","grave"],["WOOD","wood"],["STONE","stone"],["WATER","water"],["CRYSTAL","crystal"],["COIN","coin"]];
function draw(){
box(0,0,W,H,BG);
text("ICON LAB",24,20,3);
text("1-BIT 12X12",936,25,2,"r");
const u=1/Math.max(1,k);
for(let i=0;i<8;i++){
const col=i%4,row=(i/4)|0,x=24+col*231,y=70+row*144;
edge(x,y,219,132);
const nm=CARDS[i][0],key=CARDS[i][1];
let fr=0;
if(key==="fire")fr=fireF;
if(key==="zombie")fr=pose;
let ix=x+73,iy=y+16;
if(key==="zombie"){ix+=shX*u;iy+=shY*u;}
blit(ART[key][fr],ix,iy,6);
if(key==="crystal"&&glT<300){
const gx=x+73+54,gy=y+16+12;
box(gx,gy,6,6);
if(glT>=90&&glT<210){box(gx,gy-6,6,6);box(gx,gy+6,6,6);box(gx-6,gy,6,6);box(gx+6,gy,6,6);}
}
text(nm,x+109,y+102,2,"c");
}
text("SCALE",24,368,2);
let xc=24;
for(const n of [1,2,3,4,6,8]){
blit(ART.fire[fireF],xc,470-12*n,n);
text("X"+n,Math.round(xc+6*n),478,2,"c");
xc+=12*n+26;
}
blit(ART.fire[fireF],770,350,12);
text("X12",842,502,2,"c");
text("V"+innerWidth+"X"+innerHeight+" K"+(k>=1?k:k.toFixed(2))+" DPR"+(Math.round(dpr*100)/100),24,44,1);
}

let last=performance.now();
function step(t){const dt=Math.min(100,t-last);last=t;update(dt);draw();requestAnimationFrame(step);}
addEventListener("resize",()=>{fit();draw();});
fit();draw();requestAnimationFrame(step);
