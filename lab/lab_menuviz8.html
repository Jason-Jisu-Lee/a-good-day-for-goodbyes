<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>menu viz 8 lab</title>
<style>
body{margin:0;background:#0a0a0a;color:#888;font:13px "Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px}
canvas{outline:1px solid #222}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
button{background:#111;border:1px solid #444;color:#ccc;font:13px "Segoe UI",sans-serif;padding:7px 14px;cursor:pointer}
button.on{border-color:#e3c15c;color:#e3c15c}
.note{max-width:960px;color:#666;text-align:center}
#warn{color:#c8493f;display:none}
</style>
</head>
<body>
<div>8 menu visualizers. Real menu layout, real track. PLAY first, switch anytime. <span id="warn">file:// = no analysis, open via http://localhost:8123</span></div>
<canvas id="cv" width="960" height="540"></canvas>
<div class="row"><button id="play">PLAY</button><span id="lvl">AUDIO 0%</span></div>
<div class="row" id="btns"></div>
<div class="note" id="desc"></div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const W=960,H=540,FG="#f2f2f0",FONT='"Segoe UI",system-ui,sans-serif';
if(location.protocol==="file:")document.getElementById("warn").style.display="inline";
const A=new Audio("../asset/soundtrack/main_screen.mp3?v=1");A.loop=true;
let ac=null,an=null,freq=null,wave=null,playing=false;
const NB=64;
const bands=new Array(NB).fill(0),bandE=new Array(NB).fill(0.05),bandBeat=new Array(NB).fill(0);
let bass=0,treb=0,lvl=0,ema=0.05,beatP=0,lastBeat=0,synthT=0,waveAmp=0;
document.getElementById("play").onclick=()=>{
if(!ac){
ac=new (window.AudioContext||window.webkitAudioContext)();
const s=ac.createMediaElementSource(A);
an=ac.createAnalyser();an.fftSize=1024;an.smoothingTimeConstant=0.75;
s.connect(an);an.connect(ac.destination);
freq=new Uint8Array(an.frequencyBinCount);
wave=new Uint8Array(an.fftSize);
}
ac.resume();
if(playing){A.pause();playing=false;document.getElementById("play").textContent="PLAY";}
else{A.play();playing=true;document.getElementById("play").textContent="PAUSE";}
};
function analyse(t,dt){
synthT+=dt;
let live=false;
if(an&&playing){
an.getByteFrequencyData(freq);
an.getByteTimeDomainData(wave);
let b=0;for(let i=2;i<12;i++)b+=freq[i];bass=b/10/255;
let tr=0;for(let i=180;i<360;i++)tr+=freq[i];treb=tr/180/255;
let s=0;for(let i=0;i<300;i++)s+=freq[i];lvl=s/300/255;
let wa=0;for(let i=0;i<wave.length;i+=8)wa+=Math.abs(wave[i]-128);
waveAmp=wa/(wave.length/8)/128;
if(lvl>0.01)live=true;
for(let i=0;i<NB;i++){
const bin=Math.floor(Math.pow(i/NB,1.6)*330)+2;
const v=freq[bin]/255;
bands[i]=Math.max(v,bands[i]*0.88);
bandBeat[i]=Math.max(0,bandBeat[i]-dt*4);
if(v>bandE[i]*1.5+0.06)bandBeat[i]=1;
bandE[i]=bandE[i]*0.92+v*0.08;
}
if(bass>ema*1.32+0.02&&t-lastBeat>150){lastBeat=t;beatP=1;}
ema=ema*0.95+bass*0.05;
}
if(!live){
bass=0.14+0.1*Math.sin(synthT*0.8);treb=0.12+0.06*Math.sin(synthT*1.7);lvl=0.14+0.05*Math.sin(synthT*0.6);
waveAmp=0.1+0.05*Math.sin(synthT*1.1);
for(let i=0;i<NB;i++){
bands[i]=0.14+0.1*Math.sin(synthT*0.7+i*0.4);
bandBeat[i]=Math.max(0,bandBeat[i]-dt*4);
}
if(synthT-lastBeat/1000>1.15){lastBeat=synthT*1000;beatP=1;const k=Math.floor(Math.random()*NB);bandBeat[k]=1;}
}
beatP=Math.max(0,beatP-dt*3.2);
document.getElementById("lvl").textContent="AUDIO "+Math.round(lvl*100)+"%";
}
function menuMock(skipTitle){
cx.globalAlpha=1;
if(!skipTitle){
cx.font="700 30px "+FONT;
cx.textAlign="center";
cx.fillStyle=FG;
cx.fillText("A GOOD DAY FOR GOODBYES",W/2,160);
}
cx.font="600 21px "+FONT;
cx.textAlign="center";
cx.fillStyle=FG;
cx.fillText("NEW GAME",W/2,288);
cx.fillText("SETTINGS",W/2,340);
cx.fillText("QUIT GAME",W/2,392);
cx.textAlign="left";
}
function dith(x,y,w,h,a,step){
cx.globalAlpha=a;
for(let yy=0;yy<h;yy+=step)cx.fillRect(x,y+yy,w,1);
}
const M=[];
M.push({n:"SKYLINE",d:"the shipped baseline plus a living horizon: bars breathe along the bottom, the reflection dissolves into the void, and the horizon line itself swells and burns with the bass.",f(){
const hz=H-30,bw=W/NB;
cx.fillStyle=FG;
for(let i=0;i<NB;i++){
const h=Math.max(1,bands[i]*46);
cx.globalAlpha=0.22;
cx.fillRect(i*bw+1,hz-h,bw-2,h);
dith(i*bw+1,hz+3,bw-2,h*0.4,0.09,2);
}
const gl=1+Math.round(bass*3);
cx.globalAlpha=0.15+bass*0.5;
cx.fillRect(0,hz-Math.floor(gl/2),W,gl);
}});
const TL=[];
(function(){
let x=6,i=0;
while(x<W-30){
const w=26+((i*47)%34),h=30+((i*31)%60);
TL.push({x,w,h,seed:i*13,wl:[]});
x+=w+6;i++;
}
})();
M.push({n:"TOWN LIGHTS",d:"no bars at all: a dark town where individual WINDOWS light with each note and fade after. Quiet passages let the town go black. The music is the people still awake.",f(){
const hz=H-26;
cx.fillStyle=FG;
for(const b of TL){
cx.globalAlpha=0.1;
cx.fillRect(b.x,hz-b.h,b.w,1);
cx.fillRect(b.x,hz-b.h,1,b.h);
cx.fillRect(b.x+b.w,hz-b.h,1,b.h);
let wi=0;
for(let wy=hz-b.h+6;wy<hz-6;wy+=10)
for(let wx=b.x+5;wx<b.x+b.w-5;wx+=8){
const k=(b.seed+wi*7)%NB;
if(!b.wl[wi])b.wl[wi]=0;
b.wl[wi]=Math.max(bandBeat[k]*0.9,b.wl[wi]*0.94);
if(b.wl[wi]>0.04){
cx.globalAlpha=b.wl[wi]*0.55;
cx.fillRect(wx,wy,3,5);
}
wi++;
}
}
cx.globalAlpha=0.08+bass*0.25;
cx.fillRect(0,hz,W,1);
}});
M.push({n:"EYE OF THE VOID",d:"the void itself hangs behind the title as a black disc you only see by its corona. Every band is a ray of light escaping; drums flare the whole rim. Silence lets the eye close.",f(){
const cxx=W/2,cy=150,R=108;
cx.fillStyle="#000";
cx.beginPath();cx.arc(cxx,cy,R,0,Math.PI*2);cx.fill();
cx.strokeStyle=FG;
cx.globalAlpha=0.18+bass*0.4;
cx.lineWidth=1.5;
cx.beginPath();cx.arc(cxx,cy,R,0,Math.PI*2);cx.stroke();
cx.lineWidth=1;
for(let i=0;i<72;i++){
const a=i/72*Math.PI*2;
const ln=3+bands[i%NB]*34+beatP*12;
cx.globalAlpha=0.22+lvl*0.35;
cx.beginPath();
cx.moveTo(cxx+Math.cos(a)*(R+2),cy+Math.sin(a)*(R+2));
cx.lineTo(cxx+Math.cos(a)*(R+2+ln),cy+Math.sin(a)*(R+2+ln));
cx.stroke();
}
}});
const EKG={h:new Array(480).fill(0),i:0};
M.push({n:"PULSE",d:"a hospital monitor line under the title: the town's actual heartbeat. It carries the live waveform, spikes hard on every drum, and flatlines in silence. The run is alive while the line moves.",f(){
const y0=214;
let inj=0;
if(beatP>0.85)inj=1;
EKG.h[EKG.i]=waveAmp*46*(0.4+lvl*2)*(Math.random()>0.5?1:-1)+(inj?-34:0);
if(inj){EKG.h[(EKG.i+1)%480]=22;EKG.h[(EKG.i+2)%480]=-8;}
EKG.i=(EKG.i+1)%480;
cx.strokeStyle=FG;
cx.beginPath();
for(let k=0;k<480;k++){
const idx=(EKG.i+k)%480;
const x=k*2;
const y=y0+EKG.h[idx];
k===0?cx.moveTo(x,y):cx.lineTo(x,y);
}
cx.globalAlpha=0.5;
cx.lineWidth=1.2;
cx.stroke();
cx.globalAlpha=0.1;
cx.fillStyle=FG;
cx.fillRect(0,y0,W,1);
}});
const RAIN={d:[],r:[]};
for(let i=0;i<140;i++)RAIN.d.push({x:Math.random()*W,y:Math.random()*H,sp:220+Math.random()*220,ln:8+Math.random()*9});
M.push({n:"RAIN",d:"thin rain falls through the whole menu, heavier when the music swells. Every drum hit lands a drop hard enough to ripple the ground. Melancholy weather you can hear.",f(dt){
const gy=H-42;
const active=25+Math.floor(lvl*115);
cx.fillStyle=FG;
for(let i=0;i<active;i++){
const d=RAIN.d[i];
d.y+=d.sp*dt*(0.5+lvl*1.4);
if(d.y>gy){d.y=-d.ln;d.x=Math.random()*W;}
cx.globalAlpha=0.1+((i*29)%10)/10*0.14;
cx.fillRect(d.x,d.y,1,d.ln);
}
if(beatP>0.85)RAIN.r.push({x:60+Math.random()*(W-120),k:0});
cx.strokeStyle=FG;
for(let i=RAIN.r.length-1;i>=0;i--){
const r=RAIN.r[i];
r.k+=dt*1.8;
if(r.k>=1){RAIN.r.splice(i,1);continue;}
cx.globalAlpha=0.3*(1-r.k);
cx.lineWidth=1;
cx.beginPath();
cx.ellipse(r.x,gy,r.k*60,r.k*18,0,0,Math.PI*2);
cx.stroke();
}
cx.globalAlpha=0.07;
cx.fillRect(0,gy,W,1);
}});
const STAR={s:[],c:[]};
M.push({n:"DYING STARS",d:"an empty sky where every note is born as a star and slowly dies. Strong beats briefly draw constellations between the young ones. Silence empties the sky completely.",f(dt){
for(let i=0;i<NB;i++){
if(bandBeat[i]>0.95&&STAR.s.length<90)
STAR.s.push({x:i/NB*W+(Math.random()*40-20),y:36+((i*53+STAR.s.length*29)%190),a:0.75,tw:Math.random()*6});
}
if(beatP>0.9&&STAR.s.length>4){
const young=STAR.s.filter(s=>s.a>0.4);
if(young.length>=3){
const p=[];
for(let k=0;k<3;k++)p.push(young[Math.floor(Math.random()*young.length)]);
STAR.c.push({p,k:0});
}
}
cx.fillStyle=FG;
for(let i=STAR.s.length-1;i>=0;i--){
const s=STAR.s[i];
s.a-=dt*0.09;s.tw+=dt*7;
if(s.a<=0){STAR.s.splice(i,1);continue;}
cx.globalAlpha=s.a*(0.7+0.3*Math.sin(s.tw));
cx.fillRect(s.x,s.y,s.a>0.5?2:1,s.a>0.5?2:1);
}
cx.strokeStyle=FG;
for(let i=STAR.c.length-1;i>=0;i--){
const c=STAR.c[i];
c.k+=dt*2;
if(c.k>=1){STAR.c.splice(i,1);continue;}
cx.globalAlpha=0.13*(1-c.k);
cx.beginPath();
cx.moveTo(c.p[0].x,c.p[0].y);
cx.lineTo(c.p[1].x,c.p[1].y);
cx.lineTo(c.p[2].x,c.p[2].y);
cx.stroke();
}
}});
const ROT=document.createElement("canvas");ROT.width=W;ROT.height=300;
const rcx=ROT.getContext("2d");
M.push({n:"RECORD ROT",d:"the story device on the menu: the music writes itself into the record as rising dithered static, and the rot eats the oldest of it as it climbs. The whole background is the song decaying in real time.",f(){
rcx.drawImage(ROT,0,-1);
rcx.clearRect(0,299,W,1);
rcx.fillStyle="#fff";
for(let c=0;c<96;c++){
const e=bands[Math.floor(c/96*NB)];
if(e>0.16&&Math.random()<e){
rcx.globalAlpha=Math.min(0.9,e);
rcx.fillRect(c*10+Math.floor(Math.random()*8),299,2,1);
}
}
for(let i=0;i<24;i++)rcx.clearRect(Math.random()*W,Math.random()*260,3,2);
cx.globalAlpha=0.2;
cx.drawImage(ROT,0,H-320);
}});
const TROT={r:0.5};
M.push({n:"LIVING TITLE",d:"the title itself is the record: silence makes the letters rot away into dithered holes, sound heals them, every drum hit slams them back solid. The name of the game is kept alive by the song.",f(dt){
const target=1-Math.min(1,lvl*3.5+beatP*0.8);
TROT.r+=(target-TROT.r)*(target<TROT.r?0.12:0.014);
cx.font="700 30px "+FONT;
cx.textAlign="center";
cx.fillStyle=FG;
cx.fillText("A GOOD DAY FOR GOODBYES",W/2,160);
cx.textAlign="left";
cx.fillStyle="#000";
const n=Math.floor(TROT.r*380);
for(let i=0;i<n;i++){
cx.globalAlpha=0.75;
cx.fillRect(W/2-255+Math.random()*510,132+Math.random()*36,1+Math.random()*3,2);
}
},skipTitle:true});
let mi=0;
const q=new URLSearchParams(location.search).get("m");
if(q!==null)mi=Math.max(0,Math.min(M.length-1,+q));
const brow=document.getElementById("btns"),desc=document.getElementById("desc");
M.forEach((m,i)=>{
const b=document.createElement("button");
b.textContent=m.n;b.className=i===mi?"on":"";
b.onclick=()=>{mi=i;[...brow.children].forEach(c=>c.classList.remove("on"));b.classList.add("on");desc.textContent=m.d;};
brow.appendChild(b);
});
desc.textContent=M[mi].d;
let last=performance.now();
function draw(t){
const dt=Math.min(0.05,(t-last)/1000);last=t;
analyse(t,dt);
cx.globalAlpha=1;
cx.fillStyle="#000";
cx.fillRect(0,0,W,H);
M[mi].f(dt);
menuMock(M[mi].skipTitle);
requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
