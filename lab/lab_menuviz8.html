<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>menu viz lab v3</title>
<style>
body{margin:0;background:#0a0a0a;color:#888;font:13px "Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px}
canvas{outline:1px solid #222}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
button{background:#111;border:1px solid #444;color:#ccc;font:13px "Segoe UI",sans-serif;padding:7px 14px;cursor:pointer}
button.on{border-color:#e3c15c;color:#e3c15c}
.note{max-width:960px;color:#666;text-align:center}
#warn{color:#c8493f;display:none}
</style>
</head>
<body>
<div>Menu viz v3: event engine. Visuals fire on note strikes and drum hits, rest between them, and go dark in silence. PLAY first. <span id="warn">file:// = no analysis, open via http://localhost:8123</span></div>
<canvas id="cv" width="960" height="540"></canvas>
<div class="row"><button id="play">PLAY</button><span id="lvl">AUDIO 0%</span></div>
<div class="row" id="btns"></div>
<div class="note" id="desc"></div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const W=960,H=540,FG="#f2f2f0",FONT='"Segoe UI",system-ui,sans-serif';
if(location.protocol==="file:")document.getElementById("warn").style.display="inline";
const A=new Audio("../asset/soundtrack/main_screen.mp3?v=1");A.loop=true;
let ac=null,an=null,freq=null,playing=false;
const NB=48;
const bandV=new Float32Array(NB),bandPrev=new Float32Array(NB),bandFlux=new Float32Array(NB),bandThr=new Float32Array(NB).fill(0.03),bandOn=new Float32Array(NB);
let gm=0.2,lvl=0,phrase=0,fluxLow=0,fluxHigh=0,beatP=0,lastBeat=0,quietT=0,quietK=1,synthT=0,sBeatT=0;
const fluxHist=new Float32Array(50);let fhI=0;
document.getElementById("play").onclick=()=>{
if(!ac){
ac=new (window.AudioContext||window.webkitAudioContext)();
const s=ac.createMediaElementSource(A);
an=ac.createAnalyser();an.fftSize=1024;an.smoothingTimeConstant=0.35;
s.connect(an);an.connect(ac.destination);
freq=new Uint8Array(an.frequencyBinCount);
}
ac.resume();
if(playing){A.pause();playing=false;document.getElementById("play").textContent="PLAY";}
else{A.play();playing=true;document.getElementById("play").textContent="PAUSE";}
};
function analyse(t,dt){
synthT+=dt;
let live=false;
for(let i=0;i<NB;i++)bandOn[i]=Math.max(0,bandOn[i]-dt*5);
if(an&&playing){
an.getByteFrequencyData(freq);
let s=0;for(let i=0;i<300;i++)s+=freq[i];const rawLvl=s/300/255;
if(rawLvl>0.008)live=true;
gm=Math.max(gm*0.996,rawLvl);
const ag=0.9/Math.max(0.12,gm);
lvl=Math.min(1,rawLvl*ag);
let fl=0,fh=0;
for(let i=0;i<NB;i++){
const bin=Math.floor(Math.pow(i/NB,1.6)*330)+2;
const v=Math.min(1,Math.max(0,(freq[bin]/255-0.04)*1.1)*ag);
const f=Math.max(0,v-bandPrev[i]);
bandPrev[i]=v;
bandV[i]=v;
bandFlux[i]=f;
if(i<10)fl+=f;else if(i>26)fh+=f;
if(f>bandThr[i]*2.1+0.025)bandOn[i]=1;
bandThr[i]=bandThr[i]*0.95+f*0.05;
}
fluxLow=fl/10;fluxHigh=fh/(NB-27);
fluxHist[fhI]=fluxLow;fhI=(fhI+1)%50;
let m=0;for(let i=0;i<50;i++)m+=fluxHist[i];m/=50;
let sd=0;for(let i=0;i<50;i++)sd+=(fluxHist[i]-m)*(fluxHist[i]-m);
sd=Math.sqrt(sd/50);
if(fluxLow>m+sd*1.6+0.012&&t-lastBeat>160){lastBeat=t;beatP=1;}
}
if(!live){
const bar=synthT%2.28;
const q=(synthT%16)>13;
lvl=q?0.02:0.3+0.18*Math.sin(synthT*0.7);
if(!q){
sBeatT+=dt;
if(bar<0.03||Math.abs(bar-1.14)<0.03){if(synthT*1000-lastBeat>300){lastBeat=synthT*1000;beatP=1;fluxLow=0.3;}}
if(Math.random()<dt*4){const k=6+Math.floor(Math.random()*(NB-6));bandOn[k]=1;bandV[k]=0.5+Math.random()*0.4;}
for(let i=0;i<NB;i++)bandV[i]=Math.max(0.04,bandV[i]*0.9);
fluxHigh=Math.random()<dt*6?0.2:0;
}else{for(let i=0;i<NB;i++)bandV[i]*=0.9;fluxLow=0;fluxHigh=0;}
}
phrase=Math.max(lvl,phrase*Math.exp(-dt/0.9));
if(lvl<0.05)quietT+=dt;else quietT=0;
quietK+=((quietT>0.25?0:1)-quietK)*Math.min(1,dt*3);
beatP=Math.max(0,beatP-dt*4.2);
document.getElementById("lvl").textContent="AUDIO "+Math.round(lvl*100)+"%";
}
function menuMock(skipTitle){
cx.globalAlpha=1;
if(!skipTitle){
cx.font="700 30px "+FONT;
cx.textAlign="center";
cx.fillStyle=FG;
cx.fillText("A GOOD DAY FOR GOODBYES",W/2,160);
}
cx.font="600 21px "+FONT;
cx.textAlign="center";
cx.fillStyle=FG;
cx.fillText("NEW GAME",W/2,288);
cx.fillText("SETTINGS",W/2,340);
cx.fillText("QUIT GAME",W/2,392);
cx.textAlign="left";
}
function dith(x,y,w,h,a,step){
cx.globalAlpha=a;
for(let yy=0;yy<h;yy+=step)cx.fillRect(x,y+yy,w,1);
}
const M=[];
const SKY={v:new Float32Array(NB)};
M.push({n:"SKYLINE",d:"a dancing equalizer, finally: each bar JUMPS when its band actually strikes and falls under gravity between notes. Drums kick the whole skyline and flare the horizon. Silence kills it flat.",f(dt){
const hz=H-30,bw=W/NB;
cx.fillStyle=FG;
for(let i=0;i<NB;i++){
if(bandOn[i]>0.9)SKY.v[i]=Math.min(1,bandV[i]*1.25+0.15);
SKY.v[i]=Math.max(SKY.v[i]-dt*2.4,bandV[i]*0.18)*quietK;
const h=Math.max(1,SKY.v[i]*(58+beatP*16));
cx.globalAlpha=0.13+SKY.v[i]*0.38;
cx.fillRect(i*bw+1,hz-h,bw-2,h);
dith(i*bw+1,hz+3,bw-2,h*0.4,0.04+SKY.v[i]*0.08,2);
}
cx.globalAlpha=(0.1+beatP*0.55)*quietK;
cx.fillRect(0,hz-Math.floor(beatP*2),W,1+Math.round(beatP*3));
}});
const TL=[];
(function(){
let x=4,i=0;
while(x<W-40){
const tall=i%5===2;
const w=24+((i*47)%30);
const h=tall?70+((i*31)%50):28+((i*31)%42);
TL.push({x,w,h,seed:i*13,ant:tall&&i%2?4+i%6:0,wl:[],wake:0});
x+=w+5;i++;
}
})();
M.push({n:"TOWN LIGHTS",d:"lights only when notes strike: each note lights its exact windows for a moment, each drum wakes one whole building, and between phrases the town visibly goes back to sleep. Silence = total dark.",f(dt){
const hz=H-26;
if(beatP>0.92){
const b=TL[Math.floor(Math.random()*TL.length)];
b.wake=1;
}
cx.fillStyle=FG;
for(const b of TL){
b.wake=Math.max(0,b.wake-dt*1.6);
cx.globalAlpha=0.1*quietK;
cx.fillRect(b.x,hz-b.h,b.w,1);
cx.fillRect(b.x,hz-b.h,1,b.h);
cx.fillRect(b.x+b.w-1,hz-b.h,1,b.h);
if(b.ant){cx.globalAlpha=0.16*quietK;cx.fillRect(b.x+b.w/2,hz-b.h-b.ant,1,b.ant);}
let wi=0;
for(let wy=hz-b.h+5;wy<hz-5;wy+=8)
for(let wx=b.x+4;wx<b.x+b.w-4;wx+=7){
const k=(b.seed+wi*7)%NB;
if(b.wl[wi]===undefined)b.wl[wi]=0;
if(bandOn[k]>0.9)b.wl[wi]=1;
b.wl[wi]*=Math.exp(-dt/1.1);
const glow=Math.min(1,Math.max(b.wl[wi],b.wake))*quietK;
if(glow>0.05){
cx.globalAlpha=glow*0.85;
cx.fillRect(wx,wy,3,4);
}
wi++;
}
}
cx.globalAlpha=(0.06+beatP*0.35)*quietK;
cx.fillRect(0,hz,W,1);
}});
const RAIN={d:[],r:[],sp:[],mist:[],w:0,wT:0,flash:0,flashCd:0,n:10};
for(let i=0;i<220;i++)RAIN.d.push({x:Math.random()*W,y:Math.random()*H,v:0.8+Math.random()*0.6,b:0});
M.push({n:"RAIN",d:"the rain IS the song now: near-drizzle in the quiet, and every single drum hit slams a volley of hard bright drops into the ground with splashes and ripples. Swells sheet it, silence stops it.",f(dt){
const gy=H-42;
RAIN.wT+=dt;
RAIN.w+=(Math.sin(RAIN.wT*0.4)*0.3-RAIN.w)*0.02;
const target=(6+Math.pow(phrase,1.7)*130)*quietK;
RAIN.n+=(target-RAIN.n)*Math.min(1,dt*2);
if(beatP>0.9){
for(let k=0;k<14;k++){
const d=RAIN.d[Math.floor(Math.random()*RAIN.d.length)];
d.y=Math.random()*H*0.4;d.x=Math.random()*W;d.v=1.5+Math.random()*0.5;d.b=1;
}
RAIN.r.push({x:100+Math.random()*(W-200),k:0});
RAIN.r.push({x:100+Math.random()*(W-200),k:0});
}
if(fluxHigh>0.12)for(let k=0;k<3;k++)RAIN.mist.push({x:Math.random()*W,y:60+Math.random()*300,a:0.25});
const spd=380+phrase*520;
cx.fillStyle=FG;
cx.strokeStyle=FG;
cx.lineWidth=1;
const n=Math.min(RAIN.d.length,Math.floor(RAIN.n));
for(let i=0;i<n;i++){
const d=RAIN.d[i];
d.y+=spd*d.v*dt;
d.x+=RAIN.w*spd*0.3*d.v*dt;
if(d.y>gy){
if(RAIN.sp.length<70)RAIN.sp.push({x:d.x,k:0,b:d.b});
d.y=-16;d.x=Math.random()*W;d.b=0;d.v=0.8+Math.random()*0.6;
}
if(d.x>W)d.x-=W;if(d.x<0)d.x+=W;
const ln=(8+phrase*12)*d.v*(d.b?1.5:1);
cx.globalAlpha=(0.08+d.v*0.1+d.b*0.3)*quietK;
cx.beginPath();
cx.moveTo(d.x,d.y);
cx.lineTo(d.x-RAIN.w*ln*0.3,d.y-ln);
cx.stroke();
}
for(let i=RAIN.sp.length-1;i>=0;i--){
const s=RAIN.sp[i];
s.k+=dt*5;
if(s.k>=1){RAIN.sp.splice(i,1);continue;}
cx.globalAlpha=(0.2+s.b*0.2)*(1-s.k)*quietK;
cx.fillRect(s.x-2-s.k*4,gy-1,2,1);
cx.fillRect(s.x+1+s.k*4,gy-1,2,1);
}
for(let i=RAIN.mist.length-1;i>=0;i--){
const m2=RAIN.mist[i];
m2.a-=dt*1.2;
if(m2.a<=0){RAIN.mist.splice(i,1);continue;}
cx.globalAlpha=m2.a*quietK;
cx.fillRect(m2.x,m2.y,1,1);
}
for(let i=RAIN.r.length-1;i>=0;i--){
const r=RAIN.r[i];
r.k+=dt*1.9;
if(r.k>=1){RAIN.r.splice(i,1);continue;}
cx.globalAlpha=0.4*(1-r.k)*quietK;
cx.beginPath();
cx.ellipse(r.x,gy,r.k*75,r.k*22,0,0,Math.PI*2);
cx.stroke();
cx.globalAlpha=0.2*(1-r.k)*quietK;
cx.beginPath();
cx.ellipse(r.x,gy,r.k*42,r.k*12,0,0,Math.PI*2);
cx.stroke();
}
RAIN.flashCd-=dt;
if(beatP>0.95&&fluxLow>0.2&&RAIN.flashCd<=0){RAIN.flash=1;RAIN.flashCd=3;}
if(RAIN.flash>0){
cx.globalAlpha=RAIN.flash*0.08;
cx.fillRect(0,0,W,H);
RAIN.flash-=dt*7;
}
cx.globalAlpha=(0.05+beatP*0.3)*quietK;
cx.fillRect(0,gy,W,1);
dith(0,gy+3,W,26,0.03*quietK,3);
}});
const TROT={r:0.4,sp:[]};
M.push({n:"LIVING TITLE",d:"the title fights the rot: holes eat in the moment a phrase quiets, heal the moment it swells, and every drum knocks bright sparks off the letters and snaps them solid. In silence the name almost dies.",f(dt){
const target=Math.min(0.95,Math.max(0.04,0.85-phrase*1.05-beatP*0.5)+(1-quietK)*0.08);
TROT.r+=(target-TROT.r)*(target<TROT.r?0.3:0.1);
if(beatP>0.9)for(let k=0;k<10;k++)TROT.sp.push({x:W/2-250+Math.random()*500,y:138+Math.random()*26,vy:-16-Math.random()*26,a:0.85});
cx.font="700 30px "+FONT;
cx.textAlign="center";
cx.fillStyle=FG;
cx.globalAlpha=0.8+beatP*0.2;
cx.fillText("A GOOD DAY FOR GOODBYES",W/2,160);
cx.textAlign="left";
cx.globalAlpha=1;
cx.fillStyle="#000";
const n=Math.floor(TROT.r*470);
for(let i=0;i<n;i++){
cx.globalAlpha=0.85;
cx.fillRect(W/2-255+Math.random()*510,133+Math.random()*35,1+Math.random()*3,2);
}
cx.fillStyle=FG;
for(let i=TROT.sp.length-1;i>=0;i--){
const s=TROT.sp[i];
s.y+=s.vy*dt;s.a-=dt*1.7;
if(s.a<=0){TROT.sp.splice(i,1);continue;}
cx.globalAlpha=s.a;
cx.fillRect(s.x,s.y,2,2);
}
},skipTitle:true});
let mi=0;
const q=new URLSearchParams(location.search).get("m");
if(q!==null)mi=Math.max(0,Math.min(M.length-1,+q));
const brow=document.getElementById("btns"),desc=document.getElementById("desc");
M.forEach((m,i)=>{
const b=document.createElement("button");
b.textContent=m.n;b.className=i===mi?"on":"";
b.onclick=()=>{mi=i;[...brow.children].forEach(c=>c.classList.remove("on"));b.classList.add("on");desc.textContent=m.d;};
brow.appendChild(b);
});
desc.textContent=M[mi].d;
let last=performance.now();
function draw(t){
const dt=Math.min(0.05,(t-last)/1000);last=t;
analyse(t,dt);
cx.globalAlpha=1;
cx.fillStyle="#000";
cx.fillRect(0,0,W,H);
M[mi].f(dt);
menuMock(M[mi].skipTitle);
requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
