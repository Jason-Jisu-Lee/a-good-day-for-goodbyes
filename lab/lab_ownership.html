<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>tile ownership lab</title>
<style>
body{margin:0;background:#0a0a0a;color:#888;font:13px "Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px}
canvas{outline:1px solid #222}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{background:#111;border:1px solid #444;color:#ccc;font:13px "Segoe UI",sans-serif;padding:7px 16px;cursor:pointer}
button.on{border-color:#e3c15c;color:#e3c15c}
.note{max-width:960px;color:#666;text-align:center}
</style>
</head>
<body>
<div>Owned vs unowned readability. Real smooth_tile asset, real sizes. Left block = OWNED town (houses, food, empty lots). Right + ring = UNOWNED dark.</div>
<canvas id="cv" width="960" height="540"></canvas>
<div class="row" id="btns"></div>
<div class="note" id="desc"></div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const W=960,H=540,FG="#f2f2f0",DIM="#333",MID="#777",FONT='"Segoe UI",system-ui,sans-serif';
const T_TILE=new Image();T_TILE.src="../asset/tiles/smooth_tile.png?v=2";
const T_HOUSE=new Image();T_HOUSE.src="../asset/tiles/smooth_house_only.png?v=1";
const DX=48,DY=24,HW=34.5,HH=17.25;
const OX=W/2,OY=110;
function tp(gx,gy){return {x:OX+(gx-gy)*DX,y:OY+(gx+gy)*DY};}
const MODES=[
{n:"CURRENT",d:"what ships now: same white diamond, unowned at 40% alpha, owned at 100%. The problem."},
{n:"FLOOR FILL",d:"owned tiles get a solid dark floor inside the diamond. Your town is solid ground; the dark is hollow wireframe."},
{n:"DITHER FLOOR",d:"owned tiles get a sparse 1-bit checker dither floor. Claimed land has texture; the void has none."},
{n:"DASHED DARK",d:"unowned tiles become broken dashed outlines; owned keep the solid tile. Ownership = solidity of the line itself."},
{n:"STRONGER FADE",d:"minimal change: unowned drops to 15% alpha instead of 40%. Same language, real contrast."}
];
let mi=0;
const brow=document.getElementById("btns"),desc=document.getElementById("desc");
MODES.forEach((m,i)=>{
const b=document.createElement("button");
b.textContent=m.n;b.className=i===mi?"on":"";
b.onclick=()=>{mi=i;[...brow.children].forEach(c=>c.classList.remove("on"));b.classList.add("on");desc.textContent=m.d;draw();};
brow.appendChild(b);
});
desc.textContent=MODES[mi].d;
// mock board: owned block gx 0-2 gy 0-2 (minus one), unowned ring + right area
const tiles=[];
for(let gx=-1;gx<4;gx++)for(let gy=-1;gy<4;gy++){
const inner=gx>=0&&gx<3&&gy>=0&&gy<3;
let kind="lot",owned=inner;
if(gx===0&&gy===0)kind="house";
if(gx===1&&gy===0)kind="grocery";
if(gx===0&&gy===1)kind="scrap";
if(gx===2&&gy===2)kind="house";
tiles.push({gx,gy,kind,owned});
}
tiles.sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
function diamond(x,y,inset){
cx.beginPath();
cx.moveTo(x,y-HH+inset*HH/HW);
cx.lineTo(x+HW-inset,y);
cx.lineTo(x,y+HH-inset*HH/HW);
cx.lineTo(x-HW+inset,y);
cx.closePath();
}
function dashDiamond(x,y,col){
cx.save();
cx.strokeStyle=col;
cx.lineWidth=1.5;
cx.setLineDash([5,6]);
diamond(x,y,2);
cx.stroke();
cx.restore();
}
function ditherFloor(x,y){
cx.save();
diamond(x,y,5);
cx.clip();
cx.fillStyle="#2b2b2b";
for(let yy=Math.round(y-HH);yy<y+HH;yy+=3)
for(let xx=Math.round(x-HW)+((yy%2)?0:2);xx<x+HW;xx+=4)
cx.fillRect(xx,yy,1,1);
cx.restore();
}
function floorFill(x,y){
cx.save();
diamond(x,y,3.5);
cx.fillStyle="#20201e";
cx.fill();
cx.restore();
}
function stampTile(x,y,alpha){
cx.save();
cx.globalAlpha=alpha;
cx.imageSmoothingEnabled=true;
cx.imageSmoothingQuality="high";
cx.drawImage(T_TILE,x-36.5,y-16.5,73,39);
cx.restore();
}
function stampHouse(x,y){
cx.imageSmoothingEnabled=true;
cx.imageSmoothingQuality="high";
cx.drawImage(T_HOUSE,x-27.35,y-29.3,55.2,46.4);
}
function label(s,x,y){
cx.font="600 10px "+FONT;
cx.textAlign="center";cx.textBaseline="top";
cx.fillStyle=FG;
cx.fillText(s,x,y-3);
cx.textAlign="left";
}
function draw(){
cx.fillStyle="#000";cx.fillRect(0,0,W,H);
const m=MODES[mi].n;
for(const t of tiles){
const p=tp(t.gx,t.gy);
if(!t.owned){
if(m==="DASHED DARK")dashDiamond(p.x,p.y,"#5a5a56");
else if(m==="STRONGER FADE")stampTile(p.x,p.y,0.15);
else stampTile(p.x,p.y,0.4);
continue;
}
if(m==="FLOOR FILL")floorFill(p.x,p.y);
if(m==="DITHER FLOOR")ditherFloor(p.x,p.y);
stampTile(p.x,p.y,1);
if(t.kind==="house")stampHouse(p.x,p.y);
if(t.kind==="grocery")label("FOOD",p.x,p.y);
if(t.kind==="scrap")label("MATERIAL",p.x,p.y);
}
cx.font="600 12px "+FONT;
cx.fillStyle="#555";
cx.fillText("OWNED TOWN (3x3, empty lots included)",40,470);
cx.fillText("UNOWNED DARK = the ring around it",40,490);
}
let loaded=0;
[T_TILE,T_HOUSE].forEach(img=>img.onload=()=>{loaded++;if(loaded===2)draw();});
setTimeout(draw,600);
</script>
</body>
</html>
