<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>marker lab 2</title>
<style>
html,body{margin:0;background:#000;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:auto;outline:1px solid #222}
</style>
</head>
<body>
<canvas id="cv" width="960" height="540"></canvas>
<script>
const cx=document.getElementById("cv").getContext("2d");
const FG="#f2f2f0",MID="#777777",DIM="#333333";
const RED="#e08b8b",BLUE="#8bb4e0";

const CREST=[
".WWWWW.",
"WCCCCCW",
"WCCCCCW",
"WCCCCCW",
".WCCCW.",
"..WCW..",
"...W...",
"..SSS.."
];
const BANNER=[
".WCCCCCC",
".WCCCC..",
".WCCCCCC",
".W......",
".W......",
".W......",
".W......",
".W......",
".W......",
"SSS....."
];
const FACET=[
"...WWW...",
".WWCCCCC.",
"CCCCCCCCM",
".CCCCCMM.",
"...CMM...",
".........",
"..SSSSS.."
];
const CAIRN=[
"...WW..",
"...WW..",
".CCCCC.",
".CCCCC.",
".CCCCC.",
"MMMMMMM",
"MMMMMMM",
"SSSSSSS"
];

function sprite(map,ax,ay,col,sc){
const rows=map.length,colsN=map[0].length;
const x0=Math.round(ax-colsN*sc/2),y0=Math.round(ay-rows*sc);
for(let y=0;y<rows;y++)for(let x=0;x<colsN;x++){
const ch=map[y][x];
if(ch===".")continue;
cx.fillStyle=ch==="W"?FG:ch==="C"?col:ch==="D"?"#3a3a3a":ch==="M"?MID:"#232323";
cx.fillRect(x0+x*sc,y0+y*sc,sc,sc);
}
}

const OPTS=[
{name:"CREST",map:CREST},
{name:"BANNER",map:BANNER},
{name:"CAIRN",map:CAIRN}
];
const CXS=[160,480,800];

const T=new Image();
T.src="../asset/tiles/smooth_tile.png?v=2";
T.onload=draw;
function tile(x,y){
cx.save();
cx.imageSmoothingEnabled=true;
cx.imageSmoothingQuality="high";
cx.drawImage(T,x-36.5,y-16.5,73,39);
cx.restore();
}
function draw(){
cx.fillStyle="#000";cx.fillRect(0,0,960,540);
cx.font="10px monospace";cx.textAlign="left";
cx.fillStyle=MID;cx.fillText("SURVIVOR MARKER LAB 2",12,20);
cx.fillText("4X",12,95);
cx.fillText("TILE",12,213);
cx.fillText("PAIR",12,333);
cx.fillText("STREET",12,448);
for(let i=0;i<OPTS.length;i++){
const c=CXS[i],o=OPTS[i];
sprite(o.map,c,120,RED,4);
tile(c,210);
sprite(o.map,c,216,RED,1);
tile(c,330);
sprite(o.map,c-8,339,RED,1);
sprite(o.map,c+8,335,BLUE,1);
sprite(o.map,c,448,RED,1);
cx.font="10px monospace";cx.textAlign="center";
cx.fillStyle=MID;
cx.fillText(o.name,c,505);
cx.textAlign="left";
}
}
</script>
</body>
</html>
