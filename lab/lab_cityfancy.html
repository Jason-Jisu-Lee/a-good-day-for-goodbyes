<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>fancy city viz lab</title>
<style>
body{margin:0;background:#0a0a0a;color:#888;font:13px "Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px}
canvas{outline:1px solid #222}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
button{background:#111;border:1px solid #444;color:#ccc;font:13px "Segoe UI",sans-serif;padding:7px 14px;cursor:pointer}
button.on{border-color:#e3c15c;color:#e3c15c}
.note{max-width:960px;color:#666;text-align:center}
#warn{color:#c8493f;display:none}
</style>
</head>
<body>
<div>SPECTRUM CITY, fancier. Real menu track, real analysis (open via http://localhost:8123). Press PLAY, then switch variants while it plays.</div>
<canvas id="cv" width="960" height="540"></canvas>
<div class="row"><button id="play" class="on">PLAY</button><span id="lvl">AUDIO 0%</span><span id="warn">opened as file:// = no analysis, use localhost</span></div>
<div class="row"><button data-v="0" class="on">LIVING TOWN</button><button data-v="1">EMBER HORIZON</button><button data-v="2">CONSUMING DARK</button></div>
<div class="note" id="desc"></div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const W=960,H=540,FG="#f2f2f0",FONT='"Segoe UI",system-ui,sans-serif';
if(location.protocol==="file:")document.getElementById("warn").style.display="inline";
const A=new Audio("../asset/soundtrack/main_screen.mp3?v=1");A.loop=true;
let ac=null,an=null,freq=null,playing=false;
let bass=0,treb=0,lvl=0,ema=0.05,beatP=0,lastBeat=0;
const DESCS=[
"LIVING TOWN: the skyline is buildings, not bars. Bass makes the whole town breathe, hi-hats flicker windows alight, the reflection dissolves into the void below.",
"EMBER HORIZON: the horizon line is the town's last light. Bass makes it swell and burn; every drum hit sends a pulse of light sinking down into the dark like a heartbeat.",
"CONSUMING DARK: the void is alive. When the music goes quiet the dark creeps up over the skyline; every beat knocks it back down. The song is literally holding the dark out."
];
let vi=0;
document.getElementById("desc").textContent=DESCS[0];
document.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>{
vi=+b.dataset.v;
document.querySelectorAll("[data-v]").forEach(c=>c.classList.remove("on"));
b.classList.add("on");
document.getElementById("desc").textContent=DESCS[vi];
});
document.getElementById("play").onclick=()=>{
if(!ac){
ac=new (window.AudioContext||window.webkitAudioContext)();
const s=ac.createMediaElementSource(A);
an=ac.createAnalyser();an.fftSize=1024;an.smoothingTimeConstant=0.78;
s.connect(an);an.connect(ac.destination);
freq=new Uint8Array(an.frequencyBinCount);
}
ac.resume();
if(playing){A.pause();playing=false;document.getElementById("play").textContent="PLAY";}
else{A.play();playing=true;document.getElementById("play").textContent="PAUSE";}
};
const NB=48;
const bands=new Array(NB).fill(0);
let synthT=0;
const bldg=[];
(function(){
let x=0,i=0;
while(x<W){
const w=14+((i*37)%22);
bldg.push({x,w,band:Math.floor(i*NB/34)%NB,seed:i*97});
x+=w+2;i++;
}
})();
function analyse(t){
synthT+=0.016;
let live=false;
if(an&&playing){
an.getByteFrequencyData(freq);
let b=0;for(let i=2;i<12;i++)b+=freq[i];bass=b/10/255;
let tr=0;for(let i=180;i<360;i++)tr+=freq[i];treb=tr/180/255;
let s=0;for(let i=0;i<300;i++)s+=freq[i];lvl=s/300/255;
if(lvl>0.01)live=true;
for(let i=0;i<NB;i++){
const bin=Math.floor(Math.pow(i/NB,1.6)*330)+2;
const v=freq[bin]/255;
bands[i]=Math.max(v,bands[i]*0.86);
}
if(bass>ema*1.32+0.02&&t-lastBeat>150){lastBeat=t;beatP=1;}
ema=ema*0.95+bass*0.05;
}
if(!live){
bass=0.12+0.1*Math.sin(synthT*0.8);treb=0.1;lvl=0.12;
for(let i=0;i<NB;i++)bands[i]=0.12+0.08*Math.sin(synthT*0.7+i*0.4);
}
beatP*=0.92;
document.getElementById("lvl").textContent="AUDIO "+Math.round(lvl*100)+"%";
}
function dith(x,y,w,h,a,step){
cx.globalAlpha=a;
for(let yy=0;yy<h;yy+=step)cx.fillRect(x,y+yy,w,1);
}
function livingTown(hz){
const grow=1+bass*0.5+beatP*0.25;
for(const b of bldg){
const bh=(14+bands[b.band]*95)*grow;
cx.globalAlpha=0.3;
cx.fillStyle=FG;
cx.fillRect(b.x,hz-bh,b.w,bh);
cx.globalAlpha=1;
cx.fillStyle="#000";
for(let wy=hz-bh+4;wy<hz-4;wy+=6)
for(let wx=b.x+3;wx<b.x+b.w-3;wx+=6){
const on=Math.sin(b.seed+wx*3.1+wy*1.7+Math.floor(synthT*2))>1-treb*1.8;
if(!on)cx.fillRect(wx,wy,2,3);
}
cx.fillStyle=FG;
dith(b.x,hz+3,b.w,bh*0.35,0.09,2);
}
cx.globalAlpha=0.2+bass*0.3;
cx.fillRect(0,hz,W,1);
}
function emberHorizon(hz){
cx.fillStyle=FG;
const bw=W/NB;
for(let i=0;i<NB;i++){
const h=6+bands[i]*110;
cx.globalAlpha=0.22;
cx.fillRect(i*bw+1,hz-h,bw-2,h);
dith(i*bw+1,hz+4,bw-2,h*0.4,0.08,2);
}
const gl=1+Math.round(bass*4);
cx.globalAlpha=0.25+bass*0.75;
cx.fillRect(0,hz-Math.floor(gl/2),W,gl);
if(!emberHorizon.p)emberHorizon.p=[];
if(beatP>0.9)emberHorizon.p.push({d:0});
for(let i=emberHorizon.p.length-1;i>=0;i--){
const p=emberHorizon.p[i];
p.d+=1.6;
if(p.d>70){emberHorizon.p.splice(i,1);continue;}
cx.globalAlpha=0.35*(1-p.d/70);
for(let x=0;x<W;x+=3)cx.fillRect(x,hz+p.d,2,1);
}
}
function consumingDark(hz){
cx.fillStyle=FG;
const bw=W/NB;
for(let i=0;i<NB;i++){
const h=10+bands[i]*105;
cx.globalAlpha=0.26;
cx.fillRect(i*bw+1,hz-h,bw-2,h);
}
cx.globalAlpha=0.18;
cx.fillRect(0,hz,W,1);
if(consumingDark.c===undefined)consumingDark.c=40;
const target=95-lvl*260-beatP*160;
consumingDark.c+=(Math.max(-8,target)-consumingDark.c)*0.04;
const cover=consumingDark.c;
if(cover>0){
cx.fillStyle="#000";
cx.globalAlpha=1;
cx.fillRect(0,hz-cover,W,cover+40);
cx.fillStyle=FG;
for(let yy=0;yy<14;yy+=2){
cx.globalAlpha=0.12*(1-yy/14);
for(let x=((yy%4)?2:0);x<W;x+=4)cx.fillRect(x,hz-cover-yy,2,1);
}
}else{
cx.fillStyle="#000";
cx.globalAlpha=0.85;
cx.fillRect(0,hz+2,W,40);
}
}
function draw(t){
analyse(t);
cx.globalAlpha=1;
cx.fillStyle="#000";
cx.fillRect(0,0,W,H);
const hz=H-60;
if(vi===0)livingTown(hz);
else if(vi===1)emberHorizon(hz);
else consumingDark(hz);
cx.globalAlpha=1;
cx.font="700 30px "+FONT;
cx.textAlign="center";
cx.fillStyle=FG;
cx.fillText("A GOOD DAY FOR GOODBYES",W/2,150);
cx.textAlign="left";
requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
