<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>tier map 12x12</title>
<style>
html,body{margin:0;background:#000;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:auto;outline:1px solid #222}
</style>
</head>
<body>
<canvas id="cv" width="960" height="540"></canvas>
<script>
const cx=document.getElementById("cv").getContext("2d");
const FG="#f2f2f0",MID="#777777";
const GRID=12,OB0=5,OB1=6;
const OX=300,OY=125,DX=24,DY=12,HW=17,HH=8.5;
function shade(t){const c=Math.round(242-t*20.2);return "rgb("+c+","+c+","+c+")";}
function tierOf(gx,gy){
const dx=gx<OB0?OB0-gx:(gx>OB1?gx-OB1:0);
const dy=gy<OB0?OB0-gy:(gy>OB1?gy-OB1:0);
return dx+dy;
}
function tpos(gx,gy){return {x:OX+(gx-gy)*DX,y:OY+(gx+gy)*DY};}
function fillDia(x,y,col){
cx.fillStyle=col;
for(let dy=-8;dy<=8;dy++){
const w=Math.floor((1-Math.abs(dy)/HH)*HW);
if(w<=0)continue;
cx.fillRect(Math.round(x-w),Math.round(y+dy),w*2,1);
}
}
function draw(){
cx.fillStyle="#000";cx.fillRect(0,0,960,540);
cx.font="10px monospace";
cx.fillStyle=MID;cx.textAlign="left";
cx.fillText("TIER MAP  12X12  (A-L X 1-12, ORIGIN F6 G6 F7 G7)",12,20);
for(let gy=0;gy<GRID;gy++)for(let gx=0;gx<GRID;gx++){
const t=tierOf(gx,gy),p=tpos(gx,gy);
fillDia(p.x,p.y,shade(t));
const c=242-t*20.2;
cx.fillStyle=c>=128?"#000":FG;
cx.font="bold 9px monospace";cx.textAlign="center";
cx.fillText(t,p.x,p.y+3);
}
const L=[
["T0","4","ORIGIN: 2 HOUSE 1 FOOD 1 MYSTERY"],
["T1","8","1 CAMP 1 FOOD 1 MAT 1 RUBBLE 4 LOT"],
["T2","12","1 CAMP 2 FOOD 1 MAT 1 RUBBLE 1 CACHE 6 LOT"],
["T3","16","1 CAMP 2 FOOD 2 MAT 2 RUBBLE 1 EMBER 8 LOT"],
["T4","20","1 CAMP 2 FOOD 2 MAT 2 RUBBLE 1 EMBER 12 LOT"],
["T5","24","3 FOOD 3 MAT 3 RUBBLE 1 EMBER 14 LOT"],
["T6","20","2 FOOD 4 MAT 3 RUBBLE 11 LOT"],
["T7","16","2 FOOD 4 MAT 2 RUBBLE 1 EMBER 7 LOT"],
["T8","12","2 FOOD 4 MAT 2 RUBBLE 4 LOT"],
["T9","8","2 FOOD 3 MAT 1 RUBBLE 1 EMBER 1 LOT"],
["T10","4","CORNERS: 1 FOOD 2 MAT 1 EMBER"]
];
let y=42;
for(let i=0;i<11;i++){
fillDiaSmall(626,y+2,shade(i));
cx.textAlign="left";
cx.font="bold 10px monospace";cx.fillStyle=FG;
cx.fillText(L[i][0]+"  "+L[i][1]+" TILES",646,y+5);
cx.font="9px monospace";cx.fillStyle=MID;
cx.fillText(L[i][2],646,y+18);
y+=45;
}
cx.font="9px monospace";cx.fillStyle=MID;
cx.fillText("SURVIVORS: JUNE T1, OKON T2, IVY T3, SAGE T4",12,505);
cx.fillText("FOOD 20 TOTAL  MAT 26 (STINGY->RICH)  EMBER 6  RUBBLE 17",12,520);
}
function fillDiaSmall(x,y,col){
cx.fillStyle=col;
for(let dy=-6;dy<=6;dy++){
const w=Math.floor((1-Math.abs(dy)/6)*12);
if(w<=0)continue;
cx.fillRect(Math.round(x-w),Math.round(y+dy),w*2,1);
}
}
draw();
</script>
</body>
</html>
