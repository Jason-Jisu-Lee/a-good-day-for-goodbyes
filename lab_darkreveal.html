<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>darkness number reveal lab</title>
<style>
body{margin:0;background:#0a0a0a;color:#888;font:13px "Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px}
canvas{outline:1px solid #222}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:960px}
button{background:#111;border:1px solid #444;color:#ccc;font:13px "Segoe UI",sans-serif;padding:7px 16px;cursor:pointer}
button.on{border-color:#c8493f;color:#c8493f}
.note{max-width:960px;color:#666;text-align:center}
</style>
</head>
<body>
<div>After BLACKOUT fades, the red darkness number creeps in next to LIGHT. Compare reveal effects. Click canvas = replay. (sound added later)</div>
<canvas id="cv" width="960" height="200"></canvas>
<div class="row" id="btns"></div>
<div class="note" id="desc"></div>
<script>
const cv=document.getElementById("cv"),cx=cv.getContext("2d");
const W=960,H=200,RED="#c8493f",FG="#f2f2f0",FONT='"Segoe UI",system-ui,sans-serif';
const NEED=6,LIGHT=2;
const FX=[
{n:"SLOW FADE",d:"opacity 0 to 1 over 2.5s, ease-in. Quiet, simple."},
{n:"FLICKER",d:"stutters on like a failing signal, settles solid. Unstable, creepy."},
{n:"COUNT UP",d:"climbs 0 to the value while fading in. The dark rising."},
{n:"SEEP UP",d:"rises into place from below while fading. Emerging from the dark."},
{n:"BLEED",d:"starts near-black, brightens to red as it fades in. Blood seeping."}
];
let fi=0,t=0,last=performance.now();
const brow=document.getElementById("btns"),desc=document.getElementById("desc");
FX.forEach((f,i)=>{
const b=document.createElement("button");
b.textContent=f.n;b.className=i===fi?"on":"";
b.onclick=()=>{fi=i;t=0;[...brow.children].forEach(c=>c.classList.remove("on"));b.classList.add("on");desc.textContent=f.d;};
brow.appendChild(b);
});
desc.textContent=FX[fi].d;
cv.addEventListener("click",()=>{t=0;});
function lerp(a,b,p){return a+(b-a)*p;}
function hex(c){return "#"+c.map(v=>Math.round(v).toString(16).padStart(2,"0")).join("");}
function flickA(t){
const seg=[[0,0.3,0],[0.3,0.36,0.6],[0.36,0.5,0],[0.5,0.58,0.4],[0.58,0.7,0],[0.7,0.82,0.7],[0.82,0.9,0.2],[0.9,2.4,1]];
for(const s of seg)if(t>=s[0]&&t<s[1])return lerp(s[2],s[2],0);
return 1;
}
function draw(){
cx.fillStyle="#000";cx.fillRect(0,0,W,H);
// mock HUD row
const y=40;
cx.textBaseline="top";cx.textAlign="left";
cx.fillStyle="#f2f2f0";cx.font="600 20px "+FONT;
cx.fillText("FOOD 20",40,y);
cx.fillText("LIGHT "+LIGHT,300,y);
const lw=cx.measureText("LIGHT "+LIGHT).width;
const dx=300+lw+16;
cx.fillStyle="#777";cx.font="600 20px "+FONT;
// darkness number with effect
const f=FX[fi];
let a=1,offY=0,col=RED,shown=String(NEED);
if(f.n==="SLOW FADE"){const p=Math.min(1,t/2.5);a=p*p;}
else if(f.n==="FLICKER"){a=flickA(t);}
else if(f.n==="COUNT UP"){const p=Math.min(1,t/2.0);a=Math.min(1,t/1.0);shown=String(Math.round(lerp(0,NEED,p*p)));}
else if(f.n==="SEEP UP"){const p=Math.min(1,t/2.5);a=p;offY=lerp(22,0,p*p);}
else if(f.n==="BLEED"){const p=Math.min(1,t/2.5);a=Math.min(1,p*1.3);col=hex([lerp(30,200,p),lerp(8,73,p),lerp(6,63,p)]);}
cx.save();
cx.globalAlpha=a;
cx.fillStyle=col;
cx.font="700 20px "+FONT;
cx.fillText(shown,dx,y+offY);
cx.restore();
// baseline guide
cx.fillStyle="#333";cx.font="11px "+FONT;
cx.fillText("mock HUD row - red number = darkness the light must meet",40,H-24);
}
function step(now){t+=Math.min(100,now-last)/1000;last=now;draw();requestAnimationFrame(step);}
requestAnimationFrame(step);
</script>
</body>
</html>
